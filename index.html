<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a1a18" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Arroyo POS" />
<meta name="description" content="Universal Point of Sale by Reymar Arroyo" />
<link rel="manifest" href="manifest.json" />
<title>Arroyo POS</title>
<style>
:root {
  --bg0: #111110; --bg1: #1c1c1a; --bg2: #262624; --bg3: #2e2e2c;
  --text1: #f0f0ec; --text2: #a8a8a2; --text3: #666660;
  --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
  --accent: #378add; --accent-bg: #0c447c;
  --success: #3b6d11; --success-bg: #27500a; --success-text: #c0dd97;
  --warning: #854f0b; --warning-bg: #633806; --warning-text: #fac775;
  --danger: #e24b4a; --danger-bg: #791f1f; --danger-text: #f09595;
  --pro: #534ab7; --pro-bg: #3c3489; --pro-text: #afa9ec;
  --radius: 10px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --theme-primary: #378add;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg0); color: var(--text1); font-family: var(--font); position: fixed; top: 0; left: 0; }
* { user-select: none; }
input, textarea { user-select: text; -webkit-user-select: text; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* APP */
#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* BIZ SCREEN */
.biz-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; gap: 24px; flex: 1; overflow-y: auto; background: var(--bg0); }
.biz-logo { font-size: 30px; font-weight: 700; letter-spacing: -1px; color: var(--text1); }
.biz-sub { font-size: 14px; color: var(--text2); text-align: center; margin-top: 2px; }
.biz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
.biz-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; transition: background 0.15s; }
.biz-card:active { background: var(--bg3); transform: scale(0.97); }
.biz-icon { font-size: 13px; font-weight: 700; color: var(--text2); background: var(--bg3); padding: 8px 12px; border-radius: 8px; letter-spacing: 1px; }
.biz-label { font-size: 13px; font-weight: 600; color: var(--text1); }
.biz-note { font-size: 11px; color: var(--text3); text-align: center; max-width: 320px; line-height: 1.6; }
.biz-footer { font-size: 11px; color: var(--text3); text-align: center; }

/* NAVBAR */
.navbar { display: flex; align-items: center; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0 12px; flex-shrink: 0; overflow-x: auto; min-height: 50px; }
.navbar::-webkit-scrollbar { height: 0; }
.nav-brand { font-size: 15px; font-weight: 700; white-space: nowrap; color: var(--text1); flex-shrink: 0; }
.nav-biz-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); margin-left: 6px; font-weight: 600; white-space: nowrap; }
.nav-spacer { flex: 1; min-width: 8px; }
.nav-tabs { display: flex; gap: 0; }
.ntab { padding: 14px 10px; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 3px; letter-spacing: 0.3px; }
.ntab.on { color: var(--text1); border-bottom-color: var(--text1); }

/* CONTENT */
.content { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }

/* POS LAYOUT - mobile first single column */
.pos-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.pos-top { display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 10px; gap: 8px; }
.pos-bottom { background: var(--bg1); border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; }

/* Search */
.search-box { position: relative; }
.search-box input { width: 100%; padding: 10px 12px 10px 36px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); color: var(--text1); font-size: 14px; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box .sicon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; font-weight: 700; }

/* Category pills */
.cats { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
.cats::-webkit-scrollbar { height: 0; }
.cpill { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; letter-spacing: 0.2px; }
.cpill.on { background: var(--text1); color: var(--bg0); border-color: var(--text1); }

/* Product grid */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 4px; }
.pcard { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; transition: background 0.12s; }
.pcard:active { background: var(--bg3); transform: scale(0.95); }
.pcard .picon { font-size: 11px; font-weight: 700; color: var(--text2); background: var(--bg3); padding: 5px 8px; border-radius: 6px; letter-spacing: 0.5px; }
.pcard .pname { font-size: 12px; font-weight: 600; color: var(--text1); line-height: 1.3; }
.pcard .pprice { font-size: 13px; font-weight: 700; color: var(--accent); }
.pcard .pstock { font-size: 10px; color: var(--text3); }
.pcard.lowst .pstock { color: var(--warning-text); }
.pcard.outst { opacity: 0.35; pointer-events: none; }

/* Cart summary bar */
.cart-bar { display: flex; align-items: center; gap: 8px; }
.cart-bar-info { flex: 1; }
.cart-bar-count { font-size: 12px; color: var(--text2); }
.cart-bar-total { font-size: 20px; font-weight: 700; color: var(--text1); line-height: 1.2; }
.cart-bar-btn { padding: 12px 20px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.cart-bar-btn:active { opacity: 0.85; }
.cart-bar-view { padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* CART SCREEN */
.cart-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; background: var(--bg0); }
.cart-screen.open { display: flex; }
.cart-header { display: flex; align-items: center; gap: 10px; padding: 14px 14px 10px; flex-shrink: 0; }
.cart-back { padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 13px; font-weight: 600; cursor: pointer; }
.cart-title { font-size: 16px; font-weight: 700; flex: 1; }
.cart-clear-btn { font-size: 12px; color: var(--danger-text); cursor: pointer; border: none; background: none; padding: 6px 10px; border-radius: var(--radius); }
.cart-items { flex: 1; overflow-y: auto; padding: 0 12px; }
.cempty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text3); font-size: 14px; padding: 40px 0; }
.citem { display: flex; align-items: center; gap: 10px; padding: 12px 2px; border-bottom: 1px solid var(--border); }
.cname { flex: 1; }
.cname .cn { font-size: 14px; font-weight: 600; }
.cname .cs { font-size: 12px; color: var(--text2); margin-top: 2px; }
.qw { display: flex; align-items: center; gap: 8px; }
.qb { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.qb:active { background: var(--bg3); }
.qnum { font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; }
.ctotal { font-size: 15px; font-weight: 700; min-width: 60px; text-align: right; color: var(--accent); }

/* Cart footer */
.cart-footer { padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg1); }
.disc-row { display: flex; gap: 8px; margin-bottom: 10px; }
.disc-row input { flex: 1; padding: 9px 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 14px; outline: none; }
.disc-row select { padding: 9px 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 14px; outline: none; }
.sum-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); padding: 3px 0; }
.sum-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 700; padding: 8px 0 12px; border-top: 1px solid var(--border); margin-top: 6px; }
.pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pbtn { padding: 14px 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; letter-spacing: 0.3px; }
.pbtn:active { background: var(--bg3); }
.pbtn.full { grid-column: 1/-1; background: var(--accent); color: #fff; border-color: var(--accent); font-size: 15px; padding: 16px; }
.pbtn.full:active { opacity: 0.85; }

/* FULLSCREEN PANELS */
.panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.panel-hd { padding: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-shrink: 0; background: var(--bg1); }
.panel-hd h2 { font-size: 16px; font-weight: 700; }
.add-btn { padding: 10px 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.add-btn:active { background: var(--bg3); }

/* Inventory table */
.inv-wrap { flex: 1; overflow-y: auto; }
.inv-item { display: flex; align-items: center; gap: 10px; padding: 14px; border-bottom: 1px solid var(--border); }
.inv-icon { font-size: 11px; font-weight: 700; color: var(--text2); background: var(--bg2); padding: 6px 8px; border-radius: 6px; min-width: 40px; text-align: center; }
.inv-info { flex: 1; }
.inv-name { font-size: 14px; font-weight: 600; }
.inv-cat { font-size: 11px; color: var(--text3); margin-top: 2px; }
.inv-price { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: right; }
.sbadge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.sok { background: var(--success-bg); color: var(--success-text); }
.slow { background: var(--warning-bg); color: var(--warning-text); }
.sout { background: var(--danger-bg); color: var(--danger-text); }
.inv-actions { display: flex; gap: 6px; }
.iact { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 13px; font-weight: 700; }
.iact:active { background: var(--bg2); }
.iact.del:active { background: var(--danger-bg); color: var(--danger-text); }

/* Stats */
.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px 14px; }
.stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
.stat .sl { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
.stat .sv { font-size: 18px; font-weight: 700; }

/* History */
.hist-filters { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.hist-filters::-webkit-scrollbar { height: 0; }
.hfpill { padding: 7px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.hfpill.on { background: var(--text1); color: var(--bg0); border-color: var(--text1); }
.hist-wrap { flex: 1; overflow-y: auto; padding: 12px 14px; }
.day-lbl { font-size: 11px; font-weight: 700; color: var(--text3); padding: 6px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.day-sum { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.txcard { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.txcard:active { background: var(--bg3); }
.txleft { flex: 1; overflow: hidden; }
.txid { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
.txitems { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txtime { font-size: 11px; color: var(--text2); margin-top: 3px; }
.txright { text-align: right; flex-shrink: 0; }
.txtot { font-size: 15px; font-weight: 700; }
.txmet { font-size: 10px; margin-top: 3px; padding: 2px 7px; border-radius: 20px; font-weight: 600; display: inline-block; }
.txmet.Cash { background: var(--success-bg); color: var(--success-text); }
.txmet.Card { background: var(--accent-bg); color: var(--accent); }
.txmet.GCash { background: var(--pro-bg); color: var(--pro-text); }
.txmet.Transfer { background: var(--warning-bg); color: var(--warning-text); }
.empty-hist { text-align: center; color: var(--text3); font-size: 14px; padding: 48px 0; }

/* Admin */
.admin-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.asec { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.asec h3 { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.arow { display: flex; align-items: center; gap: 10px; }
.arow label { font-size: 13px; color: var(--text2); min-width: 110px; flex-shrink: 0; }
.arow input, .arow select { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg1); color: var(--text1); font-size: 14px; outline: none; min-width: 0; }
.abtnrow { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
.abtn { padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg1); color: var(--text1); font-size: 13px; font-weight: 600; cursor: pointer; }
.abtn:active { background: var(--bg3); }
.abtn.pri { background: var(--text1); color: var(--bg0); border-color: var(--text1); }
.danger-sec { border-color: var(--danger-bg); }
.danger-sec h3 { color: var(--danger-text); }
.creator-sec { border-color: var(--pro-bg); }
.creator-sec h3 { color: var(--pro-text); }

/* About */
.about-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
.about-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 22px; width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.about-av { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--accent); }
.about-name { font-size: 17px; font-weight: 700; }
.about-role { font-size: 12px; color: var(--text2); }
.about-div { width: 100%; height: 1px; background: var(--border); }
.about-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text2); width: 100%; }
.about-row-icon { font-size: 11px; font-weight: 700; color: var(--text3); min-width: 20px; }

/* Lock screen */
.lock-screen { display: flex; align-items: center; justify-content: center; flex: 1; background: var(--bg0); }
.lock-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 300px; max-width: 90vw; display: flex; flex-direction: column; gap: 14px; align-items: center; text-align: center; }
.lock-icon-txt { font-size: 32px; }
.lock-card h2 { font-size: 17px; font-weight: 700; }
.lock-card p { font-size: 13px; color: var(--text2); }
.lock-card input { width: 100%; padding: 14px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg1); color: var(--text1); font-size: 18px; text-align: center; letter-spacing: 4px; outline: none; }
.lock-card input:focus { border-color: var(--accent); }
.unlock-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--text1); color: var(--bg0); font-size: 15px; font-weight: 700; cursor: pointer; }
.unlock-btn:active { opacity: 0.85; }
.lerr { font-size: 12px; color: var(--danger-text); min-height: 16px; }

/* OVERLAY */
.ov { display: none; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.6); position: absolute; inset: 0; z-index: 50; }
.ov.open { display: flex; }
.modal { background: var(--bg1); border-radius: 20px 20px 0 0; padding: 20px 18px 32px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
.modal-drag { width: 40px; height: 4px; background: var(--border2); border-radius: 4px; margin: 0 auto 4px; }
.modal h2 { font-size: 17px; font-weight: 700; }
.modal-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--pro-bg); color: var(--pro-text); font-weight: 600; display: inline-block; }
.mf { display: flex; flex-direction: column; gap: 6px; }
.mf label { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.mf input, .mf select { padding: 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 15px; width: 100%; outline: none; }
.mf input:focus, .mf select:focus { border-color: var(--accent); }
.mbtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.mbtns button { padding: 12px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); cursor: pointer; font-size: 14px; font-weight: 600; }
.mbtns button:active { background: var(--bg3); }
.mbtns .mpri { background: var(--text1); color: var(--bg0); border-color: var(--text1); }
.mbtns .mdel { color: var(--danger-text); margin-right: auto; }
.mbtns .mdel:active { background: var(--danger-bg); }
.rbox { font-family: 'Courier New', monospace; font-size: 12px; background: var(--bg0); border-radius: 10px; padding: 14px; white-space: pre; overflow: auto; max-height: 240px; line-height: 1.9; border: 1px solid var(--border); }

/* CASH TENDER */
.cash-total-display { background: var(--bg0); border-radius: 12px; padding: 16px; text-align: center; }
.cash-label { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.cash-amount { font-size: 32px; font-weight: 800; color: var(--text1); }
.cash-quick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cqbtn { padding: 14px 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; }
.cqbtn:active { background: var(--bg3); }
.cqbtn.exact { background: var(--accent); color: #fff; border-color: var(--accent); grid-column: 1/-1; font-size: 15px; padding: 16px; }
.cash-change-box { background: var(--bg0); border-radius: 12px; padding: 14px 16px; }
.cash-change-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text2); margin-bottom: 6px; }
.cash-change-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; }
.cash-change-total .change-pos { color: var(--success-text); }
.cash-change-total .change-neg { color: var(--danger-text); }

/* TOAST */
.toast-wrap { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 6px; pointer-events: none; z-index: 100; }
.tst { background: var(--bg3); color: var(--text1); padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; border: 1px solid var(--border2); }

.color-preset { padding: 8px 14px; border-radius: 20px; border: none; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; opacity: 0.9; }
.color-preset:active { opacity: 1; transform: scale(0.96); }
/* Print */
#print-area { display: none; }
@media print {
  body > * { display: none !important; }
  #print-area { display: block !important; font-family: monospace; font-size: 12px; width: 100%; max-width: 300px; margin: 0 auto; color: #000; }
}
</style>
</head>

function load(){try{const d=JSON.parse(localStorage.getItem('arroyo_pos')||'{}');if(d.biz){S.biz=d.biz;S.bizName=d.bizName;S.prods=d.prods||[];S.cats=d.cats||[];S.pass=d.pass||'1234';S.nid=d.nid||10;S.sales=d.sales||[];S.salesTotal=d.salesTotal||0;S.screen='pos';}if(d.themeColor){S.themeColor=d.themeColor;applyTheme(S.themeColor);}}catch(e){}}
function save(){localStorage.setItem('arroyo_pos',JSON.stringify({biz:S.biz,bizName:S.bizName,prods:S.prods,cats:S.cats,pass:S.pass,nid:S.nid,sales:S.sales,salesTotal:S.salesTotal,themeColor:S.themeColor}));}
function fmt(n){return CUR+(+n).toFixed(2);}
function toast(msg){const t=document.createElement('div');t.className='tst';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),2200);}
function sub(){return S.cart.reduce((s,i)=>s+i.price*i.qty,0);}
function damt(){const s=sub();return S.discType==='%'?s*Math.min(S.disc,100)/100:Math.min(S.disc,s);}
function tamt(){return(sub()-damt())*TAX;}
function tot(){return sub()-damt()+tamt();}
function txId(){return'TXN-'+String(S.sales.length+1).padStart(5,'0');}
function cartCount(){return S.cart.reduce((s,i)=>s+i.qty,0);}

function initBiz(id){const b=BT.find(x=>x.id===id);S.biz=id;S.bizName=b.label;S.prods=JSON.parse(JSON.stringify(DP[id]||[]));const cs=[...new Set(S.prods.map(p=>p.cat))];S.cats=['All',...cs];S.nid=S.prods.length+1;S.screen='pos';save();applyTheme(S.themeColor);render();}
function addToCart(p){const ex=S.cart.find(i=>i.id===p.id);if(ex)ex.qty++;else S.cart.push({id:p.id,name:p.name,price:p.price,qty:1});render();toast(p.name+' added');}
function chgQty(id,d){const it=S.cart.find(i=>i.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)S.cart=S.cart.filter(i=>i.id!==id);render();}

function receiptStr(method,id){
  const now=new Date();const w=28;
  const lp=(s,n)=>(s+'').length>=n?s.slice(0,n):s+' '.repeat(n-(s+'').length);
  const rp=(s,n)=>(s+'').length>=n?s.slice(0,n):' '.repeat(n-(s+'').length)+s;
  const line='-'.repeat(w);
  const rows=[lp(S.bizName,w),line,'Date: '+now.toLocaleString(),'TXN:  '+id,line];
  S.cart.forEach(i=>{const r=fmt(i.price*i.qty);rows.push(lp(i.name+' x'+i.qty,w-r.length)+r);});
  rows.push(line);
  rows.push(lp('Subtotal:',w-fmt(sub()).length)+fmt(sub()));
  if(S.disc>0)rows.push(lp('Discount:',w-('-'+fmt(damt())).length)+'-'+fmt(damt()));
  rows.push(lp('VAT (12%):',w-fmt(tamt()).length)+fmt(tamt()));
  rows.push(line);
  const tr=fmt(tot());rows.push(lp('TOTAL:',w-tr.length)+tr);
  rows.push('Payment: '+method);
  if(method==='Cash'&&S.cashTendered>=tot()){rows.push(lp('Cash:',w-fmt(S.cashTendered).length)+fmt(S.cashTendered));rows.push(lp('Change:',w-fmt(S.cashTendered-tot()).length)+fmt(S.cashTendered-tot()));}
  rows.push(line);rows.push(rp('Powered by Arroyo POS',w));
  return rows.join('\n');
}

function openModal(m){S.modal=m;render();}
function closeModal(){S.modal=null;render();}

function render(){
  const app=document.getElementById('app');const tc=document.getElementById('toasts');
  app.innerHTML='';app.appendChild(tc);
  if(S.screen==='biz'){renderBiz(app);return;}
  renderNav(app);
  const body=document.createElement('div');body.className='content';
  if(S.screen==='pos'){if(S.cartOpen)renderCartScreen(body);else renderPOS(body);}
  else if(S.screen==='inv')renderInv(body);
  else if(S.screen==='hist')renderHist(body);
  else if(S.screen==='about')renderAbout(body);
  else if(S.screen==='admin'){S.locked?renderLock(body):renderAdmin(body);}
  app.appendChild(body);
  if(S.modal)renderModal(body);
}

function renderHist(body){
  const wrap=document.createElement('div');wrap.className='panel';
  const filt=S.sales.filter(s=>{const d=new Date(s.date);if(S.histFilter==='today'){return d.toDateString()===new Date().toDateString();}if(S.histFilter==='week'){const w=new Date();w.setDate(w.getDate()-7);return d>=w;}if(S.histFilter==='month'){const m=new Date();m.setDate(m.getDate()-30);return d>=m;}return true;}).filter(s=>!S.histSearch||s.items.some(i=>i.name.toLowerCase().includes(S.histSearch.toLowerCase()))||s.id.toLowerCase().includes(S.histSearch.toLowerCase())||s.method.toLowerCase().includes(S.histSearch.toLowerCase()));
  const byDay={};filt.slice().reverse().forEach(s=>{const k=new Date(s.date).toDateString();if(!byDay[k])byDay[k]=[];byDay[k].push(s);});
  const totalAmt=filt.reduce((a,s)=>a+s.total,0);
  wrap.innerHTML='<div class="panel-hd"><h2>History</h2><div style="text-align:right"><div style="font-size:15px;font-weight:700">'+fmt(totalAmt)+'</div><div style="font-size:11px;color:var(--text3)">'+filt.length+' transactions</div></div></div>'
    +'<div class="hist-filters">'+['all','today','week','month'].map(f=>'<div class="hfpill'+(S.histFilter===f?' on':'')+'" data-f="'+f+'">'+(f==='all'?'All time':f==='today'?'Today':f==='week'?'This week':'This month')+'</div>').join('')+'</div>'
    +'<div class="hist-wrap">'+(Object.keys(byDay).length===0?'<div class="empty-hist">No transactions found.</div>':'')
    +Object.entries(byDay).map(([ds,txs])=>{const dayTot=txs.reduce((a,s)=>a+s.total,0);const today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString();const label=ds===today?'Today':ds===yest?'Yesterday':new Date(ds).toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'});return'<div class="day-lbl">'+label+'</div><div class="day-sum">'+txs.length+' transaction'+(txs.length!==1?'s':'')+' - '+fmt(dayTot)+'</div>'+txs.map(s=>'<div class="txcard" data-txid="'+s.id+'"><div class="txleft"><div class="txid">'+s.id+'</div><div class="txitems">'+s.items.map(i=>i.name+' x'+i.qty).join(', ')+'</div><div class="txtime">'+new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div></div><div class="txright"><div class="txtot">'+fmt(s.total)+'</div><div class="txmet '+s.method+'">'+s.method+'</div></div></div>').join('');}).join('')
    +'</div>';
  wrap.querySelectorAll('.hfpill').forEach(p=>p.addEventListener('click',()=>{S.histFilter=p.dataset.f;render();}));
  wrap.querySelectorAll('.txcard').forEach(c=>c.addEventListener('click',()=>{const tx=S.sales.find(s=>s.id===c.dataset.txid);if(tx)openModal({type:'viewtx',tx});}));
  body.appendChild(wrap);
}

    +'<p style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:4px">Pick a color for buttons, prices, and accents throughout the app.</p>'

    +'<input type="color" id="themeColorPicker" value="'+S.themeColor+'" style="width:52px;height:52px;border-radius:10px;border:2px solid var(--border2);background:none;cursor:pointer;padding:2px" />'
    +'<div style="flex:1"><div style="font-size:14px;font-weight:600" id="themeColorLabel">'+S.themeColor+'</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Tap the color box to change</div></div>'
    +'<button class="abtn pri" id="saveTheme">Apply</button>'
    +'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">'
    +'<button class="color-preset" data-color="#378add" style="background:#378add">Blue</button>'
    +'<button class="color-preset" data-color="#3b6d11" style="background:#3b6d11">Green</button>'
    +'<button class="color-preset" data-color="#a32d2d" style="background:#a32d2d">Red</button>'
    +'<button class="color-preset" data-color="#534ab7" style="background:#534ab7">Purple</button>'
    +'<button class="color-preset" data-color="#854f0b" style="background:#854f0b">Amber</button>'
    +'<button class="color-preset" data-color="#0f6e56" style="background:#0f6e56">Teal</button>'
    +'<button class="color-preset" data-color="#c2185b" style="background:#c2185b">Pink</button>'
    +'<button class="color-preset" data-color="#e65100" style="background:#e65100">Orange</button>'
    +'</div></div>'
    +'<div class="asec creator-sec"><h3>Business type - Creator only</h3><p style="font-size:13px;color:var(--text2);line-height:1.5">Requires creator password. Contact '+CREATOR.name+' at '+CREATOR.phone+'.</p><div class="abtnrow"><button class="abtn" style="color:var(--pro-text);border-color:var(--pro-bg)" id="changeBizBtn">Change business type</button></div></div>'
    +'<div class="asec"><h3>Sales summary</h3><div class="stat-row" style="padding:0"><div class="stat"><div class="sl">Transactions</div><div class="sv">'+S.sales.length+'</div></div><div class="stat"><div class="sl">Revenue</div><div class="sv" style="font-size:13px">'+fmt(S.salesTotal)+'</div></div><div class="stat"><div class="sl">Avg sale</div><div class="sv" style="font-size:13px">'+fmt(avg)+'</div></div></div><div class="stat-row" style="padding:8px 0 0"><div class="stat"><div class="sl">30 days</div><div class="sv">'+tx30.length+' txns</div></div><div class="stat"><div class="sl">30-day rev.</div><div class="sv" style="font-size:13px">'+fmt(tx30tot)+'</div></div><div class="stat"><div class="sl">Products</div><div class="sv">'+S.prods.length+'</div></div></div><div class="abtnrow"><button class="abtn" id="clearSales">Clear sales</button></div></div>'
    +'<div class="asec"><h3>Change password</h3><div class="arow"><label>Current</label><input type="password" id="aCur" placeholder="Current password" /></div><div class="arow"><label>New</label><input type="password" id="aNew" placeholder="Min. 4 characters" /></div><div class="arow"><label>Confirm</label><input type="password" id="aCon" placeholder="Confirm new" /></div><div class="abtnrow"><span id="pwMsg" style="font-size:12px;flex:1"></span><button class="abtn pri" id="chgPw">Change</button></div></div>'
    +'<div class="asec danger-sec"><h3>Danger zone</h3><div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><span style="font-size:13px;color:var(--text2)">Reset products to defaults.</span><button class="abtn" id="resetPr">Reset</button></div><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px"><span style="font-size:13px;color:var(--text2)">Wipe all data.</span><button class="abtn" style="color:var(--danger-text)" id="factoryReset">Factory reset</button></div></div>'
    +'<div class="asec" style="align-items:center;text-align:center;padding:16px;gap:4px"><div style="font-size:14px;font-weight:700">'+CREATOR.product+'</div><div style="font-size:12px;color:var(--text3)">'+CREATOR.name+' &middot; '+CREATOR.phone+'</div></div>'
    +'</div>';
  w.querySelector('#themeColorPicker')?.addEventListener('input',e=>{
    S.themeColor=e.target.value;
    w.querySelector('#themeColorLabel').textContent=e.target.value;
    applyTheme(e.target.value);
  });
  w.querySelectorAll('.color-preset').forEach(b=>b.addEventListener('click',()=>{
    S.themeColor=b.dataset.color;
    w.querySelector('#themeColorPicker').value=b.dataset.color;
    w.querySelector('#themeColorLabel').textContent=b.dataset.color;
    applyTheme(b.dataset.color);
  }));
  w.querySelector('#saveTheme')?.addEventListener('click',()=>{save();toast('Theme saved!');});
  w.querySelector('#lockAdm').addEventListener('click',()=>{S.locked=true;S.screen='pos';render();});
  w.querySelector('#saveShop').addEventListener('click',()=>{S.bizName=w.querySelector('#aName').value||S.bizName;save();render();toast('Saved');});
  w.querySelector('#changeBizBtn').addEventListener('click',()=>openModal({type:'creatorAuth'}));
  w.querySelector('#clearSales').addEventListener('click',()=>{if(confirm('Clear all sales data?')){S.sales=[];S.salesTotal=0;save();render();toast('Sales cleared');}});
  w.querySelector('#chgPw').addEventListener('click',()=>{
    const cur=w.querySelector('#aCur').value,nw=w.querySelector('#aNew').value,con=w.querySelector('#aCon').value,msg=w.querySelector('#pwMsg');
    if(cur!==S.pass){msg.style.color='var(--danger-text)';msg.textContent='Wrong password.';return;}
    if(nw.length<4){msg.style.color='var(--danger-text)';msg.textContent='Min 4 characters.';return;}
    if(nw!==con){msg.style.color='var(--danger-text)';msg.textContent='Passwords do not match.';return;}
    S.pass=nw;save();msg.style.color='var(--success-text)';msg.textContent='Password changed!';setTimeout(()=>{msg.textContent='';},3000);
  });
  w.querySelector('#resetPr').addEventListener('click',()=>{if(confirm('Reset products?')){S.prods=JSON.parse(JSON.stringify(DP[S.biz]||[]));const cs=[...new Set(S.prods.map(p=>p.cat))];S.cats=['All',...cs];S.nid=S.prods.length+1;save();render();toast('Products reset');}});
  w.querySelector('#factoryReset').addEventListener('click',()=>{if(confirm('Wipe ALL data?')){if(confirm('Final confirmation?')){localStorage.removeItem('arroyo_pos');S={screen:'biz',cartOpen:false,biz:null,bizName:'',prods:[],cats:[],cart:[],cat:'All',search:'',disc:0,discType:'%',pass:'1234',locked:true,nid:10,sales:[],salesTotal:0,modal:null,histFilter:'all',histSearch:'',cashTendered:0};render();}}});
  body.appendChild(w);
}

function renderModal(body){
  const m=S.modal;const ov=document.createElement('div');ov.className='ov open';let html='';

  if(m.type==='pay'){
    const id=txId();const isCash=m.method==='Cash';
    const ct=S.cashTendered||0;const change=ct-tot();
    html='<div class="modal"><div class="modal-drag"></div>'
      +(isCash?
        '<h2>Cash payment</h2>'
        +'<div class="cash-total-display"><div class="cash-label">Total to pay</div><div class="cash-amount">'+fmt(tot())+'</div></div>'
        +'<div class="cash-quick">'
        +'<button class="cqbtn exact" id="cqExact">Exact - '+fmt(tot())+'</button>'
        +'<button class="cqbtn" data-add="50">+ 50</button>'
        +'<button class="cqbtn" data-add="100">+ 100</button>'
        +'<button class="cqbtn" data-add="500">+ 500</button>'
        +'<button class="cqbtn" data-add="1000">+ 1,000</button>'
        +'<button class="cqbtn" data-add="0" id="cqClear">Clear</button>'
        +'</div>'
        +'<div class="cash-change-box">'
        +'<div class="cash-change-row"><span>Cash tendered</span><span>'+fmt(ct)+'</span></div>'
        +'<div class="cash-change-total"><span>Change</span><span class="'+(change>=0?'change-pos':'change-neg')+'">'+(change>=0?fmt(change):'--')+'</span></div>'
        +'</div>'
        +'<div class="rbox">'+receiptStr(m.method,id)+'</div>'
        +'<div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" id="mFinish" '+(isCash&&ct<tot()?'style="opacity:0.5;pointer-events:none"':'')+'>Confirm sale</button></div>'
      :
        '<h2>Receipt - '+m.method+'</h2>'
        +'<div class="rbox">'+receiptStr(m.method,id)+'</div>'
        +'<div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" id="mFinish">Confirm sale</button></div>'
      )
      +'</div>';
  } else if(m.type==='viewtx'){
    html='<div class="modal"><div class="modal-drag"></div><h2>'+m.tx.id+'</h2><div class="rbox">'+m.tx.receipt+'</div><div class="mbtns"><button id="mClose">Close</button></div></div>';
  } else if(m.type==='creatorAuth'){
    html='<div class="modal"><div class="modal-drag"></div><div class="modal-badge">Creator access required</div><h2>Change business type</h2><p style="font-size:13px;color:var(--text2);line-height:1.6">Enter the creator password to continue.</p><div class="mf"><label>Creator password</label><input type="password" id="cpInput" placeholder="Creator password" /></div><span id="cpErr" style="font-size:12px;color:var(--danger-text);min-height:16px;display:block"></span><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" id="cpVerify">Verify</button></div></div>';
  } else if(m.type==='changeBiz'){
    html='<div class="modal"><div class="modal-drag"></div><div class="modal-badge">Creator access granted</div><h2>Change business type</h2><p style="font-size:13px;color:var(--danger-text);line-height:1.6">Products will reset to defaults. Sales history is preserved.</p><div class="mf"><label>New business type</label><select id="nbizSel">'+BT.map(b=>'<option value="'+b.id+'"'+(b.id===S.biz?' selected':'')+'>'+b.label+'</option>').join('')+'</select></div><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" style="background:var(--pro);border-color:var(--pro)" id="confirmBiz">Change</button></div></div>';
  } else if(m.type==='prod'){
    const p=m.prod;const isNew=!p;const pp=p||{name:'',price:'',cat:'',icon:'ITEM',stock:''};
    const cats=[...new Set(S.prods.map(x=>x.cat))];
    html='<div class="modal"><div class="modal-drag"></div><h2>'+(isNew?'Add product':'Edit product')+'</h2>'
      +'<div class="mf"><label>Name</label><input id="pNm" value="'+pp.name+'" placeholder="Product name" /></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="mf"><label>Price</label><input id="pPr" type="number" value="'+pp.price+'" min="0" /></div><div class="mf"><label>Stock (blank=inf)</label><input id="pSt" type="number" value="'+(pp.stock===999?'':pp.stock)+'" min="0" /></div></div>'
      +'<div class="mf"><label>Category</label><input id="pCt" value="'+pp.cat+'" placeholder="e.g. Drinks" list="catdl" /><datalist id="catdl">'+cats.map(c=>'<option value="'+c+'">').join('')+'</datalist></div>'
      +'<div class="mf"><label>Icon</label><select id="pIc">'+ICONS.map(ic=>'<option value="'+ic+'"'+(ic===pp.icon?' selected':'')+'>'+ic+'</option>').join('')+'</select></div>'
      +'<div class="mbtns">'+((!isNew)?'<button class="mdel" id="mDelPr">Delete</button>':'')+'<button id="mClose">Cancel</button><button class="mpri" id="mSavePr">Save</button></div></div>';
  } else if(m.type==='confirm'){
    const p=S.prods.find(x=>x.id===m.pid);
    html='<div class="modal"><div class="modal-drag"></div><h2>Delete product</h2><p style="font-size:14px;color:var(--text2);line-height:1.6">Remove "'+p?.name+'"? This cannot be undone.</p><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" style="background:var(--danger);border-color:var(--danger)" id="mConfDel">Delete</button></div></div>';
  }

  ov.innerHTML=html;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  ov.querySelector('#mClose')?.addEventListener('click',closeModal);

  // Cash quick buttons
  if(m.type==='pay'&&m.method==='Cash'){
    ov.querySelector('#cqExact')?.addEventListener('click',()=>{S.cashTendered=tot();openModal({type:'pay',method:'Cash'});});
    ov.querySelectorAll('.cqbtn[data-add]').forEach(b=>{b.addEventListener('click',()=>{const add=+b.dataset.add;if(add===0){S.cashTendered=0;}else{S.cashTendered=(S.cashTendered||0)+add;}openModal({type:'pay',method:'Cash'});});});
  }

  ov.querySelector('#mFinish')?.addEventListener('click',()=>{
    const id=txId();
    const tx={id,date:new Date().toISOString(),items:S.cart.map(i=>({name:i.name,qty:i.qty,price:i.price})),total:tot(),method:m.method,receipt:receiptStr(m.method,id)};
    S.cart.forEach(ci=>{const p=S.prods.find(x=>x.id===ci.id);if(p&&p.stock!==999)p.stock=Math.max(0,p.stock-ci.qty);});
    S.sales.push(tx);S.salesTotal+=tot();S.cart=[];S.disc=0;S.cashTendered=0;S.cartOpen=false;
    save();closeModal();toast('Sale recorded - '+id);
  });

  ov.querySelector('#cpVerify')?.addEventListener('click',()=>{
    const val=ov.querySelector('#cpInput').value;
    if(val===CREATOR_PASS){closeModal();openModal({type:'changeBiz'});}
    else{ov.querySelector('#cpErr').textContent='Incorrect creator password.';ov.querySelector('#cpInput').value='';ov.querySelector('#cpInput').focus();}
  });
  ov.querySelector('#cpInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')ov.querySelector('#cpVerify')?.click();});

  ov.querySelector('#confirmBiz')?.addEventListener('click',()=>{
    const nb=ov.querySelector('#nbizSel').value;
    if(nb===S.biz){toast('Already set to that type');closeModal();return;}
    S.biz=nb;S.bizName=BT.find(x=>x.id===nb).label;S.prods=JSON.parse(JSON.stringify(DP[nb]||[]));
    const cs=[...new Set(S.prods.map(p=>p.cat))];S.cats=['All',...cs];S.nid=S.prods.length+1;
    save();closeModal();render();toast('Business type changed');
  });

  ov.querySelector('#mSavePr')?.addEventListener('click',()=>{
    const name=ov.querySelector('#pNm').value.trim(),price=parseFloat(ov.querySelector('#pPr').value)||0;
    const sv=ov.querySelector('#pSt').value.trim(),stock=sv===''?999:parseInt(sv)||0;
    const cat=ov.querySelector('#pCt').value.trim()||'General',icon=ov.querySelector('#pIc').value;
    if(!name){toast('Enter a product name');return;}
    const pp=m.prod;
    if(pp){const idx=S.prods.findIndex(x=>x.id===pp.id);if(idx>-1)S.prods[idx]={id:pp.id,name,price,cat,icon,stock};}
    else S.prods.push({id:S.nid++,name,price,cat,icon,stock});
    const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];
    save();closeModal();toast(pp?'Product updated':'Product added');
  });
  ov.querySelector('#mDelPr')?.addEventListener('click',()=>{S.prods=S.prods.filter(x=>x.id!==m.prod.id);S.cart=S.cart.filter(x=>x.id!==m.prod.id);const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];save();closeModal();toast('Deleted');});
  ov.querySelector('#mConfDel')?.addEventListener('click',()=>{S.prods=S.prods.filter(x=>x.id!==m.pid);S.cart=S.cart.filter(x=>x.id!==m.pid);const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];save();closeModal();toast('Deleted');});
  body.appendChild(ov);
}

function applyTheme(hex){
  if(!hex)return;
  // Parse hex to RGB
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // Create darker bg version
  const darken=(v,a)=>Math.max(0,Math.round(v*a));
  const lighten=(v,a)=>Math.min(255,Math.round(v+(255-v)*a));
  const toHex=(r,g,b)=>'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  const accent=hex;
  const accentBg=toHex(darken(r,0.35),darken(g,0.35),darken(b,0.35));
  const accentLight=toHex(lighten(r,0.7),lighten(g,0.7),lighten(b,0.7));
  const root=document.documentElement;
  root.style.setProperty('--accent',accent);
  root.style.setProperty('--accent-bg',accentBg);
  root.style.setProperty('--theme-primary',accent);
}
load();render();

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}
</script>
