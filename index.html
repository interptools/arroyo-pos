    const mfCat=document.createElement('div');mfCat.className='mf';mfCat.innerHTML='<label>Category</label>';
    const catInp=document.createElement('input');catInp.id='pCt';catInp.value=pp.cat;catInp.placeholder='e.g. Drinks';catInp.setAttribute('list','catdl');
    const dl=document.createElement('datalist');dl.id='catdl';cats.forEach(c=>{const o=document.createElement('option');o.value=c;dl.appendChild(o);});
    mfCat.appendChild(catInp);mfCat.appendChild(dl);grid.appendChild(mfCat);
    const mfIco=document.createElement('div');mfIco.className='mf';mfIco.innerHTML='<label>Icon (used when no photo)</label>';
    const icoSel=document.createElement('select');icoSel.id='pIc';
    ICONS.forEach(ic=>{const o=document.createElement('option');o.value=ic;o.textContent=ic;if(ic===pp.icon)o.selected=true;icoSel.appendChild(o);});
    mfIco.appendChild(icoSel);grid.appendChild(mfIco);

    // Sale price section
    const mfSale=document.createElement('div');mfSale.className='mf';mfSale.innerHTML='<label>Sale / discount %</label>';
    const saleRow=document.createElement('div');saleRow.style.cssText='display:flex;align-items:center;gap:10px;flex-wrap:wrap';
    const saleSel=document.createElement('select');saleSel.id='pSalePct';saleSel.style.cssText='padding:10px 12px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:15px;outline:none;flex:1';
    const saleOpts=[{v:0,l:'No sale (regular price)'},...[5,10,15,20,25,30,40,50,60,70].map(p=>({v:p,l:p+'% off'}))];
    saleOpts.forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.l;if((pp.salePct||0)===o.v)op.selected=true;saleSel.appendChild(op);});
    const salePreview=document.createElement('div');salePreview.style.cssText='font-size:13px;color:var(--df);font-weight:700;flex-shrink:0';
    function updateSalePreview(){
      const prEl=document.getElementById('pPr');
      const basePrice=prEl?parseFloat(prEl.value)||0:parseFloat(pp.price)||0;
      const pct=parseInt(saleSel.value)||0;
      salePreview.textContent=pct>0?'→ '+fmt(+(basePrice*(1-pct/100)).toFixed(2)):'';
    }
    saleSel.onchange=updateSalePreview;
    // Wire price input after grid is in DOM
    setTimeout(()=>{
      const prInp=document.getElementById('pPr');
      if(prInp)prInp.addEventListener('input',updateSalePreview);
      updateSalePreview();
    },80);
    saleRow.appendChild(saleSel);saleRow.appendChild(salePreview);mfSale.appendChild(saleRow);grid.appendChild(mfSale);


    const mfVar=document.createElement('div');mfVar.className='mf';mfVar.innerHTML='<label>Variants (size/color) — optional</label>';
    let variants=(pp.variants||[]).map(v=>({...v}));
    const varList=document.createElement('div');varList.style.cssText='display:flex;flex-direction:column;gap:6px';
    function refreshVarList(){
      varList.innerHTML='';
      variants.forEach((v,i)=>{
        const vr=document.createElement('div');vr.style.cssText='display:flex;align-items:center;gap:6px';
        const inp2=document.createElement('input');inp2.placeholder='Label (S/M/L)';inp2.value=v.label||'';inp2.style.cssText='flex:2;padding:8px;border-radius:8px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:13px;outline:none';inp2.oninput=function(){variants[i].label=this.value;};
        const prInp=document.createElement('input');prInp.type='number';prInp.placeholder='Price';prInp.value=v.price!==undefined?v.price:'';prInp.style.cssText='flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:13px;outline:none';prInp.oninput=function(){variants[i].price=parseFloat(this.value)||0;};
        const stInp=document.createElement('input');stInp.type='number';stInp.placeholder='Stock';stInp.value=v.stock===999?'':v.stock;stInp.style.cssText='flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:13px;outline:none';stInp.oninput=function(){variants[i].stock=stInp.value.trim()===''?999:parseInt(stInp.value)||0;};
        const vdl=document.createElement('button');vdl.textContent='×';vdl.style.cssText='width:30px;height:30px;border-radius:50%;border:1.5px solid var(--b2);background:none;color:var(--dt);cursor:pointer;font-size:16px;flex-shrink:0';vdl.onclick=function(){variants.splice(i,1);refreshVarList();};
        vr.appendChild(inp2);vr.appendChild(prInp);vr.appendChild(stInp);vr.appendChild(vdl);varList.appendChild(vr);
      });
    }
    refreshVarList();
    const addVBtn=document.createElement('button');addVBtn.className='abtn';addVBtn.textContent='+ Add variant';addVBtn.style.cssText='font-size:12px;padding:7px 12px;align-self:flex-start;margin-top:4px';
    addVBtn.onclick=function(){variants.push({label:'',price:0,stock:999});refreshVarList();};
    mfVar.appendChild(varList);mfVar.appendChild(addVBtn);grid.appendChild(mfVar);
    body.appendChild(grid);

    const btns=document.createElement('div');btns.className='mbtns';
    if(!isNew){const del=document.createElement('button');del.className='mdel';del.textContent='Delete';del.onclick=function(){S.prods=S.prods.filter(x=>x.id!==p.id);S.cart=S.cart.filter(x=>x.id!==p.id);const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];save();saveProductsToCloud();closeModal();toast('Deleted');};btns.appendChild(del);}
    const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=closeModal;
    const save2=document.createElement('button');save2.className='mpri';save2.textContent='Save';
    save2.onclick=function(){
      const name=document.getElementById('pNm').value.trim();
      const price=parseFloat(document.getElementById('pPr').value)||0;
      const sv=document.getElementById('pSt').value.trim();const stock=sv===''?999:parseInt(sv)||0;
      const cat=document.getElementById('pCt').value.trim()||'General';const icon=document.getElementById('pIc').value;
      if(!name){toast('Enter a product name');return;}
      const salePct=parseInt(document.getElementById('pSalePct').value)||0;
      const cleanVariants=variants.filter(v=>(v.label||'').trim());
      if(p){const idx=S.prods.findIndex(x=>x.id===p.id);if(idx>-1)S.prods[idx]={id:p.id,name,price,cat,icon,stock,variants:cleanVariants,img:pendingImg,salePct};}
      else S.prods.push({id:S.nid++,name,price,cat,icon,stock,variants:cleanVariants,img:pendingImg,salePct});
      const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];
      save();saveProductsToCloud();closeModal();toast(p?'Updated':'Added');
    };
    btns.appendChild(cancel);btns.appendChild(save2);body.appendChild(btns);

  } else if(m.type==='confirm'){
    const pr=S.prods.find(x=>x.id===m.pid);
    body.innerHTML='<div class="mtitle">Delete product</div><p style="font-size:14px;color:var(--t2);line-height:1.6">Remove "'+pr?.name+'"? Cannot be undone.</p>';
    const btns=document.createElement('div');btns.className='mbtns';
    const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=closeModal;
    const del=document.createElement('button');del.className='mpri';del.style.background='var(--df)';del.textContent='Delete';
    del.onclick=function(){S.prods=S.prods.filter(x=>x.id!==m.pid);S.cart=S.cart.filter(x=>x.id!==m.pid);const cs=[...new Set(S.prods.map(x=>x.cat))];S.cats=['All',...cs];save();saveProductsToCloud();closeModal();toast('Deleted');};
    btns.appendChild(cancel);btns.appendChild(del);body.appendChild(btns);
  } else if(m.type==='dailyReport'){
    const date=m.date;const range=m.range;const label=m.label||date;
    // Filter sales
    let filtered=S.sales.filter(function(s){
      const sd=new Date(s.date);
      if(range==='week'){const w=new Date();w.setDate(w.getDate()-7);return sd>=w;}
      if(range==='month'){const mo=new Date();mo.setDate(mo.getDate()-30);return sd>=mo;}
      if(range==='yesterday'){const y=new Date();y.setDate(y.getDate()-1);return sd.toDateString()===y.toDateString();}
      return sd.toISOString().slice(0,10)===date;
    });
    const totalAmt=filtered.reduce(function(a,s){return a+s.total;},0);
    const cashAmt=filtered.filter(function(s){return s.method==='Cash';}).reduce(function(a,s){return a+s.total;},0);
    const cardAmt=filtered.filter(function(s){return s.method==='Card';}).reduce(function(a,s){return a+s.total;},0);
    const gcashAmt=filtered.filter(function(s){return s.method==='GCash';}).reduce(function(a,s){return a+s.total;},0);

    const titleEl=document.createElement('div');titleEl.className='mtitle';titleEl.textContent='Sales Report - '+label;body.appendChild(titleEl);

    // Summary cards
    const sumGrid=document.createElement('div');sumGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px';
    [{l:'Total sales',v:filtered.length+' txns',big:false},{l:'Total revenue',v:fmt(totalAmt),big:true},{l:'Cash',v:fmt(cashAmt),big:false},{l:'Card',v:fmt(cardAmt),big:false},{l:'GCash',v:fmt(gcashAmt),big:false},{l:'Avg sale',v:filtered.length?fmt(totalAmt/filtered.length):fmt(0),big:false}].forEach(function(s){
      const box=document.createElement('div');box.style.cssText='background:var(--bg0);border-radius:12px;padding:12px';
      box.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">'+s.l+'</div><div style="font-size:'+(s.big?'20':'16')+'px;font-weight:800;color:'+(s.big?'var(--ac)':'var(--t1)')+'">'+s.v+'</div>';
      sumGrid.appendChild(box);
    });
    body.appendChild(sumGrid);

    // Items sold summary
    const validFiltered=filtered.filter(function(s){return !s.voided;});
    if(validFiltered.length>0){
      const itemMap2={};
      validFiltered.forEach(function(s){s.items.forEach(function(it){
        if(!itemMap2[it.name])itemMap2[it.name]={qty:0,total:0};
        itemMap2[it.name].qty+=it.qty;
        itemMap2[it.name].total+=it.price*it.qty;
      });});
      const sortedItems=Object.entries(itemMap2).sort(function(a,b){return b[1].qty-a[1].qty;});
      const isHd=document.createElement('div');isHd.style.cssText='font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;padding:4px 0 6px';isHd.textContent='Items Sold';body.appendChild(isHd);
      const isBox=document.createElement('div');isBox.style.cssText='background:var(--bg0);border-radius:12px;padding:12px;overflow:hidden';
      const isHeader=document.createElement('div');
      isHeader.style.cssText='display:grid;grid-template-columns:1fr 52px 90px;gap:4px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.4px;padding-bottom:6px;border-bottom:1px solid var(--b1);margin-bottom:4px';
      isHeader.innerHTML='<span>Item</span><span style="text-align:center">Qty</span><span style="text-align:right">Total</span>';
      isBox.appendChild(isHeader);
      sortedItems.forEach(function(entry){
        const nm=entry[0],d=entry[1];
        const irow=document.createElement('div');
        irow.style.cssText='display:grid;grid-template-columns:1fr 52px 90px;gap:4px;padding:6px 0;border-bottom:1px solid var(--b1);font-size:13px;align-items:center';
        irow.innerHTML='<span style="font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+nm+'</span>'
          +'<span style="text-align:center;font-weight:700;color:var(--t2)">'+d.qty+'</span>'
          +'<span style="text-align:right;font-weight:700;color:var(--ac)">'+fmt(d.total)+'</span>';
        isBox.appendChild(irow);
      });
      const totIRow=document.createElement('div');
      totIRow.style.cssText='display:grid;grid-template-columns:1fr 52px 90px;gap:4px;padding:7px 0 2px;font-size:13px;font-weight:800';
      const totalQtyAll=sortedItems.reduce(function(a,e){return a+e[1].qty;},0);
      totIRow.innerHTML='<span style="color:var(--t1)">Total</span>'
        +'<span style="text-align:center;color:var(--t2)">'+totalQtyAll+'</span>'
        +'<span style="text-align:right;color:var(--ac)">'+fmt(totalAmt)+'</span>';
      isBox.appendChild(totIRow);
      body.appendChild(isBox);
    }

    // Transaction list
    if(filtered.length>0){
      const listHd=document.createElement('div');listHd.style.cssText='font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;padding:4px 0';listHd.textContent='Transactions';body.appendChild(listHd);
      filtered.slice().reverse().forEach(function(s){
        const card=document.createElement('div');
        card.style.cssText='background:var(--bg0);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer';
        card.onclick=function(){closeModal();openModal({type:'viewtx',tx:s});};
        // Header
        const hdr=document.createElement('div');
        hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--b1)';
        hdr.innerHTML='<div>'
          +'<div style="font-size:12px;font-weight:700;color:var(--t1)">'+s.id+'</div>'
          +'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' &bull; '+s.method+'</div>'
          +(s.ref?'<div style="font-size:11px;color:var(--t3);margin-top:2px">Ref: '+s.ref+'</div>':'')
          +'</div>'
          +'<div style="text-align:right">'
          +'<div style="font-size:18px;font-weight:800;color:var(--ac)">'+fmt(s.total)+'</div>'
          +'</div>';
        card.appendChild(hdr);
        // Items list
        s.items.forEach(function(it){
          const irow=document.createElement('div');
          irow.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px';
          irow.innerHTML='<div style="display:flex;align-items:center;gap:8px">'
            +'<span style="font-size:11px;font-weight:700;color:var(--t3);background:var(--bg2);border-radius:6px;padding:2px 6px;min-width:28px;text-align:center">x'+it.qty+'</span>'
            +'<span style="color:var(--t1)">'+it.name+'</span>'
            +'</div>'
            +'<div style="display:flex;flex-direction:column;align-items:flex-end">'
            +'<span style="font-size:11px;color:var(--t3)">'+fmt(it.price)+' each</span>'
            +'<span style="font-size:13px;font-weight:700;color:var(--t1)">'+fmt(it.price*it.qty)+'</span>'
            +'</div>';
          card.appendChild(irow);
        });
        body.appendChild(card);
      });
    } else {
      const empty=document.createElement('div');empty.style.cssText='text-align:center;color:var(--t3);font-size:14px;padding:32px 0';empty.textContent='No transactions found.';body.appendChild(empty);
    }

    // Print button
    const printRow=document.createElement('div');printRow.style.cssText='display:flex;gap:8px;justify-content:flex-end;margin-top:8px';
    const closeB=document.createElement('button');closeB.textContent='Close';closeB.onclick=closeModal;
    const printB=document.createElement('button');printB.className='abtn pri';printB.textContent='Print report';
    printB.onclick=function(){
      const w=36;const line='='.repeat(w);const dline='-'.repeat(w);
      const lp=function(s,n){return String(s).length>=n?String(s).slice(0,n):String(s)+' '.repeat(n-String(s).length);};
      const rp=function(s,n){return String(s).length>=n?String(s).slice(0,n):' '.repeat(n-String(s).length)+String(s);};
      let html='<html><head><title>Sales Report - '+label+'</title>'
        +'<style>body{font-family:monospace;font-size:13px;color:#000;padding:20px;max-width:400px;margin:0 auto}'
        +'table{width:100%;border-collapse:collapse;margin:8px 0}'
        +'td{padding:3px 6px;font-size:12px}'
        +'td.r{text-align:right}'
        +'.hd{font-weight:bold;border-bottom:1px solid #000}'
        +'.tx{border-bottom:1px solid #ccc;padding:8px 0;margin:6px 0}'
        +'@media print{button{display:none}}'
        +'</style></head><body>';
      html+='<div style="text-align:center"><strong style="font-size:16px">'+S.bizName+'</strong><br/>';
      html+='<strong>DAILY SALES REPORT</strong><br/>';
      html+=label+'<br/>'+new Date().toLocaleString()+'</div>';
      html+='<hr/>';
      html+='<table>'
        +'<tr><td>Total transactions</td><td class="r"><strong>'+filtered.length+'</strong></td></tr>'
        +'<tr><td>Total revenue</td><td class="r"><strong>'+fmt(totalAmt)+'</strong></td></tr>'
        +'<tr><td>Cash</td><td class="r">'+fmt(cashAmt)+'</td></tr>'
        +'<tr><td>Card</td><td class="r">'+fmt(cardAmt)+'</td></tr>'
        +'<tr><td>GCash</td><td class="r">'+fmt(gcashAmt)+'</td></tr>'
        +'</table><hr/>';
      // Items sold summary in print
      const printValidF=filtered.filter(function(s){return !s.voided;});
      if(printValidF.length>0){
        const printItemMap={};
        printValidF.forEach(function(s){s.items.forEach(function(it){
          if(!printItemMap[it.name])printItemMap[it.name]={qty:0,total:0};
          printItemMap[it.name].qty+=it.qty;
          printItemMap[it.name].total+=it.price*it.qty;
        });});
        const printSorted=Object.entries(printItemMap).sort(function(a,b){return b[1].qty-a[1].qty;});
        html+='<strong>ITEMS SOLD</strong><br/>';
        html+='<table><tr class="hd"><td>Item</td><td class="r">Qty</td><td class="r">Total</td></tr>';
        printSorted.forEach(function(e){
          html+='<tr><td>'+e[0]+'</td><td class="r">'+e[1].qty+'</td><td class="r">'+fmt(e[1].total)+'</td></tr>';
        });
        const pTotalQty=printSorted.reduce(function(a,e){return a+e[1].qty;},0);
        html+='<tr style="font-weight:bold;border-top:2px solid #000"><td>Total</td><td class="r">'+pTotalQty+'</td><td class="r">'+fmt(totalAmt)+'</td></tr>';
        html+='</table><hr/>';
      }
      html+='<strong>TRANSACTIONS</strong><br/>';
      filtered.slice().reverse().forEach(function(s){
        html+='<div class="tx">';
        html+='<div style="display:flex;justify-content:space-between">'
          +'<span style="font-size:11px;color:#666">'+s.id+' &bull; '+new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span>'
          +'<span style="font-size:11px;color:#666">'+s.method+'</span>'
          +'</div>';
        if(s.ref)html+='<div style="font-size:11px;color:#666">Ref: '+s.ref+'</div>';
        html+='<table style="margin:4px 0">';
        s.items.forEach(function(it){
          html+='<tr>'
            +'<td style="padding:2px 0">x'+it.qty+'</td>'
            +'<td style="padding:2px 6px">'+it.name+'</td>'
            +'<td class="r" style="padding:2px 0">'+fmt(it.price*it.qty)+'</td>'
            +'</tr>';
        });
        html+='</table>';
        html+='<div style="text-align:right;font-weight:bold;border-top:1px solid #eee;padding-top:2px">Total: '+fmt(s.total)+'</div>';
        html+='</div>';
      });
      html+='<hr/><div style="text-align:center;font-size:11px;color:#666">Powered by Arroyo POS</div>';
      html+='<br/><div style="text-align:center"><button onclick="window.print()" style="padding:10px 24px;font-size:14px;cursor:pointer">Print</button></div>';
      html+='</body></html>';
      const win=window.open('','_blank','width=420,height=700');
      if(win){win.document.write(html);win.document.close();}
      else{toast('Allow popups to print report');}
    };
    printRow.appendChild(closeB);printRow.appendChild(printB);body.appendChild(printRow);
  }

    modal.appendChild(body);
  ov.appendChild(modal);
  app.appendChild(ov);
}

load();render();
// Auto-sync from cloud on every app open if signed in
(async function(){
  if(CLOUD.token&&CLOUD.bizId){
    await loadCloudData(true);
    render();
  }
})();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}
