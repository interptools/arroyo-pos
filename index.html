<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Arroyo POS" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="screen-orientation" content="portrait" />
<meta name="description" content="Universal Point of Sale by Reymar Arroyo" />
<title>Arroyo POS</title>
<link rel="manifest" href="manifest.json" />

<style>
  :root {
    --surface-0: #f4f4f2;
    --surface-1: #efefed;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5c5c58;
    --text-muted: #9a9a94;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.16);
    --border-stronger: rgba(0,0,0,0.32);
    --radius: 8px;
    --bg-accent: #e6f1fb;
    --text-accent: #185fa5;
    --border-accent: #85b7eb;
    --bg-success: #eaf3de;
    --text-success: #3b6d11;
    --bg-warning: #faeeda;
    --text-warning: #854f0b;
    --bg-danger: #fcebeb;
    --text-danger: #a32d2d;
    --border-danger: #f09595;
    --fill-danger: #e24b4a;
    --bg-pro: #eeedfe;
    --text-pro: #534ab7;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'Courier New', Courier, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-0: #1a1a18;
      --surface-1: #222220;
      --surface-2: #2c2c2a;
      --text-primary: #f0f0ec;
      --text-secondary: #a8a8a2;
      --text-muted: #666660;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.16);
      --border-stronger: rgba(255,255,255,0.28);
      --bg-accent: #0c447c;
      --text-accent: #85b7eb;
      --bg-success: #27500a;
      --text-success: #c0dd97;
      --bg-warning: #633806;
      --text-warning: #fac775;
      --bg-danger: #791f1f;
      --text-danger: #f09595;
      --border-danger: #a32d2d;
      --fill-danger: #e24b4a;
      --bg-pro: #3c3489;
      --text-pro: #afa9ec;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; position: fixed; top: 0; left: 0; }
  * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  input, textarea { user-select: text; -webkit-user-select: text; }
  #app { min-height: 100vh; }
  body { font-family: var(--font-sans); color: var(--text-primary); background: var(--surface-0); }
  #app { height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-stronger); border-radius: 4px; }

  /* Business selection screen */
  .biz-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 24px; flex: 1; overflow-y: auto; }
  .biz-logo { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .biz-sub { font-size: 14px; color: var(--text-secondary); text-align: center; margin-top: 4px; }
  .biz-note { font-size: 12px; color: var(--text-muted); text-align: center; max-width: 340px; line-height: 1.6; }
  .biz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; width: 100%; max-width: 520px; }
  .biz-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 18px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: border-color 0.15s, transform 0.1s; user-select: none; }
  .biz-card:hover { border-color: var(--border-stronger); }
  .biz-card:active { transform: scale(0.96); }
  .biz-card i { font-size: 26px; color: var(--text-secondary); }
  .biz-card span { font-size: 12px; font-weight: 500; text-align: center; }
  .biz-footer { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }

  /* Navbar */
  .navbar { display: flex; align-items: center; border-bottom: 0.5px solid var(--border); background: var(--surface-2); padding: 0 12px; flex-shrink: 0; overflow-x: auto; }
  .navbar::-webkit-scrollbar { height: 0; }
  .nav-brand { font-size: 14px; font-weight: 600; white-space: nowrap; padding-right: 8px; }
  .nav-biz { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--bg-accent); color: var(--text-accent); font-weight: 500; white-space: nowrap; }
  .nav-spacer { flex: 1; }
  .nav-tabs { display: flex; }
  .ntab { padding: 12px 10px; font-size: 12px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 4px; user-select: none; }
  .ntab.on { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .ntab i { font-size: 14px; }

  /* Main content area */
  .content { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }

  /* POS layout */
  .pos-wrap { display: grid; grid-template-columns: 1fr 280px; flex: 1; min-height: 0; overflow: hidden; }
  @media (max-width: 600px) { .pos-wrap { grid-template-columns: 1fr; } .pos-right { display: none; } .pos-right.show { display: flex; position: absolute; inset: 0; z-index: 10; } }
  .pos-left { display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow: hidden; }
  .pos-right { background: var(--surface-2); border-left: 0.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  /* Search & filters */
  .swrap { position: relative; }
  .swrap input { width: 100%; padding: 7px 10px 7px 30px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 13px; outline: none; }
  .swrap input:focus { border-color: var(--text-accent); }
  .swrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
  .cats { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 2px; }
  .cats::-webkit-scrollbar { height: 0; }
  .cpill { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); font-size: 12px; cursor: pointer; white-space: nowrap; user-select: none; }
  .cpill.on { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); }

  /* Product grid */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 7px; overflow-y: auto; flex: 1; }
  .pcard { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; transition: border-color 0.12s, transform 0.1s; user-select: none; }
  .pcard:hover { border-color: var(--border-stronger); }
  .pcard:active { transform: scale(0.95); }
  .pcard i { font-size: 24px; color: var(--text-secondary); }
  .pcard .pn { font-size: 11px; font-weight: 500; line-height: 1.3; }
  .pcard .pp { font-size: 12px; font-weight: 600; color: var(--text-accent); }
  .pcard .ps { font-size: 10px; color: var(--text-muted); }
  .pcard.lowst .ps { color: var(--text-warning); }
  .pcard.outst { opacity: 0.38; pointer-events: none; }

  /* Cart */
  .cart-hd { padding: 10px 12px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .cart-hd-l { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .cc { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: var(--text-primary); color: var(--surface-2); }
  .cclear { font-size: 11px; color: var(--text-danger); cursor: pointer; border: none; background: none; padding: 3px 6px; border-radius: var(--radius); }
  .cclear:hover { background: var(--bg-danger); }
  .cart-body { flex: 1; overflow-y: auto; padding: 6px 10px; }
  .cempty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 7px; color: var(--text-muted); }
  .cempty i { font-size: 28px; }
  .cempty span { font-size: 12px; }
  .citem { display: flex; align-items: center; gap: 5px; padding: 7px 2px; border-bottom: 0.5px solid var(--border); }
  .cin { flex: 1; overflow: hidden; }
  .cin .cn { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cin .cs { font-size: 10px; color: var(--text-secondary); }
  .qw { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qb { width: 20px; height: 20px; border-radius: 50%; border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .qb:hover { background: var(--surface-0); }
  .qn { font-size: 12px; font-weight: 500; min-width: 18px; text-align: center; }
  .ct { font-size: 12px; font-weight: 500; min-width: 46px; text-align: right; flex-shrink: 0; }

  /* Cart footer */
  .cart-ft { padding: 10px 12px; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .drow { display: flex; gap: 5px; }
  .drow input { flex: 1; padding: 6px 8px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 12px; outline: none; min-width: 0; }
  .drow select { padding: 6px 5px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 12px; outline: none; }
  .srow2 { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
  .stotal { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; padding-top: 5px; border-top: 0.5px solid var(--border); }
  .pgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .pbtn { padding: 9px 5px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; user-select: none; }
  .pbtn:hover { background: var(--surface-0); }
  .pbtn:active { transform: scale(0.97); }
  .pbtn i { font-size: 14px; }
  .pbtn.full { grid-column: 1/-1; background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); font-weight: 600; font-size: 13px; padding: 11px; }
  .pbtn.full:hover { opacity: 0.88; }

  /* Fullscreen sub-screens */
  .fullscreen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .subhd { padding: 12px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex-shrink: 0; }
  .subhd h2 { font-size: 14px; font-weight: 500; }
  .addbtn { padding: 7px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0; }
  .addbtn:hover { background: var(--surface-0); }
  .addbtn i { font-size: 14px; }

  /* Inventory */
  .inv-wrap { flex: 1; overflow: auto; padding: 10px 14px; }
  .inv-tbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  .inv-tbl th { text-align: left; padding: 7px 8px; color: var(--text-secondary); font-weight: 500; font-size: 11px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--surface-0); }
  .inv-tbl td { padding: 9px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .inv-tbl tr:last-child td { border-bottom: none; }
  .inv-tbl tr:hover td { background: var(--surface-1); }
  .sbadge { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .sok { background: var(--bg-success); color: var(--text-success); }
  .slow { background: var(--bg-warning); color: var(--text-warning); }
  .sout { background: var(--bg-danger); color: var(--text-danger); }
  .ract { display: flex; gap: 3px; }
  .rbtn { width: 26px; height: 26px; border-radius: var(--radius); border: 0.5px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
  .rbtn:hover { background: var(--surface-1); }
  .rbtn.del:hover { background: var(--bg-danger); color: var(--text-danger); border-color: var(--border-danger); }
  .rbtn i { font-size: 13px; }

  /* Transaction history */
  .hist-filters { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .hfpill { padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); font-size: 11px; cursor: pointer; user-select: none; }
  .hfpill.on { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); }
  .hist-wrap { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .day-group { margin-bottom: 18px; }
  .day-label { font-size: 11px; font-weight: 500; color: var(--text-muted); padding: 4px 0 5px; text-transform: uppercase; letter-spacing: .05em; }
  .day-sum { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
  .txcard { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .txcard:hover { border-color: var(--border-stronger); }
  .txcard:active { transform: scale(0.99); }
  .txleft { flex: 1; overflow: hidden; }
  .txid { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
  .txitems { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txtime { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  .txright { text-align: right; flex-shrink: 0; }
  .txtotal { font-size: 13px; font-weight: 600; }
  .txmethod { font-size: 10px; margin-top: 2px; padding: 1px 7px; border-radius: 20px; display: inline-block; }
  .txmethod.Cash { background: var(--bg-success); color: var(--text-success); }
  .txmethod.Card { background: var(--bg-accent); color: var(--text-accent); }
  .txmethod.GCash { background: var(--bg-pro); color: var(--text-pro); }
  .txmethod.Transfer { background: var(--bg-warning); color: var(--text-warning); }
  .empty-hist { text-align: center; color: var(--text-muted); font-size: 13px; padding: 48px 0; }

  /* Admin */
  .admin-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .asec { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .asec h3 { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .arow { display: flex; align-items: center; gap: 8px; }
  .arow label { font-size: 12px; color: var(--text-secondary); min-width: 110px; flex-shrink: 0; }
  .arow input, .arow select { flex: 1; padding: 7px 9px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 13px; outline: none; min-width: 0; }
  .abtnrow { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
  .abtn { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 12px; cursor: pointer; font-weight: 500; }
  .abtn:hover { background: var(--surface-0); }
  .abtn.pri { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); }
  .abtn.pri:hover { opacity: 0.88; }
  .danger-sec { border-color: var(--border-danger); }
  .danger-sec h3 { color: var(--text-danger); }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .stat { background: var(--surface-1); border-radius: var(--radius); padding: 10px; }
  .stat .sl { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .stat .sv { font-size: 16px; font-weight: 600; }

  /* About */
  .about-screen { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .about-pos-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 22px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  .pos-logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .pos-tagline { font-size: 13px; color: var(--text-secondary); }
  .pos-version { font-size: 11px; color: var(--text-muted); padding: 3px 10px; border-radius: 20px; background: var(--surface-1); border: 0.5px solid var(--border); }
  .feature-list { width: 100%; display: flex; flex-direction: column; gap: 4px; text-align: left; margin-top: 4px; }
  .feature-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--text-secondary); padding: 3px 0; line-height: 1.4; }
  .feature-row i { font-size: 14px; color: var(--text-success); flex-shrink: 0; margin-top: 1px; }
  .about-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 22px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  .about-avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--bg-accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--text-accent); }
  .about-name { font-size: 16px; font-weight: 600; }
  .about-title { font-size: 12px; color: var(--text-secondary); }
  .about-divider { width: 100%; height: 0.5px; background: var(--border); }
  .about-contact-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); width: 100%; }
  .about-contact-row i { font-size: 16px; color: var(--text-muted); width: 20px; text-align: center; flex-shrink: 0; }

  /* Lock screen */
  .lock-screen { display: flex; align-items: center; justify-content: center; flex: 1; }
  .lock-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 28px 22px; width: 280px; display: flex; flex-direction: column; gap: 12px; align-items: center; text-align: center; }
  .lock-card i.lock-icon { font-size: 32px; color: var(--text-secondary); }
  .lock-card h2 { font-size: 15px; font-weight: 500; }
  .lock-card p { font-size: 12px; color: var(--text-secondary); }
  .lock-card input { width: 100%; padding: 9px 10px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; }
  .lock-card input:focus { border-color: var(--text-accent); }
  .unlock-btn { width: 100%; padding: 10px; border-radius: var(--radius); border: none; background: var(--text-primary); color: var(--surface-2); font-size: 13px; cursor: pointer; font-weight: 600; }
  .unlock-btn:hover { opacity: 0.88; }
  .lerr { font-size: 12px; color: var(--text-danger); min-height: 16px; }

  /* Modal overlay */
  .ov { display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); position: absolute; inset: 0; z-index: 50; padding: 20px; }
  .ov.open { display: flex; }
  .modal { background: var(--surface-2); border-radius: 16px; padding: 22px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 13px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 15px; font-weight: 500; }
  .mf { display: flex; flex-direction: column; gap: 5px; }
  .mf label { font-size: 11px; color: var(--text-secondary); }
  .mf input, .mf select { padding: 8px 10px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 13px; width: 100%; outline: none; }
  .mf input:focus, .mf select:focus { border-color: var(--text-accent); }
  .mbtns { display: flex; gap: 7px; justify-content: flex-end; margin-top: 2px; }
  .mbtns button { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); cursor: pointer; font-size: 13px; }
  .mbtns button:hover { background: var(--surface-0); }
  .mbtns .mpri { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); font-weight: 500; }
  .mbtns .mpri:hover { opacity: 0.88; }
  .mbtns .mdel { color: var(--text-danger); margin-right: auto; }
  .mbtns .mdel:hover { background: var(--bg-danger); }
  .rbox { font-family: var(--font-mono); font-size: 11px; background: var(--surface-1); border-radius: 8px; padding: 14px; white-space: pre; overflow: auto; max-height: 280px; line-height: 1.8; border: 0.5px solid var(--border); }

  /* Toast */
  .toast-wrap { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 5px; pointer-events: none; z-index: 100; }
  .tst { background: var(--text-primary); color: var(--surface-2); padding: 7px 16px; border-radius: 20px; font-size: 12px; white-space: nowrap; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Print receipt */
  #print-area { display: none; }
  @media print {
    body > * { display: none !important; }
    #print-area { display: block !important; font-family: monospace; font-size: 13px; width: 100%; max-width: 320px; margin: 0 auto; color: #000; }
    #print-area .pr-line { border-top: 1px dashed #999; margin: 6px 0; }
    #print-area .pr-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; }
    #print-area .pr-total { display: flex; justify-content: space-between; padding: 3px 0; font-size: 14px; font-weight: 700; }
    #print-area .pr-center { text-align: center; }
    #print-area .pr-store { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 4px; }
  }

<script>
const CUR = '\u20B1', TAX = 0.12;
const CREATOR_PASS = 'ReeseK28@@@';
const CREATOR = { name: 'Reymar Arroyo', phone: '+639063964052', email: 'areymar36@gmail.com', product: 'Arroyo POS', version: '1.0' };
const BT = [
  { id: 'food', label: 'Food & dining', icon: 'ti-tools-kitchen-2' },
  { id: 'cafe', label: 'Cafe', icon: 'ti-coffee' },
  { id: 'retail', label: 'Retail', icon: 'ti-shirt' },
  { id: 'salon', label: 'Salon & spa', icon: 'ti-scissors' },
  { id: 'pharmacy', label: 'Pharmacy', icon: 'ti-pill' },
  { id: 'grocery', label: 'Grocery', icon: 'ti-shopping-cart' },
  { id: 'electronics', label: 'Electronics', icon: 'ti-device-laptop' },
  { id: 'custom', label: 'Custom', icon: 'ti-building-store' },
];
const DP = {
  food: [{ id:1, name:'Burger', price:150, cat:'Mains', icon:'ti-tools-kitchen-2', stock:40 }, { id:2, name:'Fries', price:65, cat:'Sides', icon:'ti-flame', stock:60 }, { id:3, name:'Iced tea', price:55, cat:'Drinks', icon:'ti-glass', stock:80 }, { id:4, name:'Rice meal', price:120, cat:'Mains', icon:'ti-bowl', stock:35 }],
  cafe: [{ id:1, name:'Espresso', price:90, cat:'Coffee', icon:'ti-coffee', stock:99 }, { id:2, name:'Latte', price:120, cat:'Coffee', icon:'ti-coffee', stock:99 }, { id:3, name:'Croissant', price:80, cat:'Pastry', icon:'ti-bread', stock:20 }, { id:4, name:'Cheesecake', price:110, cat:'Pastry', icon:'ti-cake', stock:15 }],
  retail: [{ id:1, name:'T-shirt', price:350, cat:'Tops', icon:'ti-shirt', stock:25 }, { id:2, name:'Jeans', price:800, cat:'Bottoms', icon:'ti-hanger', stock:12 }, { id:3, name:'Cap', price:250, cat:'Accessories', icon:'ti-hat', stock:30 }, { id:4, name:'Bag', price:550, cat:'Accessories', icon:'ti-backpack', stock:8 }],
  salon: [{ id:1, name:'Haircut', price:200, cat:'Hair', icon:'ti-scissors', stock:999 }, { id:2, name:'Color', price:800, cat:'Hair', icon:'ti-paint', stock:999 }, { id:3, name:'Manicure', price:250, cat:'Nails', icon:'ti-hand-finger', stock:999 }, { id:4, name:'Facial', price:500, cat:'Skin', icon:'ti-sparkles', stock:999 }],
  pharmacy: [{ id:1, name:'Paracetamol', price:15, cat:'OTC', icon:'ti-pill', stock:200 }, { id:2, name:'Vitamins', price:120, cat:'Supplements', icon:'ti-pill', stock:50 }, { id:3, name:'Bandage', price:35, cat:'First aid', icon:'ti-first-aid-kit', stock:80 }],
  grocery: [{ id:1, name:'Rice 5kg', price:280, cat:'Staples', icon:'ti-grain', stock:30 }, { id:2, name:'Eggs 12pcs', price:120, cat:'Dairy', icon:'ti-egg', stock:40 }, { id:3, name:'Milk', price:85, cat:'Dairy', icon:'ti-bottle', stock:25 }, { id:4, name:'Bread', price:65, cat:'Bakery', icon:'ti-bread', stock:20 }],
  electronics: [{ id:1, name:'USB cable', price:150, cat:'Accessories', icon:'ti-plug', stock:30 }, { id:2, name:'Earphones', price:450, cat:'Audio', icon:'ti-headphones', stock:15 }, { id:3, name:'Power bank', price:950, cat:'Charging', icon:'ti-battery-charging', stock:8 }],
  custom: [{ id:1, name:'Item 1', price:100, cat:'General', icon:'ti-package', stock:50 }],
};
const ICONS = ['ti-package','ti-tools-kitchen-2','ti-coffee','ti-shirt','ti-scissors','ti-pill','ti-grain','ti-device-laptop','ti-shopping-cart','ti-flame','ti-glass','ti-bowl','ti-bread','ti-cake','ti-hanger','ti-hat','ti-backpack','ti-paint','ti-hand-finger','ti-sparkles','ti-egg','ti-bottle','ti-plug','ti-headphones','ti-battery-charging','ti-device-mobile','ti-first-aid-kit','ti-temperature','ti-tag','ti-box','ti-fish','ti-meat','ti-salad','ti-soup'];

let S = { screen:'biz', biz:null, bizName:'', prods:[], cats:[], cart:[], cat:'All', search:'', disc:0, discType:'%', pass:'1234', locked:true, nid:10, sales:[], salesTotal:0, modal:null, histFilter:'all', histSearch:'' };

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('arroyo_pos') || '{}');
    if (d.biz) { S.biz=d.biz; S.bizName=d.bizName; S.prods=d.prods||[]; S.cats=d.cats||[]; S.pass=d.pass||'1234'; S.nid=d.nid||10; S.sales=d.sales||[]; S.salesTotal=d.salesTotal||0; S.screen='pos'; }
  } catch(e) {}
}
function save() {
  localStorage.setItem('arroyo_pos', JSON.stringify({ biz:S.biz, bizName:S.bizName, prods:S.prods, cats:S.cats, pass:S.pass, nid:S.nid, sales:S.sales, salesTotal:S.salesTotal }));
}
function fmt(n) { return CUR + (+n).toFixed(2); }
function toast(msg) {
  const t = document.createElement('div'); t.className = 'tst'; t.textContent = msg;
  document.getElementById('toasts').appendChild(t); setTimeout(() => t.remove(), 2400);
}
function sub() { return S.cart.reduce((s, i) => s + i.price * i.qty, 0); }
function damt() { const s = sub(); return S.discType === '%' ? s * Math.min(S.disc, 100) / 100 : Math.min(S.disc, s); }
function tamt() { return (sub() - damt()) * TAX; }
function tot() { return sub() - damt() + tamt(); }
function txId() { return 'TXN-' + String(S.sales.length + 1).padStart(5, '0'); }

function initBiz(id) {
  const b = BT.find(x => x.id === id);
  S.biz = id; S.bizName = b.label.charAt(0).toUpperCase() + b.label.slice(1);
  S.prods = JSON.parse(JSON.stringify(DP[id] || []));
  const cs = [...new Set(S.prods.map(p => p.cat))];
  S.cats = ['All', ...cs]; S.nid = S.prods.length + 1; S.screen = 'pos';
  save(); render();
}
function addToCart(p) {
  const ex = S.cart.find(i => i.id === p.id);
  if (ex) ex.qty++; else S.cart.push({ id:p.id, name:p.name, price:p.price, qty:1 });
  render(); toast(p.name + ' added');
}
function chgQty(id, d) {
  const it = S.cart.find(i => i.id === id); if (!it) return;
  it.qty += d; if (it.qty <= 0) S.cart = S.cart.filter(i => i.id !== id);
  render();
}

function receiptStr(method, id) {
  const now = new Date(); const w = 32;
  const lp = (s, n) => (s+'').length >= n ? (s+'').slice(0,n) : s + ' '.repeat(n - (s+'').length);
  const rp = (s, n) => (s+'').length >= n ? (s+'').slice(0,n) : ' '.repeat(n - (s+'').length) + s;
  const line = '-'.repeat(w);
  const rows = [lp(S.bizName, w), line, 'Date: ' + now.toLocaleString(), 'TXN:  ' + id, line];
  S.cart.forEach(i => { const r = fmt(i.price * i.qty); rows.push(lp(i.name + ' x' + i.qty, w - r.length) + r); });
  rows.push(line);
  const addR = (l, r) => rows.push(lp(l, w - r.length) + r);
  addR('Subtotal:', fmt(sub()));
  if (S.disc > 0) addR('Discount:', '-' + fmt(damt()));
  addR('VAT (12%):', fmt(tamt()));
  rows.push(line);
  const tr = fmt(tot()); rows.push(lp('TOTAL:', w - tr.length) + tr);
  rows.push('Payment: ' + method); rows.push(line);
  rows.push(rp('Powered by ' + CREATOR.product, w));
  return rows.join('\n');
}

function printReceipt(receiptText) {
  const pa = document.getElementById('print-area');
  pa.innerHTML = '<div class="pr-store">' + S.bizName + '</div>' + '<div class="pr-line"></div>' + receiptText.split('\n').map(l => '<div class="pr-center" style="font-size:11px;line-height:1.7">' + l + '</div>').join('');
  window.print();
}

function openModal(m) { S.modal = m; render(); }
function closeModal() { S.modal = null; render(); }

function render() {
  const app = document.getElementById('app');
  const tc = document.getElementById('toasts');
  app.innerHTML = ''; app.appendChild(tc);
  if (S.screen === 'biz') { renderBiz(app); return; }
  renderNav(app);
  const body = document.createElement('div'); body.className = 'content';
  if (S.screen === 'pos') renderPOS(body);
  else if (S.screen === 'inv') renderInv(body);
  else if (S.screen === 'hist') renderHist(body);
  else if (S.screen === 'about') renderAbout(body);
  else if (S.screen === 'admin') { S.locked ? renderLock(body) : renderAdmin(body); }
  app.appendChild(body);
  if (S.modal) renderModal(body);
}

function renderBiz(app) {
  const d = document.createElement('div'); d.className = 'biz-screen';
  d.innerHTML = `
    <div style="text-align:center">
      <div class="biz-logo">${CREATOR.product}</div>
      <div class="biz-sub">Set up your business</div>
    </div>
    <div class="biz-grid">${BT.map(b => `<div class="biz-card" data-b="${b.id}"><i class="ti ${b.icon}" aria-hidden="true"></i><span>${b.label}</span></div>`).join('')}</div>
    <p class="biz-note">Choose once - this becomes your permanent POS profile on this device. Cannot be changed without admin access.</p>
    <div class="biz-footer"><i class="ti ti-code" style="font-size:13px" aria-hidden="true"></i><span>Built by <strong>${CREATOR.name}</strong> · ${CREATOR.email}</span></div>`;
  d.querySelectorAll('.biz-card').forEach(c => c.addEventListener('click', () => {
    if (confirm('Set up as "' + BT.find(x => x.id === c.dataset.b).label + '"?\n\nThis cannot be changed without admin access.')) initBiz(c.dataset.b);
  }));
  app.appendChild(d);
}

function renderNav(app) {
  const b = BT.find(x => x.id === S.biz) || { label: 'Shop' };
  const nav = document.createElement('nav'); nav.className = 'navbar';
  nav.innerHTML = `<span class="nav-brand">${S.bizName}</span><span class="nav-biz">${b.label}</span><div class="nav-spacer"></div>
  <div class="nav-tabs">
    <div class="ntab${S.screen==='pos'?' on':''}" data-s="pos"><i class="ti ti-shopping-bag" aria-hidden="true"></i>POS</div>
    <div class="ntab${S.screen==='inv'?' on':''}" data-s="inv"><i class="ti ti-clipboard-list" aria-hidden="true"></i>Inventory</div>
    <div class="ntab${S.screen==='hist'?' on':''}" data-s="hist"><i class="ti ti-history" aria-hidden="true"></i>History</div>
    <div class="ntab${S.screen==='admin'?' on':''}" data-s="admin"><i class="ti ti-lock" aria-hidden="true"></i>Admin</div>
    <div class="ntab${S.screen==='about'?' on':''}" data-s="about"><i class="ti ti-info-circle" aria-hidden="true"></i>About</div>
  </div>`;
  nav.querySelectorAll('.ntab').forEach(t => t.addEventListener('click', () => { if (t.dataset.s === 'admin') S.locked = true; S.screen = t.dataset.s; render(); }));
  app.appendChild(nav);
}

function renderPOS(body) {
  const filtered = S.prods.filter(p => (S.cat === 'All' || p.cat === S.cat) && (!S.search || p.name.toLowerCase().includes(S.search.toLowerCase())));
  const cc = S.cart.reduce((s, i) => s + i.qty, 0);
  const w = document.createElement('div'); w.className = 'pos-wrap';
  w.innerHTML = `<div class="pos-left">
    <div class="swrap"><i class="ti ti-search" aria-hidden="true"></i><input id="srch" placeholder="Search products..." value="${S.search}" /></div>
    <div class="cats">${S.cats.map(c => `<div class="cpill${S.cat===c?' on':''}" data-c="${c}">${c}</div>`).join('')}</div>
    <div class="pgrid">${filtered.map(p => { const out=p.stock!==999&&p.stock<=0,low=p.stock!==999&&p.stock>0&&p.stock<=5; return `<div class="pcard${low?' lowst':''}${out?' outst':''}" data-pid="${p.id}"><i class="ti ${p.icon}" aria-hidden="true"></i><div class="pn">${p.name}</div><div class="pp">${fmt(p.price)}</div><div class="ps">${p.stock===999?'unlimited':out?'out of stock':low?p.stock+' left':p.stock+' in stock'}</div></div>`; }).join('')}</div>
  </div>
  <div class="pos-right">
    <div class="cart-hd">
      <div class="cart-hd-l"><i class="ti ti-shopping-cart" style="font-size:15px" aria-hidden="true"></i>Cart${cc>0?`<span class="cc">${cc}</span>`:''}</div>
      ${S.cart.length ? `<button class="cclear">Clear all</button>` : ''}
    </div>
    <div class="cart-body">
      ${!S.cart.length ? `<div class="cempty"><i class="ti ti-shopping-cart-off" aria-hidden="true"></i><span>Cart is empty</span></div>` : ''}
      ${S.cart.map(it => `<div class="citem"><div class="cin"><div class="cn">${it.name}</div><div class="cs">${fmt(it.price)} each</div></div><div class="qw"><button class="qb" data-id="${it.id}" data-d="-1">-</button><span class="qn">${it.qty}</span><button class="qb" data-id="${it.id}" data-d="1">+</button></div><div class="ct">${fmt(it.price*it.qty)}</div></div>`).join('')}
    </div>
    <div class="cart-ft">
      <div class="drow"><input id="discIn" type="number" min="0" placeholder="Discount" value="${S.disc||''}" /><select id="discTypeSel"><option value="%"${S.discType==='%'?' selected':''}>%</option><option value="flat"${S.discType==='flat'?' selected':''}>Flat</option></select></div>
      <div class="srow2"><span>Subtotal</span><span>${fmt(sub())}</span></div>
      ${S.disc>0?`<div class="srow2" style="color:var(--text-success)"><span>Discount</span><span>-${fmt(damt())}</span></div>`:''}
      <div class="srow2"><span>VAT 12%</span><span>${fmt(tamt())}</span></div>
      <div class="stotal"><span>Total</span><span>${fmt(tot())}</span></div>
      <div class="pgrid2">
        <button class="pbtn" data-pay="Cash"><i class="ti ti-cash" aria-hidden="true"></i>Cash</button>
        <button class="pbtn" data-pay="Card"><i class="ti ti-credit-card" aria-hidden="true"></i>Card</button>
        <button class="pbtn" data-pay="GCash"><i class="ti ti-device-mobile" aria-hidden="true"></i>GCash</button>
        <button class="pbtn" data-pay="Transfer"><i class="ti ti-building-bank" aria-hidden="true"></i>Transfer</button>
        <button class="pbtn full" data-pay="Cash"><i class="ti ti-receipt" aria-hidden="true"></i>Checkout</button>
      </div>
    </div>
  </div>`;
  w.querySelector('#srch').addEventListener('input', e => { S.search = e.target.value; render(); });
  w.querySelectorAll('.cpill').forEach(c => c.addEventListener('click', () => { S.cat = c.dataset.c; render(); }));
  w.querySelectorAll('.pcard[data-pid]').forEach(c => c.addEventListener('click', () => { const p = S.prods.find(x => x.id === +c.dataset.pid); if (p) addToCart(p); }));
  w.querySelector('.cclear')?.addEventListener('click', () => { S.cart = []; S.disc = 0; render(); });
  w.querySelectorAll('.qb').forEach(b => b.addEventListener('click', () => chgQty(+b.dataset.id, +b.dataset.d)));
  w.querySelector('#discIn').addEventListener('input', e => { S.disc = parseFloat(e.target.value) || 0; render(); });
  w.querySelector('#discTypeSel').addEventListener('change', e => { S.discType = e.target.value; render(); });
  w.querySelectorAll('.pbtn[data-pay]').forEach(b => b.addEventListener('click', () => { if (!S.cart.length) { toast('Add items to cart first'); return; } openModal({ type:'pay', method:b.dataset.pay }); }));
  body.appendChild(w);
}

function renderInv(body) {
  const wrap = document.createElement('div'); wrap.className = 'fullscreen';
  const lowCnt = S.prods.filter(p => p.stock!==999&&p.stock>0&&p.stock<=5).length;
  const outCnt = S.prods.filter(p => p.stock!==999&&p.stock<=0).length;
  wrap.innerHTML = `<div class="subhd"><div><h2>Inventory</h2><div class="stat-row" style="margin-top:8px;max-width:320px"><div class="stat"><div class="sl">Items</div><div class="sv">${S.prods.length}</div></div><div class="stat"><div class="sl" style="color:var(--text-warning)">Low stock</div><div class="sv" style="color:var(--text-warning)">${lowCnt}</div></div><div class="stat"><div class="sl" style="color:var(--text-danger)">Out</div><div class="sv" style="color:var(--text-danger)">${outCnt}</div></div></div></div><button class="addbtn" id="addPr"><i class="ti ti-plus" aria-hidden="true"></i>Add product</button></div>
  <div class="inv-wrap"><table class="inv-tbl"><thead><tr><th style="width:28px"></th><th>Product</th><th style="width:90px">Category</th><th style="width:70px">Price</th><th style="width:75px">Stock</th><th style="width:58px"></th></tr></thead>
  <tbody>${S.prods.map(p => { const out=p.stock!==999&&p.stock<=0,low=p.stock!==999&&p.stock>0&&p.stock<=5; return `<tr><td><i class="ti ${p.icon}" style="font-size:16px;color:var(--text-secondary)" aria-hidden="true"></i></td><td style="font-weight:500">${p.name}</td><td style="color:var(--text-secondary)">${p.cat}</td><td>${fmt(p.price)}</td><td><span class="sbadge ${out?'sout':low?'slow':'sok'}">${p.stock===999?'inf':out?'out':low?p.stock+' low':p.stock}</span></td><td><div class="ract"><button class="rbtn epr" data-pid="${p.id}" title="Edit"><i class="ti ti-edit" aria-hidden="true"></i></button><button class="rbtn del dpr" data-pid="${p.id}" title="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button></div></td></tr>`; }).join('')}</tbody></table></div>`;
  wrap.querySelector('#addPr').addEventListener('click', () => openModal({ type:'prod', prod:null }));
  wrap.querySelectorAll('.epr').forEach(b => b.addEventListener('click', () => { const p = S.prods.find(x => x.id === +b.dataset.pid); if (p) openModal({ type:'prod', prod:{...p} }); }));
  wrap.querySelectorAll('.dpr').forEach(b => b.addEventListener('click', () => openModal({ type:'confirm', pid:+b.dataset.pid })));
  body.appendChild(wrap);
}

function renderHist(body) {
  const wrap = document.createElement('div'); wrap.className = 'fullscreen';
  const filt = S.sales.filter(s => {
    const d = new Date(s.date);
    if (S.histFilter === 'today') { const t = new Date(); return d.toDateString() === t.toDateString(); }
    if (S.histFilter === 'week') { const w = new Date(); w.setDate(w.getDate()-7); return d >= w; }
    if (S.histFilter === 'month') { const m = new Date(); m.setDate(m.getDate()-30); return d >= m; }
    return true;
  }).filter(s => !S.histSearch || s.items.some(i => i.name.toLowerCase().includes(S.histSearch.toLowerCase())) || s.id.toLowerCase().includes(S.histSearch.toLowerCase()) || s.method.toLowerCase().includes(S.histSearch.toLowerCase()));
  const byDay = {}; filt.slice().reverse().forEach(s => { const k = new Date(s.date).toDateString(); if (!byDay[k]) byDay[k] = []; byDay[k].push(s); });
  const totalAmt = filt.reduce((a, s) => a + s.total, 0);
  wrap.innerHTML = `<div class="subhd"><h2>Transaction history</h2><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:600">${fmt(totalAmt)}</div><div style="font-size:10px;color:var(--text-muted)">${filt.length} transactions</div></div></div>
  <div class="hist-filters">
    <div class="swrap" style="flex:1;min-width:120px"><i class="ti ti-search" aria-hidden="true"></i><input id="hsrch" placeholder="Search..." value="${S.histSearch}" style="width:100%;padding:6px 8px 6px 28px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-primary);font-size:12px;outline:none" /></div>
    ${['all','today','week','month'].map(f => `<div class="hfpill${S.histFilter===f?' on':''}" data-f="${f}">${f==='all'?'All time':f==='today'?'Today':f==='week'?'This week':'This month'}</div>`).join('')}
  </div>
  <div class="hist-wrap">${Object.keys(byDay).length===0?`<div class="empty-hist">No transactions found.</div>`:''}${Object.entries(byDay).map(([ds,txs])=>{ const dayTot=txs.reduce((a,s)=>a+s.total,0); const today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString(); const label=ds===today?'Today':ds===yest?'Yesterday':new Date(ds).toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'}); return `<div class="day-group"><div class="day-label">${label}</div><div class="day-sum">${txs.length} transaction${txs.length!==1?'s':''} · ${fmt(dayTot)}</div>${txs.map(s=>`<div class="txcard" data-txid="${s.id}"><div class="txleft"><div class="txid">${s.id}</div><div class="txitems">${s.items.map(i=>i.name+' x'+i.qty).join(', ')}</div><div class="txtime">${new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div><div class="txright"><div class="txtotal">${fmt(s.total)}</div><div class="txmethod ${s.method}">${s.method}</div></div></div>`).join('')}</div>`; }).join('')}</div>`;
  wrap.querySelector('#hsrch').addEventListener('input', e => { S.histSearch = e.target.value; render(); });
  wrap.querySelectorAll('.hfpill').forEach(p => p.addEventListener('click', () => { S.histFilter = p.dataset.f; render(); }));
  wrap.querySelectorAll('.txcard').forEach(c => c.addEventListener('click', () => { const tx = S.sales.find(s => s.id === c.dataset.txid); if (tx) openModal({ type:'viewtx', tx }); }));
  body.appendChild(wrap);
}

function renderLock(body) {
  const w = document.createElement('div'); w.className = 'lock-screen';
  w.innerHTML = `<div class="lock-card"><i class="ti ti-lock lock-icon" aria-hidden="true"></i><h2>Admin access</h2><p>Enter your password to continue.</p><input type="password" id="lpin" placeholder="****" maxlength="30" /><span class="lerr" id="lerr"></span><button class="unlock-btn" id="ulbtn">Unlock</button></div>`;
  const tryUnlock = () => { if (w.querySelector('#lpin').value === S.pass) { S.locked = false; render(); } else { w.querySelector('#lerr').textContent = 'Incorrect password.'; w.querySelector('#lpin').value = ''; w.querySelector('#lpin').focus(); } };
  w.querySelector('#ulbtn').addEventListener('click', tryUnlock);
  w.querySelector('#lpin').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  body.appendChild(w);
}

function renderAdmin(body) {
  const w = document.createElement('div'); w.className = 'fullscreen';
  const tx30 = S.sales.filter(s => new Date(s.date) >= new Date(Date.now()-30*86400000));
  const tx30tot = tx30.reduce((a,s) => a+s.total, 0);
  const avg = S.sales.length ? S.salesTotal / S.sales.length : 0;
  w.innerHTML = `<div class="subhd"><h2>Admin</h2><button class="addbtn" id="lockAdm"><i class="ti ti-lock" aria-hidden="true"></i>Lock admin</button></div>
  <div class="admin-body">
    <div class="asec"><h3>Shop settings</h3><div class="arow"><label>Shop name</label><input id="aName" value="${S.bizName}" /></div><div class="abtnrow"><button class="abtn pri" id="saveShop">Save</button></div></div>
    
    <div class="asec" style="border-color:#afa9ec"><h3 style="color:#534ab7"><i class="ti ti-shield-lock" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Business type <span style="font-size:10px;padding:2px 7px;border-radius:20px;background:#eeedfe;color:#534ab7;margin-left:4px;font-weight:500">Creator only</span></h3><p style="font-size:12px;color:var(--text-secondary);line-height:1.5">Changing the business type requires the creator password. Contact <strong>${CREATOR.name}</strong> at ${CREATOR.phone}.</p><div class="abtnrow"><button class="abtn" style="color:#534ab7;border-color:#afa9ec" id="changeBizBtn"><i class="ti ti-shield-lock" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Change business type</button></div></div>
    <div class="asec"><h3>Sales summary</h3><div class="stat-row"><div class="stat"><div class="sl">All transactions</div><div class="sv">${S.sales.length}</div></div><div class="stat"><div class="sl">Total revenue</div><div class="sv" style="font-size:13px">${fmt(S.salesTotal)}</div></div><div class="stat"><div class="sl">Avg. sale</div><div class="sv" style="font-size:13px">${fmt(avg)}</div></div></div><div class="stat-row" style="margin-top:7px"><div class="stat"><div class="sl">Last 30 days</div><div class="sv">${tx30.length} txns</div></div><div class="stat"><div class="sl">30-day revenue</div><div class="sv" style="font-size:13px">${fmt(tx30tot)}</div></div><div class="stat"><div class="sl">Products</div><div class="sv">${S.prods.length}</div></div></div><div class="abtnrow"><button class="abtn" id="clearSales">Clear sales data</button></div></div>
    <div class="asec"><h3>Change password</h3><div class="arow"><label>Current password</label><input type="password" id="aCur" placeholder="Current password" /></div><div class="arow"><label>New password</label><input type="password" id="aNew" placeholder="Min. 4 characters" /></div><div class="arow"><label>Confirm new</label><input type="password" id="aCon" placeholder="Confirm new password" /></div><div class="abtnrow"><span id="pwMsg" style="font-size:11px;flex:1;line-height:1.4"></span><button class="abtn pri" id="chgPw">Change password</button></div></div>
    <div class="asec danger-sec"><h3>Danger zone</h3>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><span style="font-size:12px;color:var(--text-secondary);line-height:1.5">Reset all products to defaults for current business type.</span><button class="abtn" id="resetPr" style="flex-shrink:0">Reset products</button></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px"><span style="font-size:12px;color:var(--text-secondary);line-height:1.5">Wipe all data and re-select business type from scratch.</span><button class="abtn" style="color:var(--text-danger);flex-shrink:0" id="factoryReset">Factory reset</button></div>
    </div>
    <div class="asec" style="align-items:center;text-align:center;padding:14px;gap:5px">
      <div style="font-size:13px;font-weight:600">${CREATOR.product}</div>
      <div style="font-size:11px;color:var(--text-muted)">Built by ${CREATOR.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${CREATOR.phone} · ${CREATOR.email}</div>
    </div>
  </div>`;
  w.querySelector('#lockAdm').addEventListener('click', () => { S.locked = true; S.screen = 'pos'; render(); });
  w.querySelector('#saveShop').addEventListener('click', () => { S.bizName = w.querySelector('#aName').value || S.bizName; save(); render(); toast('Settings saved'); });
  w.querySelector('#changeBizBtn').addEventListener('click', () => openModal({type:'creatorAuth',action:'changeBiz'}));
  w.querySelector('#clearSales').addEventListener('click', () => { if (confirm('Clear all sales data? This cannot be undone.')) { S.sales=[]; S.salesTotal=0; save(); render(); toast('Sales data cleared'); } });
  w.querySelector('#chgPw').addEventListener('click', () => {
    const cur=w.querySelector('#aCur').value, nw=w.querySelector('#aNew').value, con=w.querySelector('#aCon').value;
    const msg=w.querySelector('#pwMsg');
    if (cur !== S.pass) { msg.style.color='var(--text-danger)'; msg.textContent='Current password is wrong.'; return; }
    if (nw.length < 4) { msg.style.color='var(--text-danger)'; msg.textContent='Minimum 4 characters required.'; return; }
    if (nw !== con) { msg.style.color='var(--text-danger)'; msg.textContent='Passwords do not match.'; return; }
    S.pass = nw; save(); msg.style.color='var(--text-success)'; msg.textContent='Password changed successfully.';
    setTimeout(() => { msg.textContent=''; }, 3000);
  });
  w.querySelector('#resetPr').addEventListener('click', () => { if (confirm('Reset all products to defaults?')) { S.prods=JSON.parse(JSON.stringify(DP[S.biz]||[])); const cs=[...new Set(S.prods.map(p=>p.cat))]; S.cats=['All',...cs]; S.nid=S.prods.length+1; save(); render(); toast('Products reset to defaults'); } });
  w.querySelector('#factoryReset').addEventListener('click', () => {
    if (confirm('WARNING: This will wipe ALL data including products and sales history.\n\nAre you sure?')) {
      if (confirm('Final confirmation: delete everything and start over?')) { localStorage.removeItem('arroyo_pos'); S={screen:'biz',biz:null,bizName:'',prods:[],cats:[],cart:[],cat:'All',search:'',disc:0,discType:'%',pass:'1234',locked:true,nid:10,sales:[],salesTotal:0,modal:null,histFilter:'all',histSearch:''}; render(); }
    }
  });
  body.appendChild(w);
}

function renderModal(body) {
  const m = S.modal;
  const ov = document.createElement('div'); ov.className = 'ov open'; let html = '';
  if (m.type === 'creatorAuth') {
    html = `<div class="modal"><div style="font-size:10px;padding:2px 8px;border-radius:20px;background:#eeedfe;color:#534ab7;font-weight:500;display:inline-block;margin-bottom:4px"><i class="ti ti-shield-lock" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Creator access required</div><h2>Change business type</h2><p style="font-size:12px;color:var(--text-secondary);line-height:1.6">This action is restricted to the creator. Enter the creator password to continue.</p><div class="mf"><label>Creator password</label><input type="password" id="cpInput" placeholder="Enter creator password" /></div><span id="cpErr" style="font-size:11px;color:var(--text-danger);min-height:14px;display:block"></span><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" style="background:#534ab7;border-color:#534ab7" id="cpVerify"><i class="ti ti-shield-check" style="font-size:12px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Verify</button></div></div>`;
  } else if (m.type === 'changeBiz') {
    html = `<div class="modal"><div style="font-size:10px;padding:2px 8px;border-radius:20px;background:#eeedfe;color:#534ab7;font-weight:500;display:inline-block;margin-bottom:4px"><i class="ti ti-shield-check" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Creator access granted</div><h2>Change business type</h2><p style="font-size:12px;color:var(--text-danger);line-height:1.6">Changing will reset all products to the new type's defaults. Sales history is preserved.</p><div class="mf"><label>Select new business type</label><select id="nbizSel">${BT.map(b=>`<option value="${b.id}"${b.id===S.biz?' selected':''}>${b.label}</option>`).join('')}</select></div><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" style="background:#534ab7;border-color:#534ab7" id="confirmBizChange">Change</button></div></div>`;
  } else if (m.type === 'pay') {
    const id = txId();
    html = `<div class="modal"><h2><i class="ti ti-receipt" style="font-size:14px;vertical-align:-2px;margin-right:6px" aria-hidden="true"></i>Receipt - ${m.method}</h2><div class="rbox" id="rcptTxt">${receiptStr(m.method, id)}</div><div class="mbtns"><button id="mPrint"><i class="ti ti-printer" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Print</button><button id="mClose">Close</button><button class="mpri" id="mFinish"><i class="ti ti-check" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Confirm sale</button></div></div>`;
  } else if (m.type === 'viewtx') {
    html = `<div class="modal"><h2><i class="ti ti-receipt" style="font-size:14px;vertical-align:-2px;margin-right:6px" aria-hidden="true"></i>${m.tx.id}</h2><div class="rbox">${m.tx.receipt}</div><div class="mbtns"><button id="mPrintOld"><i class="ti ti-printer" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Print</button><button id="mClose">Close</button></div></div>`;
  } else if (m.type === 'prod') {
    const p=m.prod; const isNew=!p; const pp=p||{name:'',price:'',cat:'',icon:'ti-package',stock:''};
    const cats=[...new Set(S.prods.map(x=>x.cat))];
    html = `<div class="modal"><h2>${isNew?'Add product':'Edit product'}</h2><div class="mf"><label>Product name</label><input id="pNm" value="${pp.name}" placeholder="e.g. Espresso" /></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="mf"><label>Price (${CUR})</label><input id="pPr" type="number" value="${pp.price}" min="0" step="0.01" /></div><div class="mf"><label>Stock (blank = inf)</label><input id="pSt" type="number" value="${pp.stock===999?'':pp.stock}" min="0" /></div></div><div class="mf"><label>Category</label><input id="pCt" value="${pp.cat}" placeholder="e.g. Drinks" list="catdl" /><datalist id="catdl">${cats.map(c=>`<option value="${c}">`).join('')}</datalist></div><div class="mf"><label>Icon</label><select id="pIc">${ICONS.map(ic=>`<option value="${ic}"${ic===pp.icon?' selected':''}>${ic.replace('ti-','')}</option>`).join('')}</select></div><div class="mbtns">${!isNew?`<button class="mdel" id="mDelPr">Delete</button>`:''}<button id="mClose">Cancel</button><button class="mpri" id="mSavePr">Save</button></div></div>`;
  } else if (m.type === 'confirm') {
    const p = S.prods.find(x => x.id === m.pid);
    html = `<div class="modal"><h2>Delete product</h2><p style="font-size:13px;color:var(--text-secondary);line-height:1.6">Remove "${p?.name}" from inventory? This cannot be undone.</p><div class="mbtns"><button id="mClose">Cancel</button><button class="mpri" style="background:var(--fill-danger);border-color:var(--fill-danger)" id="mConfDel">Delete</button></div></div>`;
  }
  ov.innerHTML = html;
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  ov.querySelector('#mClose')?.addEventListener('click', closeModal);
  ov.querySelector('#cpVerify')?.addEventListener('click', () => {
    const val = ov.querySelector('#cpInput').value;
    if (val === CREATOR_PASS) { closeModal(); openModal({type:'changeBiz'}); }
    else { ov.querySelector('#cpErr').textContent = 'Incorrect creator password.'; ov.querySelector('#cpInput').value = ''; ov.querySelector('#cpInput').focus(); }
  });
  ov.querySelector('#cpInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') ov.querySelector('#cpVerify')?.click(); });
  ov.querySelector('#confirmBizChange')?.addEventListener('click', () => {
    const nb = ov.querySelector('#nbizSel').value;
    if (nb === S.biz) { toast('Already set to that type'); closeModal(); return; }
    S.biz=nb; S.bizName=BT.find(x=>x.id===nb).label;
    S.prods=JSON.parse(JSON.stringify(DP[nb]||[]));
    const cs=[...new Set(S.prods.map(p=>p.cat))]; S.cats=['All',...cs]; S.nid=S.prods.length+1;
    save(); closeModal(); render(); toast('Business type changed');
  });
  ov.querySelector('#mPrint')?.addEventListener('click', () => { printReceipt(ov.querySelector('#rcptTxt').textContent); });
  ov.querySelector('#mPrintOld')?.addEventListener('click', () => { printReceipt(m.tx.receipt); });
  ov.querySelector('#mFinish')?.addEventListener('click', () => {
    const id = txId();
    const tx = { id, date:new Date().toISOString(), items:S.cart.map(i=>({name:i.name,qty:i.qty,price:i.price})), total:tot(), method:m.method, receipt:receiptStr(m.method,id) };
    S.cart.forEach(ci => { const p=S.prods.find(x=>x.id===ci.id); if(p&&p.stock!==999) p.stock=Math.max(0,p.stock-ci.qty); });
    S.sales.push(tx); S.salesTotal += tot(); S.cart=[]; S.disc=0;
    save(); closeModal(); toast('Sale recorded - ' + id);
  });
  ov.querySelector('#mSavePr')?.addEventListener('click', () => {
    const name=ov.querySelector('#pNm').value.trim(), price=parseFloat(ov.querySelector('#pPr').value)||0;
    const sv=ov.querySelector('#pSt').value.trim(), stock=sv===''?999:parseInt(sv)||0;
    const cat=ov.querySelector('#pCt').value.trim()||'General', icon=ov.querySelector('#pIc').value;
    if (!name) { toast('Enter a product name'); return; }
    const pp=m.prod;
    if (pp) { const idx=S.prods.findIndex(x=>x.id===pp.id); if(idx>-1) S.prods[idx]={id:pp.id,name,price,cat,icon,stock}; }
    else S.prods.push({ id:S.nid++, name, price, cat, icon, stock });
    const cs=[...new Set(S.prods.map(x=>x.cat))]; S.cats=['All',...cs];
    save(); closeModal(); toast(pp?'Product updated':'Product added');
  });
  ov.querySelector('#mDelPr')?.addEventListener('click', () => { S.prods=S.prods.filter(x=>x.id!==m.prod.id); S.cart=S.cart.filter(x=>x.id!==m.prod.id); const cs=[...new Set(S.prods.map(x=>x.cat))]; S.cats=['All',...cs]; save(); closeModal(); toast('Product deleted'); });
  ov.querySelector('#mConfDel')?.addEventListener('click', () => { S.prods=S.prods.filter(x=>x.id!==m.pid); S.cart=S.cart.filter(x=>x.id!==m.pid); const cs=[...new Set(S.prods.map(x=>x.cat))]; S.cats=['All',...cs]; save(); closeModal(); toast('Product deleted'); });
  body.appendChild(ov);
}

load(); render();

// Register service worker for PWA/offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
