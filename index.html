<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Arroyo POS"/>
<meta name="description" content="Universal Point of Sale by Reymar Arroyo"/>
<link rel="manifest" href="manifest.json"/>
<title>Arroyo POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0.1)}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg0);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;position:fixed;top:0;left:0}
input,select,textarea{user-select:text;-webkit-user-select:text}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}

/* CSS VARIABLES */
:root{
  --bg0:#111110;--bg1:#1c1c1a;--bg2:#262624;--bg3:#2e2e2c;
  --t1:#f0f0ec;--t2:#a8a8a2;--t3:#666660;
  --b1:rgba(255,255,255,0.10);--b2:rgba(255,255,255,0.18);
  --ac:#378add;--ac2:#0c447c;
  --sg:#27500a;--st:#c0dd97;
  --wg:#633806;--wt:#fac775;
  --dg:#791f1f;--dt:#f09595;--df:#e24b4a;
  --pg:#3c3489;--pt:#afa9ec;
  --r:12px;
}

/* APP SHELL */
#app{height:100dvh;width:100vw;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg0)}

/* TOP NAV */
.topnav{background:var(--bg1);border-bottom:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column}
.topnav-brand{display:flex;align-items:center;padding:10px 14px 0;gap:8px}
.brand-name{font-size:16px;font-weight:700;flex:1}
.brand-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--ac2);color:var(--ac)}
.topnav-tabs{display:flex;overflow-x:auto;padding:0 4px}
.topnav-tabs::-webkit-scrollbar{height:0}
.tab{flex:1;min-width:60px;padding:10px 8px;font-size:11px;font-weight:700;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;text-align:center;letter-spacing:0.3px;white-space:nowrap}
.tab.on{color:var(--t1);border-bottom-color:var(--ac)}

/* BIZ SCREEN */
.biz-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:20px;overflow-y:auto}
.biz-logo{font-size:30px;font-weight:800;letter-spacing:-1px}
.biz-sub{font-size:14px;color:var(--t2)}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px}
.biz-card{background:var(--bg2);border:1.5px solid var(--b1);border-radius:16px;padding:22px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;-webkit-tap-highlight-color:rgba(55,138,221,0.2)}
.biz-card:active{background:var(--bg3);transform:scale(0.96)}
.biz-ico{font-size:12px;font-weight:800;color:var(--t2);background:var(--bg3);padding:8px 12px;border-radius:8px;letter-spacing:0.5px}
.biz-lbl{font-size:13px;font-weight:600;text-align:center}
.biz-note{font-size:12px;color:var(--t3);text-align:center;max-width:300px;line-height:1.7}

/* SCREEN CONTENT */
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg0);color:var(--t1);min-height:0}

/* POS */
.pos-search{padding:10px 12px;flex-shrink:0}
.pos-search input{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:15px;outline:none}
.pos-cats{display:flex;gap:7px;padding:0 12px 10px;overflow-x:auto;flex-shrink:0}
.pos-cats::-webkit-scrollbar{height:0}
.cat{padding:8px 16px;border-radius:20px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px 100px;overflow-y:auto;flex:1;align-content:start}
.pcard{background:var(--bg2);border:1.5px solid var(--b1);border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;position:relative;overflow:hidden}.pcard::before{content:'';display:block;padding-top:100%}.pcard-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px}
.pcard:active{background:var(--bg3);transform:scale(0.94)}
.pico{font-size:10px;font-weight:800;color:var(--t2);background:var(--bg3);padding:5px 8px;border-radius:6px;letter-spacing:0.5px}
.pname{font-size:11px;font-weight:600;line-height:1.2}
.pprice{font-size:12px;font-weight:700;color:var(--ac)}
.pstock{font-size:9px;color:var(--t3)}
.pcard.low .pstock{color:var(--wt)}
.pcard.out{opacity:0.3;pointer-events:none}

/* CART FAB */
.cart-fab{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:12px;right:12px;background:var(--ac);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;border:none;cursor:pointer;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.cart-fab:active{opacity:0.85}
.fab-info{flex:1;text-align:left}
.fab-count{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:2px}
.fab-total{font-size:18px;font-weight:800;color:#fff}
.fab-lbl{font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,0.2);padding:8px 14px;border-radius:10px}

/* CART SCREEN */
.cart-hd{display:flex;align-items:center;padding:12px 14px;gap:10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.cart-back{padding:10px 16px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer}
.cart-back:active{background:var(--bg3)}
.cart-title{font-size:17px;font-weight:700;flex:1}
.cart-clear{font-size:13px;color:var(--dt);background:none;border:none;cursor:pointer;padding:8px 10px;font-weight:600}
.cart-items{flex:1;overflow-y:auto;padding:0 14px;min-height:0}
.cart-empty{text-align:center;color:var(--t3);font-size:14px;padding:48px 0}
.ci{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--b1)}
.ci-info{flex:1}
.ci-name{font-size:15px;font-weight:600}
.ci-price{font-size:13px;color:var(--t2);margin-top:2px}
.ci-qty{display:flex;align-items:center;gap:10px}
.qb{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qb:active{background:var(--bg3)}
.qnum{font-size:16px;font-weight:700;min-width:24px;text-align:center}
.ci-sub{font-size:16px;font-weight:700;color:var(--ac);min-width:70px;text-align:right;flex-shrink:0}
.cart-foot{padding:10px 14px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--b1);flex-shrink:0;background:var(--bg1);position:sticky;bottom:0;z-index:10}
.disc-row{display:flex;gap:8px;margin-bottom:8px}
.disc-row input{flex:1;padding:9px 10px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none}
.disc-row select{padding:9px 8px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none}
.sum{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);padding:3px 0}
.sum-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding:8px 0 10px;border-top:1px solid var(--b1);margin-top:4px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.pbtn{padding:14px 8px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;font-weight:700;cursor:pointer;text-align:center;display:block;width:100%}
.pbtn:active{background:var(--bg3);transform:scale(0.97)}
.pbtn.big{grid-column:1/-1;background:var(--ac);color:#fff;border-color:var(--ac);font-size:16px;font-weight:800;padding:18px;border-radius:14px}
.pbtn.big:active{opacity:0.85}

/* INVENTORY */
.panel-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hd h2{font-size:18px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;flex-shrink:0}
.stat{background:var(--bg2);border-radius:12px;padding:12px}
.stat-l{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-v{font-size:20px;font-weight:800}
.inv-list{flex:1;overflow-y:auto}
.inv-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--b1)}
.inv-ico{font-size:11px;font-weight:700;color:var(--t2);background:var(--bg2);padding:8px 10px;border-radius:8px;min-width:44px;text-align:center;flex-shrink:0}
.inv-info{flex:1;overflow:hidden}
.inv-name{font-size:15px;font-weight:600}
.inv-cat{font-size:12px;color:var(--t3);margin-top:2px}
.inv-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.inv-price{font-size:15px;font-weight:700;color:var(--ac)}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-ok{background:var(--sg);color:var(--st)}
.b-low{background:var(--wg);color:var(--wt)}
.b-out{background:var(--dg);color:var(--dt)}
.acts{display:flex;gap:6px}
.act{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--b1);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:11px;font-weight:700}
.act:active{background:var(--bg2)}
.act.del:active{background:var(--dg);color:var(--dt)}
.add-fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:400}
.add-fab:active{opacity:0.85}

/* HISTORY */
.hist-bar{display:flex;gap:7px;padding:10px 14px;border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0}
.hist-bar::-webkit-scrollbar{height:0}
.hpill{padding:8px 14px;border-radius:20px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.hpill.on{background:var(--t1);color:var(--bg0);border-color:var(--t1)}
.hist-list{flex:1;overflow-y:auto;padding:12px 16px}
.hist-empty{text-align:center;color:var(--t3);font-size:14px;padding:48px 0}
.day-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;padding:6px 0 4px}
.day-sub{font-size:12px;color:var(--t2);margin-bottom:8px}
.txcard{background:var(--bg2);border:1.5px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.txcard:active{background:var(--bg3)}
.txl{flex:1;overflow:hidden}
.txid{font-size:10px;color:var(--t3);font-weight:700;margin-bottom:3px}
.txitems{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txtime{font-size:12px;color:var(--t2);margin-top:3px}
.txr{text-align:right;flex-shrink:0}
.txtot{font-size:16px;font-weight:800}
.txm{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;margin-top:3px}
.mCash{background:var(--sg);color:var(--st)}
.mCard{background:var(--ac2);color:var(--ac)}
.mGCash{background:var(--pg);color:var(--pt)}
.mUtang{background:var(--wg);color:var(--wt)}
.mTransfer{background:var(--wg);color:var(--wt)}

/* ADMIN */
.admin-scroll{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.asec{background:var(--bg2);border:1.5px solid var(--b1);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px}
.asec-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px}
.arow{display:flex;flex-direction:column;gap:6px}
.arow label{font-size:13px;color:var(--t2);font-weight:600}
.arow input,.arow select{padding:12px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg1);color:var(--t1);font-size:15px;outline:none;width:100%}
.abtnrow{display:flex;gap:8px;justify-content:flex-end;align-items:center}
.abtn{padding:11px 18px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg1);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer}
.abtn:active{background:var(--bg3)}
.abtn.pri{background:var(--t1);color:var(--bg0);border-color:var(--t1)}
.asec.danger{border-color:var(--dg)}
.asec.danger .asec-t{color:var(--dt)}
.asec.creator{border-color:var(--pg)}
.asec.creator .asec-t{color:var(--pt)}
.cp-row{display:flex;gap:8px;flex-wrap:wrap}
.cp{padding:10px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;color:#fff}
.cp:active{opacity:0.8;transform:scale(0.96)}
.cp.light{color:#333}

/* ABOUT */
.about-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;align-items:center}
.about-card{background:var(--bg2);border:1.5px solid var(--b1);border-radius:16px;padding:22px;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.av{width:60px;height:60px;border-radius:50%;background:var(--ac2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--ac)}
.divl{width:100%;height:1px;background:var(--b1)}
.cr{display:flex;align-items:center;gap:12px;width:100%;font-size:14px;color:var(--t2)}
.cico{font-size:11px;font-weight:700;color:var(--t3);min-width:22px}

/* LOCK */
.lock-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg0)}
.lock-card{background:#1c1c1a;border:2px solid rgba(255,255,255,0.18);border-radius:24px;padding:32px 24px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);color:#f0f0ec}
.lock-ico{font-size:13px;font-weight:700;color:#a8a8a2;background:#2e2e2c;padding:10px 16px;border-radius:12px;letter-spacing:1px}
.lock-card h2{font-size:20px;font-weight:700}
.lock-card p{font-size:14px;color:var(--t2)}
.lock-inp{width:100%;padding:16px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.18);background:#111110;color:#f0f0ec;font-size:20px;text-align:center;letter-spacing:6px;outline:none}
.lock-inp:focus{border-color:var(--ac)}
.lock-btn{width:100%;padding:16px;border-radius:12px;border:none;background:#378add;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.lock-btn:active{opacity:0.85}
.lock-err{font-size:13px;color:#f09595;min-height:18px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--bg1);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:0 0 16px}
.mdrag{width:40px;height:4px;background:var(--b2);border-radius:4px;margin:14px auto 2px;flex-shrink:0}
.mbody{padding:0 18px;display:flex;flex-direction:column;gap:14px}
.mtitle{font-size:19px;font-weight:700}
.mbadge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--pg);color:var(--pt);display:inline-block}
.mf{display:flex;flex-direction:column;gap:6px}
.mf label{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:0.3px}
.mf input,.mf select{padding:13px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:15px;width:100%;outline:none}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtns button{padding:12px 18px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);cursor:pointer;font-size:14px;font-weight:600}
.mbtns button:active{background:var(--bg3)}
.mbtns .mpri{background:var(--ac);color:#fff;border-color:var(--ac)}
.mbtns .mdel{color:var(--dt);margin-right:auto}
.rbox{font-family:monospace;font-size:12px;background:var(--bg0);border-radius:12px;padding:14px;white-space:pre;overflow-x:auto;line-height:1.9;border:1px solid var(--b1)}

/* CASH */
.cash-disp{background:var(--bg0);border-radius:14px;padding:18px;text-align:center}
.cash-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.cash-amt{font-size:36px;font-weight:800}
.cash-inp-wrap{margin-bottom:12px}
.cash-inp-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.cash-inp{width:100%;padding:16px;border-radius:14px;border:2px solid var(--ac);background:var(--bg2);color:var(--t1);font-size:22px;font-weight:700;outline:none;text-align:center}
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.qbtn{padding:16px 8px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.qbtn:active{background:var(--bg3)}
.qbtn.exact{grid-column:1/-1;background:var(--ac);color:#fff;border-color:var(--ac);font-size:16px;padding:18px}
.qbtn.exact:active{opacity:0.85}
.change-box{background:var(--bg0);border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.change-l .change-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.change-val{font-size:32px;font-weight:800;color:var(--st)}
.change-r{text-align:right}
.change-r .change-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.change-r .total-val{font-size:16px;font-weight:700}
.confirm-btn{width:100%;padding:20px;border-radius:14px;border:none;background:var(--ac);color:#fff;font-size:17px;font-weight:800;cursor:pointer;margin-bottom:8px}
.confirm-btn:active{opacity:0.85}
.confirm-btn.disabled{background:#444;opacity:0.6;pointer-events:none}

/* Customer selector on checkout */
.cust-search{padding:0;margin-bottom:10px}
.cust-search input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none}
.cust-results{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;margin-top:6px}
.cust-result{padding:10px 12px;border-radius:10px;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border:1.5px solid transparent}
.cust-result:hover{border-color:var(--ac)}
.cust-result.selected{border-color:var(--ac);background:var(--ac2)}
.cust-name{font-size:14px;font-weight:600}
.cust-bal{font-size:12px;color:var(--dt);font-weight:700}
.utang-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:10px;margin-bottom:8px;cursor:pointer}
.utang-label{font-size:14px;font-weight:600;color:var(--wt)}

async function deductIngredients(cartItems){
  if(!CLOUD.token||!CLOUD.bizId)return;
  try{
    const h2={...H,'Authorization':'Bearer '+CLOUD.token};
    // Get all recipes for products in this sale
    const names=cartItems.map(i=>i.name);
    const recipesRes=await fetch(SUPA_URL+'/rest/v1/recipes?biz_id=eq.'+CLOUD.bizId+'&product_name=in.('+names.map(n=>'"'+n+'"').join(',')+')',{headers:h2});
    const recipes=await recipesRes.json();
    if(!Array.isArray(recipes)||!recipes.length)return;
    // Group deductions by ingredient
    const deduct={};
    cartItems.forEach(ci=>{
      recipes.filter(r=>r.product_name===ci.name).forEach(r=>{
        deduct[r.ingredient_id]=(deduct[r.ingredient_id]||0)+(r.qty_used*ci.qty);
      });
    });
    // Apply deductions
    for(const[ingId,qty] of Object.entries(deduct)){
      const ingRes=await fetch(SUPA_URL+'/rest/v1/ingredients?id=eq.'+ingId,{headers:h2});
      const ing=await ingRes.json();
      if(ing&&ing[0]){
        const newStock=Math.max(0,ing[0].stock-qty);
        await fetch(SUPA_URL+'/rest/v1/ingredients?id=eq.'+ingId,{method:'PATCH',headers:{...h2,'Prefer':'return=representation'},body:JSON.stringify({stock:newStock})});
      }
    }
  }catch(e){}
}

function applyTheme(hex){
  if(!hex||hex.length!==7)return;
  try{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const d=(v,a)=>Math.max(0,Math.min(255,Math.round(v+a)));
    const h=(r,g,b)=>'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    const lum=(r*299+g*587+b*114)/1000;
    const il=lum>128;
    const root=document.documentElement;
    root.style.setProperty('--bg0',hex);
    root.style.setProperty('--bg1',h(d(r,18),d(g,18),d(b,18)));
    root.style.setProperty('--bg2',h(d(r,32),d(g,32),d(b,32)));
    root.style.setProperty('--bg3',h(d(r,48),d(g,48),d(b,48)));
    root.style.setProperty('--t1',il?'#111110':'#f0f0ec');
    root.style.setProperty('--t2',il?'#444440':'#a8a8a2');
    root.style.setProperty('--t3',il?'#777770':'#666660');
    root.style.setProperty('--b1',il?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.10)');
    root.style.setProperty('--b2',il?'rgba(0,0,0,0.22)':'rgba(255,255,255,0.18)');
  }catch(e){}
}

function exportCSV(sales){
  const rows=[['TXN ID','Date','Time','Cashier','Items','Total','Method','Ref','Voided']];
  sales.forEach(s=>{
    rows.push([s.id,new Date(s.date).toLocaleDateString('en-PH'),new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
      s.cashier||'',s.items.map(i=>i.name+(i.variantLabel?' ('+i.variantLabel+')':'')+' x'+i.qty).join('; '),
      s.total.toFixed(2),s.method,s.ref||'',s.voided?'YES':'NO']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='arroyo-pos-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV exported!');
}

function sub(){return S.cart.reduce((s,i)=>s+i.price*i.qty,0);}
function damt(){const s=sub();return S.discType==='%'?s*Math.min(S.disc,100)/100:Math.min(S.disc,s);}
function tamt(){return 0;}
function tot(){return sub()-damt()+tamt();}
function txId(){return'TXN-'+String(S.sales.length+1).padStart(5,'0');}

function addToCart(p){

function chgQty(id,delta){
  const it=S.cart.find(i=>i.id===id);
  if(!it)return;
  it.qty+=delta;
  if(it.qty<=0)S.cart=S.cart.filter(i=>i.id!==id);
  render();
}

function receiptStr(method,id,refNum){
  const now=new Date(),w=28;
  const lp=(s,n)=>String(s).length>=n?String(s).slice(0,n):String(s)+' '.repeat(n-String(s).length);
  const rp=(s,n)=>String(s).length>=n?String(s).slice(0,n):' '.repeat(n-String(s).length)+String(s);
  const line='-'.repeat(w);
  const rows=[lp(S.bizName,w),line,'Date: '+now.toLocaleString(),'TXN:  '+id,line];
  S.cart.forEach(i=>{const r=fmt(i.price*i.qty);rows.push(lp(i.name+' x'+i.qty,w-r.length)+r);});
  rows.push(line);
  const ar=(l,r)=>rows.push(lp(l,w-r.length)+r);
  ar('Subtotal:',fmt(sub()));
  if(S.disc>0)ar('Discount:','-'+fmt(damt()));
  // VAT already included in price - no separate VAT line
  rows.push(line);
  ar('TOTAL:',fmt(tot()));
  rows.push('Payment: '+method);
  if(refNum)rows.push('Ref No:  '+refNum);
  if(method==='Cash'&&S.cashTendered>=tot()){
    ar('Cash:',fmt(S.cashTendered));
    ar('Change:',fmt(S.cashTendered-tot()));
  }
  rows.push(line);
  rows.push(rp('Powered by Arroyo POS',w));
  return rows.join('\n');
}

  if(S.cashiers.length>0&&!S.activeCashier&&S.screen!=='admin'){
    renderCashierLogin(app);if(S.modal)renderModal(app);return;
  }

  renderTopNav(app);

  const scr=document.createElement('div');

  if(S.screen==='pos'){
    if(S.cartOpen)renderCart(scr);

  }
  else if(S.screen==='inv')renderInv(scr);
  else if(S.screen==='hist')renderHist(scr);

  else if(S.screen==='admin'){S.locked?renderLock(scr):renderAdmin(scr);}

    const back=document.createElement('button');back.className='wiz-btn wiz-btn-sec';back.textContent='← Back';
    back.onclick=function(){WIZ.step--;renderWizardRefresh(app);};
    foot.appendChild(back);
  }

  const next=document.createElement('button');next.className='wiz-btn wiz-btn-pri';
  if(WIZ.step===4){next.textContent='Start selling →';}
  else if(WIZ.step===3){next.textContent='Almost done →';}
  else{next.textContent='Continue →';}

  next.onclick=async function(){
    if(WIZ.step===1){
      const val=(document.getElementById('wizBizName')||{}).value||WIZ.bizName;
      if(!val.trim()){toast('Enter your business name');return;}
      WIZ.bizName=val.trim();
      WIZ.step=2;renderWizardRefresh(app);
    } else if(WIZ.step===2){
      if(!WIZ.bizType){toast('Select your business type');return;}
      WIZ.step=3;renderWizardRefresh(app);
    } else if(WIZ.step===3){
      WIZ.step=4;renderWizardRefresh(app);
    } else if(WIZ.step===4){
      // Apply wizard settings
      const bizTypeObj=BT.find(function(b){return b.id===WIZ.bizType;})||BT[BT.length-1];
      S.bizName=WIZ.bizName;S.biz=WIZ.bizType;S.installed=true;S.wizardDone=true;
      // Load only selected sample products
      const allProds=DP[WIZ.bizType]||[];
      const selProds=allProds.filter(function(p){return WIZ.selectedProds.includes(p.id);});
      S.prods=JSON.parse(JSON.stringify(selProds));
      const cs=[...new Set(S.prods.map(function(p){return p.cat;}))];
      S.cats=['All',...cs];S.nid=S.prods.length+1;
      // Sync biz to cloud if connected
      if(CLOUD.token&&CLOUD.user){
        try{
          await fetch(SUPA_URL+'/rest/v1/businesses',{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify({user_id:CLOUD.user,name:WIZ.bizName,biz_type:WIZ.bizType})});
          const bizRes=await fetch(SUPA_URL+'/rest/v1/businesses?user_id=eq.'+CLOUD.user,{headers:H});
          const bizData=await bizRes.json();
          if(bizData&&bizData[0])CLOUD.bizId=bizData[0].id;
        }catch(e){}
      }
      S.screen='pos';save();render();toast('Welcome to '+S.bizName+'! 🎉');
    }
  };
  foot.appendChild(next);
  w.appendChild(foot);
  app.appendChild(w);
}

function renderCloudAuth(app){
  const isLogin=S.authScreen!=='signup';
  const w=document.createElement('div');w.className='auth-wrap';
  const card=document.createElement('div');card.className='auth-card';

  // Logo
  const logo=document.createElement('div');logo.className='auth-logo';
  logo.innerHTML='<div class="auth-logo-ico">AP</div><div class="auth-title">Arroyo POS</div><div class="auth-sub">Sign in to access your business dashboard</div>';
  card.appendChild(logo);

  // Tabs
  const tabs=document.createElement('div');tabs.className='auth-tabs';
  const tLogin=document.createElement('button');tLogin.className='auth-tab'+(isLogin?' on':'');tLogin.textContent='Sign in';
  tLogin.onclick=function(){S.authScreen='login';render();};
  const tSignup=document.createElement('button');tSignup.className='auth-tab'+(!isLogin?' on':'');tSignup.textContent='Create account';
  tSignup.onclick=function(){S.authScreen='signup';render();};
  tabs.appendChild(tLogin);tabs.appendChild(tSignup);card.appendChild(tabs);

  // Fields
  if(!isLogin){
    const bf=document.createElement('div');bf.className='auth-field';bf.innerHTML='<label>Business name</label>';
    const bi=document.createElement('input');bi.id='authBiz';bi.type='text';bi.placeholder='e.g. Khalid Apparel';bi.value=S.cloudBizName||'';
    bf.appendChild(bi);card.appendChild(bf);
  }
  const ef=document.createElement('div');ef.className='auth-field';ef.innerHTML='<label>Email</label>';
  const ei=document.createElement('input');ei.id='authEmail';ei.type='email';ei.placeholder='you@email.com';ei.value=S.cloudEmail||'';
  ef.appendChild(ei);card.appendChild(ef);
  const pf=document.createElement('div');pf.className='auth-field';pf.innerHTML='<label>Password</label>';
  const pi=document.createElement('input');pi.id='authPass';pi.type='password';pi.placeholder='Min 6 characters';
  pf.appendChild(pi);card.appendChild(pf);

  const err=document.createElement('div');err.className='auth-err';err.id='authErr';card.appendChild(err);

  const btn=document.createElement('button');btn.className='auth-btn';btn.textContent=isLogin?'Sign in':'Create account';
  btn.onclick=async function(){
    const email=document.getElementById('authEmail').value.trim();
    const pass=document.getElementById('authPass').value;
    const bizName=isLogin?'':(document.getElementById('authBiz').value.trim());
    if(!email||!pass){err.textContent='Please fill in all fields.';return;}
    if(!isLogin&&!bizName){err.textContent='Please enter your business name.';return;}
    btn.className='auth-btn loading';btn.textContent=isLogin?'Signing in...':'Creating account...';err.textContent='';
    if(isLogin){
      const res=await signIn(email,pass);
      if(res.error||!res.access_token){err.textContent=res.error?.message||'Sign in failed. Check your email and password.';btn.className='auth-btn';btn.textContent='Sign in';return;}
      CLOUD.token=res.access_token;CLOUD.user=res.user?.id||email;
      S.cloudEmail=email;
      // Get biz record
      const h2={...H,'Authorization':'Bearer '+res.access_token};
      const bizRes=await fetch(SUPA_URL+'/rest/v1/businesses?user_id=eq.'+res.user.id,{headers:h2});
      const bizData=await bizRes.json();
      if(bizData&&bizData.length>0){CLOUD.bizId=bizData[0].id;S.cloudBizName=bizData[0].name;S.bizName=bizData[0].name;S.biz=bizData[0].biz_type||'custom';S.installed=true;}
      save();await loadCloudData();
      if(!S.biz){S.screen='wizard';}else{S.screen='pos';}
      render();
    } else {
      const res=await signUp(email,pass,bizName);
      if(res.error){err.textContent=res.error.message||'Sign up failed.';btn.className='auth-btn';btn.textContent='Create account';return;}
      // Auto sign in
      const loginRes=await signIn(email,pass);
      if(!loginRes.access_token){err.textContent='Account created! Please sign in.';S.authScreen='login';render();return;}
      CLOUD.token=loginRes.access_token;CLOUD.user=loginRes.user?.id||email;S.cloudEmail=email;S.cloudBizName=bizName;
      // Create biz record
      const h2={...H,'Authorization':'Bearer '+loginRes.access_token};
      const bizRes=await fetch(SUPA_URL+'/rest/v1/businesses',{method:'POST',headers:{...h2,'Prefer':'return=representation'},body:JSON.stringify({user_id:loginRes.user.id,name:bizName,biz_type:'custom'})});
      const bizData=await bizRes.json();
      if(bizData&&bizData[0]){CLOUD.bizId=bizData[0].id;}
      S.installed=true;S.bizName=bizName;
      save();S.screen='biz';render();
    }
  };
  card.appendChild(btn);

  const note=document.createElement('div');note.className='auth-note';note.textContent='Your data is private — only you can see your business data.';card.appendChild(note);
  w.appendChild(card);app.appendChild(w);
  setTimeout(()=>{const ei2=document.getElementById('authEmail');if(ei2)ei2.focus();},100);
}

function renderPOS(scr){

  const n=cc();

  // Low stock alert

    const al=document.createElement('div');al.className='stock-alert';

  inp.oninput=function(){S.search=this.value;render();};

    const ts=todaySales();const pct=Math.min(100,(ts/S.dailyGoal)*100);const done=pct>=100;
    const gb=document.createElement('div');gb.className='goal-bar';
    gb.innerHTML='<div class="goal-track"><div class="goal-fill" style="width:'+pct+'%'+(done?';background:var(--st)':'')+'"></div></div>'

  grid.style.paddingBottom=n>0?'100px':'12px';
  items.forEach(p=>{
    const out=p.stock!==999&&p.stock<=0,low=p.stock!==999&&p.stock>0&&p.stock<=5;
    const effPrice=(p.salePct>0)?+(p.price*(1-p.salePct/100)).toFixed(2):p.price;
    const card=document.createElement('div');
    card.className='pcard'+(low?' low':'')+(out?' out':'')+(p.salePct>0?' on-sale':'');

    if(p.img){
      const im=document.createElement('img');im.src=p.img;im.className='pimg';im.onerror=function(){this.style.display='none';};inner.appendChild(im);
    } else {
      const ico=document.createElement('div');ico.className='pico';ico.textContent=p.icon;inner.appendChild(ico);
    }
    const pnm=document.createElement('div');pnm.className='pname';pnm.textContent=p.name;inner.appendChild(pnm);
    if(p.salePct>0){
      const po=document.createElement('div');po.className='pprice-orig';po.textContent=fmt(p.price);inner.appendChild(po);
      const ps=document.createElement('div');ps.className='pprice-sale';ps.textContent=fmt(effPrice);inner.appendChild(ps);
    } else {
      const pp2=document.createElement('div');pp2.className='pprice';pp2.textContent=fmt(p.price);inner.appendChild(pp2);

function renderAtt(scr){
  const hd=document.createElement('div');hd.className='panel-hd';
  hd.innerHTML='<h2>Attendance</h2>';
  scr.appendChild(hd);

  // Load cloud employees for this business
  const empList=S.cloudAttEmployees||[];

  if(!CLOUD.token||!CLOUD.bizId){
    const msg=document.createElement('div');msg.style.cssText='padding:28px;text-align:center;color:var(--t3);font-size:14px';msg.textContent='Sign in to cloud to use attendance tracking.';scr.appendChild(msg);return;
  }

  // Show current status of each employee
  const statusCard=document.createElement('div');statusCard.className='card';statusCard.style.marginBottom='14px';
  const stHd=document.createElement('div');stHd.style.cssText='font-size:13px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px';stHd.textContent='Today\'s status';
  statusCard.appendChild(stHd);

  if(!empList.length){
    statusCard.appendChild(document.createTextNode('No employees found. Add employees in the dashboard first.'));
  }
  empList.forEach(function(e){
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b1)';
    const info=document.createElement('div');
    const dot=document.createElement('span');dot.style.cssText='display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:'+(e.clockedIn?'var(--st)':'var(--t3)');
    const name=document.createElement('span');name.style.cssText='font-size:15px;font-weight:600';name.textContent=e.name;
    const sub=document.createElement('div');sub.style.cssText='font-size:12px;color:var(--t3);margin-top:3px;margin-left:16px';
    sub.textContent=e.clockedIn?'Clocked in at '+e.timeIn:'Not clocked in';
    info.appendChild(dot);info.appendChild(name);info.appendChild(sub);
    const btn=document.createElement('button');
    btn.style.cssText='padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;'+(e.clockedIn?'background:var(--dg);color:var(--dt)':'background:var(--sg);color:var(--st)');
    btn.textContent=e.clockedIn?'Clock Out':'Clock In';
    btn.onclick=async function(){
      btn.disabled=true;btn.style.opacity='0.5';
      const h2={...H,'Prefer':'return=representation'};
      const today=new Date().toISOString().slice(0,10);
      if(e.clockedIn){
        // Clock out - find the open attendance record
        const attRes=await fetch(SUPA_URL+'/rest/v1/attendance?biz_id=eq.'+CLOUD.bizId+'&employee_id=eq.'+e.id+'&date=eq.'+today+'&time_out=is.null&order=time_in.desc&limit=1',{headers:h2});
        const attData=await attRes.json();
        if(attData&&attData[0]){
          const timeIn=new Date(attData[0].time_in);const timeOut=new Date();
          const hrs=Math.round((timeOut-timeIn)/36000)/100;
          await fetch(SUPA_URL+'/rest/v1/attendance?id=eq.'+attData[0].id,{method:'PATCH',headers:h2,body:JSON.stringify({time_out:timeOut.toISOString(),hours_worked:hrs})});
        }
        e.clockedIn=false;e.timeIn='';
        toast(e.name+' clocked out');
      } else {
        // Check if already clocked in today (prevent duplicates)
        const checkRes=await fetch(SUPA_URL+'/rest/v1/attendance?biz_id=eq.'+CLOUD.bizId+'&employee_id=eq.'+e.id+'&date=eq.'+today+'&time_out=is.null',{headers:h2});
        const existing=await checkRes.json();
        if(existing&&existing.length>0){toast(e.name+' is already clocked in!');btn.disabled=false;btn.style.opacity='1';return;}
        // Clock in
        await fetch(SUPA_URL+'/rest/v1/attendance',{method:'POST',headers:h2,body:JSON.stringify({biz_id:CLOUD.bizId,employee_id:e.id,employee_name:e.name,time_in:new Date().toISOString(),date:today})});
        e.clockedIn=true;e.timeIn=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        toast(e.name+' clocked in');
      }
      btn.disabled=false;btn.style.opacity='1';
      btn.textContent=e.clockedIn?'Clock Out':'Clock In';
      btn.style.background=e.clockedIn?'var(--dg)':'var(--sg)';
      btn.style.color=e.clockedIn?'var(--dt)':'var(--st)';
      sub.textContent=e.clockedIn?'Clocked in at '+e.timeIn:'Not clocked in';
      dot.style.background=e.clockedIn?'var(--st)':'var(--t3)';
    };
    row.appendChild(info);row.appendChild(btn);statusCard.appendChild(row);
  });
  scr.appendChild(statusCard);

  // Refresh button to reload employees
  const refBtn=document.createElement('button');refBtn.className='abtn';refBtn.textContent='Refresh employees';
  refBtn.style.cssText='width:100%;padding:14px;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer';
  refBtn.onclick=async function(){
    refBtn.textContent='Loading...';refBtn.disabled=true;
    toast('Loading employees...');
    try{
      await loadAttEmployees();
      if(S.cloudAttEmployees&&S.cloudAttEmployees.length>0){
        toast('Found '+S.cloudAttEmployees.length+' employee(s)');
      } else {
        toast('No employees found in Supabase');
      }
    }catch(e){toast('Error: '+e.message);}
    render();
  };
  scr.appendChild(refBtn);
}

async function loadAttEmployees(){
  if(!CLOUD.token){toast('Not signed in to cloud');return;}
  if(!CLOUD.bizId){
    try{
      const h2={...H,'Authorization':'Bearer '+CLOUD.token};
      const bizRes=await fetch(SUPA_URL+'/rest/v1/businesses?user_id=eq.'+CLOUD.user,{headers:h2});
      const bizData=await bizRes.json();
      if(bizData&&bizData[0]){CLOUD.bizId=bizData[0].id;save();}
      else{toast('No business found for this account');return;}
    }catch(e){toast('Could not find business');return;}
  }
  try{
    // Use anon key headers for reading employees (public business data)
    const h2={...H};
    const today=new Date().toISOString().slice(0,10);
    const empRes=await fetch(SUPA_URL+'/rest/v1/employees?biz_id=eq.'+CLOUD.bizId+'&order=name',{headers:h2});
    const emps=await empRes.json();
    if(!Array.isArray(emps)||emps.length===0){
      toast('BizID: '+CLOUD.bizId+' — 0 employees');
      S.cloudAttEmployees=[];return;
    }
    const attRes=await fetch(SUPA_URL+'/rest/v1/attendance?biz_id=eq.'+CLOUD.bizId+'&date=eq.'+today,{headers:h2});
    const att=await attRes.json();
    S.cloudAttEmployees=emps.map(function(e){
      const todayAtt=Array.isArray(att)?att.filter(function(a){return a.employee_id===e.id&&!a.time_out;}):[];
      const latest=todayAtt.length>0?todayAtt[todayAtt.length-1]:null;
      return{id:e.id,name:e.name,role:e.role,clockedIn:!!latest,timeIn:latest?new Date(latest.time_in).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''};
    });
    // Auto-sync Cashier-role employees into the local cashiers list
    const cashierEmps=emps.filter(function(e){return e.role&&e.role.toLowerCase()==='cashier';});
    cashierEmps.forEach(function(e){
      const alreadyExists=S.cashiers.some(function(c){return c.name===e.name;});
      if(!alreadyExists){
        S.cashiers.push({id:S.cashierNid++,name:e.name,supaId:e.id});
        save();
      }
    });
    // Also remove from cashiers list if removed from Supabase (was cashier but no longer active)
    const allNames=emps.filter(function(e){return e.role&&e.role.toLowerCase()==='cashier';}).map(function(e){return e.name;});
    S.cashiers=S.cashiers.filter(function(c){
      // Keep manually added cashiers (no supaId) and active Supabase cashiers
      return !c.supaId||allNames.includes(c.name);
    });
    save();
  }catch(e){toast('Error loading employees: '+e.message);}
}

function renderHist(scr){
  const filt=S.sales.filter(s=>{
    const d=new Date(s.date);
    if(S.histFilter==='today')return d.toDateString()===new Date().toDateString();
    if(S.histFilter==='week'){const w=new Date();w.setDate(w.getDate()-7);return d>=w;}
    if(S.histFilter==='month'){const m=new Date();m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
  const totalAmt=filt.filter(s=>!s.voided).reduce((a,s)=>a+s.total,0);

  const hd=document.createElement('div');hd.className='panel-hd';
  const hdTitle=document.createElement('h2');hdTitle.textContent='History';hd.appendChild(hdTitle);
  const expBtn=document.createElement('button');expBtn.className='abtn';expBtn.style.cssText='font-size:12px;padding:7px 12px';expBtn.textContent='CSV';expBtn.onclick=function(){exportCSV(filt);};hd.appendChild(expBtn);
  const hdTot=document.createElement('div');hdTot.style.cssText='text-align:right';
  hdTot.innerHTML='<div style="font-size:16px;font-weight:800">'+fmt(totalAmt)+'</div><div style="font-size:11px;color:var(--t3)">'+filt.filter(s=>!s.voided).length+' transactions</div>';
  hd.appendChild(hdTot);
  scr.appendChild(hd);

  const bar=document.createElement('div');bar.className='hist-bar';
  [{id:'all',lbl:'All time'},{id:'today',lbl:'Today'},{id:'week',lbl:'This week'},{id:'month',lbl:'This month'}].forEach(f=>{
    const p=document.createElement('div');p.className='hpill'+(S.histFilter===f.id?' on':'');p.textContent=f.lbl;
    p.onclick=function(){S.histFilter=f.id;render();};
    bar.appendChild(p);
  });
  scr.appendChild(bar);

  const byDay={};
  filt.slice().reverse().forEach(s=>{const k=new Date(s.date).toDateString();if(!byDay[k])byDay[k]=[];byDay[k].push(s);});

  const list=document.createElement('div');list.className='hist-list';
  if(Object.keys(byDay).length===0){const e=document.createElement('div');e.className='hist-empty';e.textContent='No transactions yet.';list.appendChild(e);}
  Object.entries(byDay).forEach(([ds,txs])=>{
    const today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString();
    const lbl=ds===today?'Today':ds===yest?'Yesterday':new Date(ds).toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'});
    const dayTot=txs.reduce((a,s)=>a+s.total,0);
    const dl=document.createElement('div');dl.className='day-lbl';dl.textContent=lbl;list.appendChild(dl);
    const ds2=document.createElement('div');ds2.className='day-sub';ds2.textContent=txs.length+' transaction'+(txs.length!==1?'s':'')+' - '+fmt(dayTot);list.appendChild(ds2);
    txs.forEach(s=>{
      const card=document.createElement('div');card.className='txcard'+(s.voided?' voided':'');
      card.innerHTML='<div class="txl"><div class="txid">'+s.id+(s.cashier?' · '+s.cashier:'')+'</div><div class="txitems">'+s.items.map(i=>i.name+' x'+i.qty).join(', ')+'</div><div class="txtime">'+new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div></div><div class="txr"><div class="txtot">'+fmt(s.total)+'</div><div class="txm m'+(s.voided?'Voided':s.method)+'">'+(s.voided?'VOID':s.method)+'</div></div>';
      card.onclick=function(){openModal({type:'viewtx',tx:s});};
      list.appendChild(card);
    });
    // Items sold breakdown for this day
    const validTxs=txs.filter(s=>!s.voided);
    if(validTxs.length>0){
      const itemMap={};
      validTxs.forEach(s=>s.items.forEach(it=>{
        if(!itemMap[it.name])itemMap[it.name]={qty:0,total:0};
        itemMap[it.name].qty+=it.qty;
        itemMap[it.name].total+=it.price*it.qty;
      }));
      const sorted=Object.entries(itemMap).sort((a,b)=>b[1].qty-a[1].qty);
      const itBox=document.createElement('div');
      itBox.style.cssText='background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:10px 12px;margin-bottom:12px';
      const itHd=document.createElement('div');
      itHd.style.cssText='font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;justify-content:space-between';
      itHd.innerHTML='<span>Items sold</span><span style="display:grid;grid-template-columns:36px 90px;gap:4px;text-align:center"><span>Qty</span><span style="text-align:right">Total</span></span>';
      itBox.appendChild(itHd);
      sorted.forEach(([name,d])=>{
        const row=document.createElement('div');
        row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b1);font-size:13px';
        row.innerHTML='<span style="color:var(--t1);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+name+'</span>'
          +'<span style="display:grid;grid-template-columns:36px 90px;gap:4px;text-align:center;flex-shrink:0">'
          +'<span style="color:var(--t2);font-weight:700;text-align:center">'+d.qty+'</span>'
          +'<span style="color:var(--ac);font-weight:700;text-align:right">'+fmt(d.total)+'</span></span>';
        itBox.appendChild(row);
      });
      const totRow=document.createElement('div');
      totRow.style.cssText='display:flex;justify-content:space-between;padding:6px 0 0;font-size:13px;font-weight:800';
      const totalItemQty=sorted.reduce((a,[,d])=>a+d.qty,0);
      const validDayTot=validTxs.reduce((a,s)=>a+s.total,0);
      totRow.innerHTML='<span style="color:var(--t1)">Total items sold</span>'

function renderModal(app){
  const m=S.modal;
  const ov=document.createElement('div');ov.className='ov open';
  ov.onclick=function(e){if(e.target===ov)closeModal();};

  const modal=document.createElement('div');modal.className='modal';
  const drag=document.createElement('div');drag.className='mdrag';modal.appendChild(drag);
  const body=document.createElement('div');body.className='mbody';

  if(m.type==='pay'){
    const id=txId();const isCash=m.method==='Cash';const ct=S.cashTendered||0;const change=ct-tot();

    if(isCash){
      // Amount display
      const disp=document.createElement('div');disp.className='cash-disp';
      disp.innerHTML='<div class="cash-lbl">Amount to pay</div><div class="cash-amt">'+fmt(tot())+'</div>';
      body.appendChild(disp);

      // Manual input
      const inpWrap=document.createElement('div');inpWrap.className='cash-inp-wrap';
      const inpLbl=document.createElement('div');inpLbl.className='cash-inp-lbl';inpLbl.textContent='Cash received from customer';
      const cashInp=document.createElement('input');cashInp.className='cash-inp';cashInp.type='number';cashInp.min='0';cashInp.inputMode='numeric';cashInp.placeholder='Type amount...';cashInp.value=ct>0?ct:'';
      inpWrap.appendChild(inpLbl);inpWrap.appendChild(cashInp);body.appendChild(inpWrap);

      // Quick buttons
      const qg=document.createElement('div');qg.className='qgrid';
      const exact=Math.ceil(tot());
      const r50=Math.ceil(tot()/50)*50;
      const r100=Math.ceil(tot()/100)*100;
      const r500=Math.ceil(tot()/500)*500;
      const r1000=Math.ceil(tot()/1000)*1000;
      const sugg=[...new Set([exact,r50,r100,r500,r1000].filter(v=>v>=tot()))].slice(0,4);

      const exactBtn=document.createElement('button');exactBtn.className='qbtn exact';exactBtn.textContent='Exact - '+fmt(tot());
      exactBtn.onclick=function(){cashInp.value=tot().toFixed(2);cashInp.dispatchEvent(new Event('input'));};
      qg.appendChild(exactBtn);

      [{add:50},{add:100},{add:500},{add:1000},{add:0,lbl:'Clear'}].forEach(q=>{
        const b=document.createElement('button');b.className='qbtn';b.textContent=q.lbl||('+'+q.add.toLocaleString());
        b.onclick=function(){
          if(q.add===0){cashInp.value='';cashInp.dispatchEvent(new Event('input'));}
          else{cashInp.value=(parseFloat(cashInp.value)||0)+q.add;cashInp.dispatchEvent(new Event('input'));}
        };
        qg.appendChild(b);
      });
      body.appendChild(qg);

      // Change display
      const changeBox=document.createElement('div');changeBox.className='change-box';
      const changeL=document.createElement('div');changeL.className='change-l';
      const changeLbl=document.createElement('div');changeLbl.className='change-lbl';changeLbl.textContent='Change';
      const changeVal=document.createElement('div');changeVal.className='change-val';changeVal.id='changeVal';
      changeVal.textContent=change>=0?fmt(change):'--';
      changeVal.style.color=change>=0?'var(--st)':'var(--dt)';
      changeL.appendChild(changeLbl);changeL.appendChild(changeVal);
      const changeR=document.createElement('div');changeR.className='change-r';
      changeR.innerHTML='<div class="change-lbl">Total</div><div class="total-val">'+fmt(tot())+'</div>';
      changeBox.appendChild(changeL);changeBox.appendChild(changeR);body.appendChild(changeBox);

      // Confirm button
      const confirmBtn=document.createElement('button');
      confirmBtn.className='confirm-btn'+(ct<tot()?' disabled':'');
      confirmBtn.textContent=ct>=tot()?'Confirm sale':'Enter cash amount';
      body.appendChild(confirmBtn);

      // Receipt
      const det=document.createElement('details');
      const sum=document.createElement('summary');sum.style.cssText='font-size:12px;color:var(--t3);cursor:pointer;padding:8px 0;text-align:center;list-style:none';sum.textContent='Show receipt preview';
      const rbox=document.createElement('div');rbox.className='rbox';rbox.style.marginTop='8px';rbox.id='receiptBox';rbox.textContent=receiptStr(m.method,id,'');
      det.appendChild(sum);det.appendChild(rbox);body.appendChild(det);

      // Cancel button
      const cancelBtn=document.createElement('button');cancelBtn.style.cssText='width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px';cancelBtn.textContent='Cancel';
      cancelBtn.onclick=closeModal;body.appendChild(cancelBtn);

      // Wire up cash input
      cashInp.addEventListener('input',function(){
        const v=parseFloat(this.value)||0;S.cashTendered=v;
        const ch=v-tot();
        const cv=document.getElementById('changeVal');
        if(cv){cv.textContent=ch>=0?fmt(ch):'--';cv.style.color=ch>=0?'var(--st)':'var(--dt)';}
        if(ch>=0){confirmBtn.className='confirm-btn';confirmBtn.textContent='Confirm sale';}
        else{confirmBtn.className='confirm-btn disabled';confirmBtn.textContent='Enter cash amount';}
      });
      setTimeout(()=>cashInp.focus(),100);

      confirmBtn.onclick=function(){
        if(S.cashTendered<tot()&&!S.chargeToUtang)return;
        const txid=txId();
        const payMethod=S.chargeToUtang?'Utang':'Cash';
        const tx={id:txid,date:new Date().toISOString(),items:S.cart.map(i=>({name:i.name,qty:i.qty,price:i.price})),total:tot(),method:payMethod,receipt:receiptStr(payMethod,txid),customer:S.selectedCustomer?S.selectedCustomer.name:'',cashier:S.activeCashier?S.activeCashier.name:''};
        S.cart.forEach(ci=>{const p=S.prods.find(x=>x.id===ci.id);if(p&&p.stock!==999)p.stock=Math.max(0,p.stock-ci.qty);});
        const cartCopy=[...S.cart];
        S.sales.push(tx);S.salesTotal+=tot();S.cart=[];S.disc=0;S.cashTendered=0;S.cartOpen=false;
        S.selectedCustomer=null;S.chargeToUtang=false;
        save();syncSaleToCloud(tx);recordCustomerSale(tx);deductIngredients(cartCopy);
        closeModal();toast('Sale recorded - '+txid);
      };

    } else {
      // Non-cash Card/GCash
      const titleEl=document.createElement('div');titleEl.className='mtitle';
      titleEl.textContent='Payment - '+m.method;body.appendChild(titleEl);
      // Total display
      const totD=document.createElement('div');
      totD.style.cssText='background:var(--bg0);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center';
      totD.innerHTML='<span style="font-size:13px;font-weight:700;color:var(--t3);text-transform:uppercase">Total (VAT incl.)</span><span style="font-size:24px;font-weight:800">'+fmt(tot())+'</span>';
      body.appendChild(totD);
      // Reference number input if required
      let refInp=null;
      if(S.requireRef){
        const rf=document.createElement('div');rf.className='mf';
        rf.innerHTML='<label>Reference / Transaction number *</label>';
        refInp=document.createElement('input');refInp.type='text';
        refInp.placeholder='Enter reference number';
        refInp.style.cssText='width:100%;padding:14px;border-radius:12px;border:2px solid var(--ac);background:var(--bg2);color:var(--t1);font-size:16px;outline:none';
        rf.appendChild(refInp);body.appendChild(rf);
      }
      // Receipt preview
      const det=document.createElement('details');
      const sumEl=document.createElement('summary');
      sumEl.style.cssText='font-size:12px;color:var(--t3);cursor:pointer;padding:8px 0;text-align:center;list-style:none';
      sumEl.textContent='Show receipt preview';
      const rb=document.createElement('div');rb.className='rbox';rb.style.marginTop='8px';rb.textContent=receiptStr(m.method,id,'');
      det.appendChild(sumEl);det.appendChild(rb);body.appendChild(det);
      // Buttons
      const btns=document.createElement('div');btns.className='mbtns';
      const cancelBtn=document.createElement('button');cancelBtn.textContent='Cancel';cancelBtn.onclick=closeModal;
      const confirmBtn=document.createElement('button');confirmBtn.className='mpri';
      confirmBtn.style.cssText='flex:1;font-size:15px;padding:14px';
      confirmBtn.textContent='Confirm sale';
      confirmBtn.onclick=function(){
        if(S.requireRef&&refInp&&!refInp.value.trim()){
          refInp.style.borderColor='var(--df)';refInp.focus();
          toast('Please enter reference number');return;
        }
        const txid=txId();const refNum=refInp?refInp.value.trim():'';
        const tx={id:txid,date:new Date().toISOString(),items:S.cart.map(i=>({name:i.name,qty:i.qty,price:i.price})),total:tot(),method:m.method,ref:refNum,receipt:receiptStr(m.method,txid,refNum),customer:S.selectedCustomer?S.selectedCustomer.name:'',cashier:S.activeCashier?S.activeCashier.name:''};
        S.cart.forEach(ci=>{const p=S.prods.find(x=>x.id===ci.id);if(p&&p.stock!==999)p.stock=Math.max(0,p.stock-ci.qty);});
        const cartCopy2=[...S.cart];
        S.sales.push(tx);S.salesTotal+=tot();S.cart=[];S.disc=0;S.cashTendered=0;S.cartOpen=false;
        S.selectedCustomer=null;S.chargeToUtang=false;
        save();syncSaleToCloud(tx);recordCustomerSale(tx);deductIngredients(cartCopy2);
        closeModal();toast('Sale recorded - '+txid);
      };
      btns.appendChild(cancelBtn);btns.appendChild(confirmBtn);body.appendChild(btns);
    }

  } else if(m.type==='viewtx'){
    body.innerHTML='<div class="mtitle">'+m.tx.id+(m.tx.voided?'<span style="font-size:12px;color:var(--dt);margin-left:8px;font-weight:400">VOIDED</span>':'')+'</div>';
    if(m.tx.cashier){const cs=document.createElement('div');cs.style.cssText='font-size:12px;color:var(--t3)';cs.textContent='Cashier: '+m.tx.cashier;body.appendChild(cs);}
    const rb=document.createElement('div');rb.className='rbox';rb.textContent=m.tx.receipt;body.appendChild(rb);
    const b=document.createElement('div');b.className='mbtns';
    if(!m.tx.voided){
      const vb=document.createElement('button');vb.className='mvoid';vb.textContent='Void/Refund';
      vb.onclick=function(){
        if(confirm('Void transaction '+m.tx.id+'?\nStock will be restored.')){
          const tx=S.sales.find(s=>s.id===m.tx.id);
          if(tx){tx.voided=true;S.salesTotal=Math.max(0,S.salesTotal-tx.total);
            tx.items.forEach(it=>{const p=S.prods.find(x=>x.name===it.name);if(p&&p.stock!==999)p.stock+=it.qty;});}
          save();closeModal();toast('Transaction voided');
        }
      };
      b.appendChild(vb);
    }
    const cb=document.createElement('button');cb.textContent='Close';cb.onclick=closeModal;b.appendChild(cb);body.appendChild(b);

  } else if(m.type==='itemNote'){
    const it=S.cart[m.idx];
    body.innerHTML='<div class="mtitle">Note for '+it.name+'</div>';
    const mf=document.createElement('div');mf.className='mf';mf.innerHTML='<label>Customer note (e.g. no onions, size L)</label>';

    save2.onclick=function(){S.cart[m.idx].note=ta.value.trim();closeModal();};
    btns.appendChild(cancel);btns.appendChild(save2);body.appendChild(btns);
    setTimeout(()=>ta.focus(),100);

  } else if(m.type==='variantPick'){
    const p=m.prod;
    body.innerHTML='<div class="mtitle">'+p.name+'</div><div style="font-size:14px;color:var(--t2);margin-top:-8px">Choose a variant</div>';
    const chips=document.createElement('div');chips.style.cssText='display:flex;flex-wrap:wrap;gap:10px';
    p.variants.forEach(v=>{
      const isOut=v.stock===0;
      const chip=document.createElement('div');
      chip.style.cssText='padding:12px 18px;border-radius:12px;border:1.5px solid var(--b2);background:var(--bg2);cursor:pointer;font-size:14px;font-weight:600;'+(isOut?'opacity:0.4;pointer-events:none;':'');
      chip.innerHTML='<div>'+v.label+'</div><div style="font-size:11px;color:var(--t3);margin-top:3px">'+fmt(v.price!==undefined?v.price:p.price)+' · '+(v.stock===999?'unlimited':v.stock+' left')+'</div>';
      if(!isOut){chip.onclick=function(){
        const ex=S.cart.find(i=>i.id===p.id&&i.variantLabel===v.label);
        if(ex)ex.qty++;else S.cart.push({id:p.id,name:p.name,price:v.price!==undefined?v.price:p.price,qty:1,variantLabel:v.label,note:''});
        closeModal();toast(p.name+' ('+v.label+') added');
      };}
      chips.appendChild(chip);
    });
    body.appendChild(chips);
    const btns=document.createElement('div');btns.className='mbtns';
    const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=closeModal;btns.appendChild(cancel);body.appendChild(btns);

  } else if(m.type==='quickWastage'){
    body.innerHTML='<div class="mtitle">Log wastage</div>';
    const grid=document.createElement('div');grid.style.cssText='display:flex;flex-direction:column;gap:12px';
    [{id:'wItem',lbl:'Item name',type:'text',ph:'e.g. Bread, Coffee'},{id:'wQty',lbl:'Quantity',type:'number',ph:'1'},{id:'wCost',lbl:'Estimated cost (PHP)',type:'number',ph:'0'},{id:'wReason',lbl:'Reason',type:'text',ph:'e.g. Expired, Dropped'}].forEach(f=>{
      const mf=document.createElement('div');mf.className='mf';mf.innerHTML='<label>'+f.lbl+'</label>';
      const inp=document.createElement('input');inp.id=f.id;inp.type=f.type;inp.placeholder=f.ph;
      mf.appendChild(inp);grid.appendChild(mf);
    });
    body.appendChild(grid);
    const btns=document.createElement('div');btns.className='mbtns';
    const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=closeModal;
    const save2=document.createElement('button');save2.className='mpri';save2.textContent='Log';
    save2.onclick=async function(){
      const item=(document.getElementById('wItem')||{}).value||'';
      if(!item){toast('Enter item name');return;}
      if(CLOUD.token&&CLOUD.bizId){
        try{
          const h2={...H,'Authorization':'Bearer '+CLOUD.token};
          await fetch(SUPA_URL+'/rest/v1/wastage',{method:'POST',headers:{...h2,'Prefer':'return=representation'},body:JSON.stringify({biz_id:CLOUD.bizId,item_name:item,qty:parseFloat((document.getElementById('wQty')||{}).value)||1,cost:parseFloat((document.getElementById('wCost')||{}).value)||0,reason:(document.getElementById('wReason')||{}).value||'',date:new Date().toISOString()})});
