<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arroyo POS — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --bg1:#161b22;
  --bg2:#1c2333;
  --bg3:#21262d;
  --t1:#e6edf3;
  --t2:#8b949e;
  --t3:#484f58;
  --b1:rgba(48,54,61,0.8);
  --b2:rgba(48,54,61,1);
  --ac:#2f81f7;
  --ac2:#1a3d6e;
  --sg:#1a3a2a;
  --st:#3fb950;
  --wg:#3d2b00;
  --wt:#d29922;
  --dg:#3d1a1a;
  --dt:#f85149;
  --pg:#2d1b69;
  --pt:#a371f7;
  --gold:#e3b341;
  --navy:#0d1117;
}
/* Mobile top bar */
.mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg1);border-bottom:1px solid var(--b1);z-index:150;align-items:center;padding:0 14px;gap:12px}
.hamburger{display:none;background:none;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:6px;flex-shrink:0}
.mobile-title{font-size:14px;font-weight:700;flex:1}
.mobile-biz{font-size:11px;color:var(--t3)}
/* Overlay */
.sidebar-overlay{display:none}
/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg1);border-top:1px solid var(--b1);z-index:150;justify-content:space-around;align-items:center;padding:0 4px}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;cursor:pointer;border-radius:8px;min-width:44px;border:none;background:none;color:var(--t3);transition:color .15s}
.bnav-item.active{color:var(--ac)}
.bnav-item i{font-size:20px}
.bnav-label{font-size:9px;font-weight:600}
/* Adjust main for mobile topbar */
@media(max-width:768px){.main{padding-top:64px}}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:14px}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--bg1);border:1px solid var(--b2);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.auth-ico{width:44px;height:44px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.auth-field input{padding:12px 14px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none;width:100%;transition:border-color .2s}
.auth-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(47,129,247,0.1)}
.auth-btn{padding:13px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5}
.auth-err{font-size:13px;color:var(--dt);min-height:18px;text-align:center}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;overflow-y:auto}
.sb-brand{padding:16px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px}
.sb-ico{width:32px;height:32px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700;color:var(--t1)}
.sb-biz{font-size:11px;color:var(--t3)}
.nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--bg2);color:var(--t1)}
.nav-item.active{background:rgba(47,129,247,0.15);color:var(--ac);font-weight:600}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:12px 10px 4px}
.sb-foot{padding:12px;border-top:1px solid var(--b1)}
.user-email{font-size:11px;color:var(--t3);padding:4px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.so-btn{padding:8px 10px;border-radius:6px;border:1px solid var(--b1);background:none;color:var(--t3);font-size:12px;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.so-btn:hover{color:var(--dt);border-color:rgba(248,81,73,0.3);background:rgba(248,81,73,0.05)}
.main{margin-left:220px;flex:1;padding:28px;min-height:100vh;background:var(--bg)}
.page-title{font-size:20px;font-weight:700;margin-bottom:18px;color:var(--t1);letter-spacing:-.3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:16px;transition:border-color .2s}
.stat:hover{border-color:var(--b2)}
.stat-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-v{font-size:22px;font-weight:800;letter-spacing:-.5px}
.stat-s{font-size:11px;color:var(--t2);margin-top:4px}
.stat.blue .stat-v{color:var(--ac)}
.stat.green .stat-v{color:var(--st)}
.stat.red .stat-v{color:var(--dt)}
.stat.amber .stat-v{color:var(--wt)}
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:18px;margin-bottom:16px}
.card-hd{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;color:var(--t1)}
.card-hd span{font-size:11px;font-weight:500;color:var(--t3)}
.chart-wrap{position:relative;height:220px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:0 0 10px;text-align:left;border-bottom:1px solid var(--b1)}
.tbl td{padding:10px 0;border-bottom:1px solid var(--b1);color:var(--t2)}
.tbl td:first-child{color:var(--t1);font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--b1);gap:12px}
.row:last-child{border-bottom:none}
.row-l{flex:1}
.row-name{font-size:14px;font-weight:600;color:var(--t1)}
.row-sub{font-size:12px;color:var(--t3);margin-top:2px}
.row-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
.b-green{background:rgba(63,185,80,0.12);color:var(--st);border:1px solid rgba(63,185,80,0.2)}
.b-blue{background:rgba(47,129,247,0.12);color:var(--ac);border:1px solid rgba(47,129,247,0.2)}
.b-red{background:rgba(248,81,73,0.12);color:var(--dt);border:1px solid rgba(248,81,73,0.2)}
.b-amber{background:rgba(210,153,34,0.12);color:var(--wt);border:1px solid rgba(210,153,34,0.2)}
.b-gray{background:var(--bg3);color:var(--t3);border:1px solid var(--b1)}
.b-purple{background:rgba(163,113,247,0.12);color:var(--pt);border:1px solid rgba(163,113,247,0.2)}
.filter-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.fp{padding:6px 14px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.fp:hover{color:var(--t1);border-color:var(--t3)}
.fp.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-size:14px;gap:12px}
.spin{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.add-btn{padding:7px 14px;border-radius:7px;border:1px solid var(--ac);background:var(--ac);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.add-btn:hover{opacity:.85}
.top-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1)}
.top-item:last-child{border-bottom:none}
.top-rank{width:22px;height:22px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0}
.top-info{flex:1}
.top-name{font-size:14px;font-weight:600;color:var(--t1)}
.top-sub{font-size:12px;color:var(--t3);margin-top:2px}
.top-val{font-size:14px;font-weight:700;color:var(--ac)}
.emp-card{background:var(--bg2);border-radius:8px;padding:14px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;border:1px solid var(--b1)}
.emp-av{width:38px;height:38px;border-radius:50%;background:rgba(47,129,247,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ac);flex-shrink:0;border:1px solid rgba(47,129,247,0.3)}
.emp-info{flex:1;min-width:0}
.emp-name{font-size:14px;font-weight:600;color:var(--t1)}
.emp-role{font-size:12px;color:var(--t3);margin-top:2px}
.emp-pay{font-size:12px;color:var(--t2);margin-top:4px}
.emp-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.sm-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.sm-btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--t3)}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b1);font-size:13px;color:var(--t2)}
.payslip-row:last-child{border-bottom:none;font-weight:700;font-size:15px;color:var(--st);padding-top:12px;margin-top:4px;border-top:1px solid var(--b2)}
.ov{position:fixed;inset:0;background:rgba(1,4,9,0.8);z-index:9999;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg1);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px;display:flex;flex-direction:column;gap:12px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--b2)}
.modal-title{font-size:17px;font-weight:700;color:var(--t1)}
.mf{display:flex;flex-direction:column;gap:5px}
.mf label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.mf input,.mf select,.mf textarea{padding:11px 12px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none;width:100%;transition:border-color .15s}
.mf input:focus,.mf select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(47,129,247,0.1)}
.mf textarea{min-height:70px;resize:vertical;font-family:inherit}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;padding-top:4px;border-top:1px solid var(--b1)}
.modal-btns button{padding:10px 16px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btns button:hover{background:var(--bg3)}
.modal-btns .pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.modal-btns .pri:hover{opacity:.9}
.modal-btns .del{color:var(--dt);margin-right:auto;border-color:transparent;background:none}
.modal-btns .del:hover{background:rgba(248,81,73,0.08);border-color:rgba(248,81,73,0.2)}
@media(max-width:768px){
  .sidebar{transform:translateX(-220px);transition:transform .3s;position:fixed;height:100vh;z-index:200}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block!important;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
  .sidebar-overlay.open{opacity:1;pointer-events:all}
  .main{margin-left:0;padding:12px;padding-bottom:72px}
  .two-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .page-title{font-size:18px;margin-bottom:14px}
  .card{padding:14px;margin-bottom:14px}
  .card-hd{font-size:13px;margin-bottom:12px;flex-wrap:wrap;gap:6px}
  .tbl{font-size:12px}
  .tbl th{font-size:9px;padding:0 0 8px}
  .tbl td{padding:8px 0}
  .stat{padding:12px}
  .stat-v{font-size:20px}
  .stat-l{font-size:9px}
  .emp-card{flex-wrap:wrap}
  .emp-btns{flex-wrap:wrap}
  .filter-bar{gap:5px}
  .fp{padding:6px 12px;font-size:11px}
  .row-name{font-size:13px}
  .row-sub{font-size:11px}
  .add-btn{font-size:11px;padding:6px 10px}
  /* Bottom nav */
  .bottom-nav{display:flex!important}
  /* Hamburger */
  .hamburger{display:flex!important}
  /* Hide sidebar brand on mobile - shown in topbar instead */
  .mobile-topbar{display:flex!important}
}

/* ===== IMPROVED EMPLOYEE & ATTENDANCE ===== */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:4px}
.emp-card2{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.emp-card2:hover{border-color:var(--b2)}
.emp-head{display:flex;align-items:center;gap:12px}
.emp-av2{width:42px;height:42px;border-radius:12px;background:rgba(47,129,247,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--ac);flex-shrink:0;border:1.5px solid rgba(47,129,247,0.25)}
.emp-meta{flex:1;min-width:0}
.emp-name2{font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-role2{display:flex;align-items:center;gap:6px;margin-top:3px}
.emp-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.emp-status-dot.in{background:var(--st)}
.emp-status-dot.out{background:var(--t3)}
.emp-pay2{font-size:11px;color:var(--t2);padding:4px 10px;background:var(--bg3);border-radius:20px;border:1px solid var(--b1);white-space:nowrap}
.emp-actions{display:flex;gap:6px;flex-wrap:wrap}
.emp-actions .sm-btn{flex:1;min-width:60px;text-align:center;justify-content:center}
/* Attendance timeline */
.att-day-group{margin-bottom:16px}
.att-day-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 8px;display:flex;align-items:center;gap:8px}
.att-day-label::after{content:'';flex:1;height:1px;background:var(--b1)}
.att-row2{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg2);border-radius:8px;margin-bottom:6px;border:1px solid var(--b1)}
.att-avatar{width:30px;height:30px;border-radius:8px;background:rgba(47,129,247,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ac);flex-shrink:0}
.att-info{flex:1;min-width:0}
.att-name2{font-size:13px;font-weight:600;color:var(--t1)}
.att-times{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.att-time-block{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)}
.att-time-block i{font-size:11px}
.att-arrow{color:var(--t3);font-size:10px}
.att-active-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(63,185,80,0.12);color:var(--st);border:1px solid rgba(63,185,80,0.2)}
.att-hours{font-size:13px;font-weight:700;color:var(--ac);white-space:nowrap;flex-shrink:0}
.att-hours.active{color:var(--st)}
@media(max-width:768px){.emp-grid{grid-template-columns:1fr}}

/* ===== TODAY'S SHIFT TRACKER ===== */
.shift-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.shift-date{font-size:12px;color:var(--t3);font-weight:600}
.shift-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.shift-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.shift-pill.in{background:rgba(63,185,80,0.12);color:var(--st);border:1px solid rgba(63,185,80,0.25)}
.shift-pill.out{background:var(--bg3);color:var(--t3);border:1px solid var(--b1)}
.shift-pill.total{background:rgba(47,129,247,0.1);color:var(--ac);border:1px solid rgba(47,129,247,0.2)}
.shift-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
/* Employee shift rows */
.shift-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px;border:1.5px solid var(--b1);transition:border-color .15s}
.shift-row.clocked-in{border-color:rgba(63,185,80,0.3);background:rgba(63,185,80,0.04)}
.shift-row.clocked-out{opacity:.85}
.shift-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.shift-av.in{background:rgba(63,185,80,0.15);color:var(--st)}
.shift-av.out{background:var(--bg3);color:var(--t3)}
.shift-info{flex:1;min-width:0}
.shift-name{font-size:14px;font-weight:600;color:var(--t1)}
.shift-role{font-size:11px;color:var(--t3);margin-top:1px}
.shift-times{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.shift-time-in{font-size:12px;color:var(--st);font-weight:600;display:flex;align-items:center;gap:3px}
.shift-time-out{font-size:12px;color:var(--t2);font-weight:600;display:flex;align-items:center;gap:3px}
.shift-sep{color:var(--t3);font-size:11px}
.shift-noshow{font-size:12px;color:var(--t3);font-style:italic}
.shift-hrs{font-size:13px;font-weight:800;text-align:right;flex-shrink:0;min-width:44px}
.shift-hrs.active{color:var(--st)}
.shift-hrs.done{color:var(--ac)}
.shift-hrs.none{color:var(--t3)}
/* Duration live label */
.shift-duration{font-size:10px;color:var(--t3);margin-top:2px}
/* History tabs */
.att-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.att-tabs::-webkit-scrollbar{height:0}
.att-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.att-tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
/* Per employee history modal */
.emp-hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1);gap:12px}
.emp-hist-row:last-child{border-bottom:none}
.emp-hist-date{font-size:12px;font-weight:700;color:var(--t2);min-width:80px}
.emp-hist-times{font-size:12px;color:var(--t2);flex:1}
.emp-hist-hrs{font-size:13px;font-weight:700;color:var(--ac)}
</style>
</head>
<body>
<div id="root"></div>

const SB_URL='https://btfazallxcbmiitbcmkv.supabase.co';

async function api(path,opts){
  const authToken=(SESSION&&SESSION.token)?SESSION.token:SB_KEY;
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+authToken,'Content-Type':'application/json',...(opts&&opts.headers||{})};
  try{
    const r=await fetch(SB_URL+path,{...opts,headers:h});
    if(!r.ok){
      const errText=await r.text();
      console.error('API error',r.status,errText);
      return null;
    }
    const t=await r.text();return t?JSON.parse(t):null;
  }catch(e){console.error('API fetch error',e);return null;}
}

function filteredSales(){
  const now=new Date();
  return D.sales.filter(function(s){
    if(s.voided)return false;
    const d=new Date(s.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();
    if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(UI.filter==='month'){const m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
}
function filteredExp(){
  const now=new Date();
  return D.expenses.filter(function(e){
    const d=new Date(e.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();
    if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(UI.filter==='month'){const m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
}
function topProds(){
  const map={};
  D.sales.filter(function(s){return!s.voided;}).forEach(function(s){
    (s.items||[]).forEach(function(it){
      if(!map[it.name])map[it.name]={name:it.name,qty:0,rev:0};
      map[it.name].qty+=(it.qty||1);map[it.name].rev+=(it.price||0)*(it.qty||1);
    });
  });
  return Object.values(map).sort(function(a,b){return b.rev-a.rev;}).slice(0,8);
}
function salesByDay(){
  const map={};
  filteredSales().forEach(function(s){
    const k=new Date(s.date).toLocaleDateString('en-PH',{month:'short',day:'numeric'});
    map[k]=(map[k]||0)+s.total;
  });
  const days=Object.keys(map);
  return{labels:days,data:days.map(function(k){return map[k];})};
}

function mfField(box,id,lbl,type,val,ph,opts){
  const mf=el('div','mf','<label>'+lbl+'</label>');

  if(type==='select'){
    inp=document.createElement('select');inp.id=id;
    (opts||[]).forEach(function(o){const op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(o.v==val)op.selected=true;inp.appendChild(op);});
  } else if(type==='textarea'){
    inp=document.createElement('textarea');inp.id=id;inp.placeholder=ph||'';inp.value=val||'';
  } else {
    inp=document.createElement('input');inp.type=type||'text';inp.id=id;inp.value=val||'';inp.placeholder=ph||'';if(type==='number')inp.min='0';
  }
  mf.appendChild(inp);box.appendChild(mf);
}

    btn.disabled=true;btn.textContent='Signing in...';

    if(!res.access_token){document.getElementById('dErr').textContent=res.error&&res.error.message||'Sign in failed.';btn.disabled=false;btn.textContent='Sign in to dashboard';return;}
    SESSION.token=res.access_token;SESSION.user=res.user&&res.user.id;SESSION.email=email;

    const loginHeaders={'apikey':SB_KEY,'Authorization':'Bearer '+res.access_token,'Content-Type':'application/json'};

function calcCOGS(salesArr){
  // Calculate Cost of Goods Sold from recipes
  let cogs=0;
  salesArr.filter(function(s){return!s.voided;}).forEach(function(s){
    (s.items||[]).forEach(function(item){
      const recipes=D.recipes.filter(function(r){return r.product_name===item.name;});
      recipes.forEach(function(r){
        const ing=D.ingredients.find(function(i){return i.id===r.ingredient_id;});
        if(ing)cogs+=r.qty_used*(item.qty||1)*ing.cost_per_unit;
      });
    });
  });
  return cogs;
}

function renderOverview(main,fs,fe,rev,exp,net){
  main.appendChild(el('div','page-title','Overview'));
  // Low stock alert banner
  const lowItems=D.ingredients.filter(function(i){return i.stock<=i.low_threshold;});
  if(lowItems.length>0){
    const alert=el('div','');
    alert.style.cssText='background:var(--dg);border:1px solid var(--dt);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer';
    alert.innerHTML='<i class="ti ti-alert-triangle" style="font-size:18px;color:var(--dt);flex-shrink:0" aria-hidden="true"></i><div><div style="font-weight:700;color:var(--dt)">'+lowItems.length+' ingredient'+(lowItems.length>1?'s':'')+' running low</div><div style="font-size:12px;color:var(--t2);margin-top:2px">'+lowItems.map(function(i){return i.name+' ('+i.stock+' '+i.unit+' left)';}).join(' · ')+'</div></div>';
    alert.onclick=function(){UI.page='ingredients';render();};
    main.appendChild(alert);
  }
  main.appendChild(filterBar());
  const cogs=calcCOGS(fs);
  const grossProfit=rev-cogs;
  const netProfit=rev-exp;
  const grossMargin=rev>0?Math.round(grossProfit/rev*100):0;
  const sg=el('div','stats-grid');
  sg.appendChild(statCard('Revenue',fmt(rev),fs.length+' transactions','blue'));
  sg.appendChild(statCard('Gross profit',fmt(grossProfit),grossMargin+'% margin',grossProfit>=0?'green':'red'));
  sg.appendChild(statCard('Expenses',fmt(exp),fe.length+' entries','red'));
  sg.appendChild(statCard('Net profit',fmt(netProfit),netProfit>=0?'After all costs':'Loss',netProfit>=0?'green':'red'));
  main.appendChild(sg);

  // Profit summary bar
  const profBar=el('div','card');
  profBar.style.marginBottom='16px';
  const pbRows=[
    {l:'Revenue',v:fmt(rev),c:'var(--ac)'},
    {l:'Cost of goods (ingredients)',v:'− '+fmt(cogs),c:'var(--dt)'},
    {l:'Gross profit',v:fmt(grossProfit),c:'var(--st)',bold:true},
    {l:'Operating expenses',v:'− '+fmt(exp),c:'var(--dt)'},
    {l:'Net profit',v:fmt(netProfit),c:netProfit>=0?'var(--st)':'var(--dt)',bold:true,big:true},
  ];
  profBar.innerHTML='<div class="card-hd">Profit summary <span>'+UI.filter+'</span></div>';
  pbRows.forEach(function(row){
    const r=el('div','');
    r.style.cssText='display:flex;justify-content:space-between;padding:'+(row.big?'12px 0 4px':'7px 0')+';border-bottom:1px solid var(--b1);'+(row.big?'border-top:2px solid var(--b2);margin-top:4px':'');

      '<span style="font-size:'+(row.big?'16':'13')+'px;font-weight:700;color:'+row.c+'">'+row.v+'</span>';
    profBar.appendChild(r);
  });

  // Show setup tip if COGS is 0 but there are sales
  if(cogs===0&&rev>0){
    const tip=el('div','');
    tip.style.cssText='background:rgba(47,129,247,0.08);border:1px solid rgba(47,129,247,0.2);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--t2);line-height:1.6';
    tip.innerHTML='<strong style="color:var(--ac)">💡 Set up recipes to see full profit calculation</strong><br>'+
      'Cost of goods shows PHP 0.00 because no recipes are linked yet.<br>'+
      'Go to <strong>Ingredients</strong> &rarr; add your ingredients, then <strong>Recipes</strong> &rarr; link ingredients to each product.';
    profBar.appendChild(tip);
  }

  // Show setup tip if no sales yet

    const pct=rev>0?Math.round(a/rev*100):0;
    const r=el('div','row');r.innerHTML='<div class="row-l"><div class="row-name">'+m+'</div><div class="row-sub">'+cnt+' txns</div></div><div class="row-r"><div style="font-weight:700;color:var(--ac)">'+fmt(a)+'</div><div style="font-size:11px;color:var(--t3)">'+pct+'%</div></div>';
    pm.appendChild(r);
  });
  two.appendChild(pm);
  const ra=el('div','card');ra.innerHTML='<div class="card-hd">Recent sales</div>';
  fs.slice(0,6).forEach(function(s){
    const items=(s.items||[]).map(function(i){return i.name;}).join(', ').slice(0,35);
    const r=el('div','row');r.innerHTML='<div class="row-l"><div class="row-name">'+items+'</div><div class="row-sub">'+ft(s.date)+'</div></div><div style="font-weight:700;color:var(--ac)">'+fmt(s.total)+'</div>';
    ra.appendChild(r);
  });
  if(!fs.length)ra.appendChild(el('div','empty','No sales yet'));
  two.appendChild(ra);main.appendChild(two);

  // Setup checklist for new businesses
  const hasProducts=D.products.length>0;
  const hasEmployees=D.employees.length>0;
  const hasIngredients=D.ingredients.length>0;
  const hasRecipes=D.recipes.length>0;
  const hasSales=D.sales.length>0;
  const setupDone=hasProducts&&hasEmployees&&hasIngredients&&hasRecipes&&hasSales;
  if(!setupDone){
    const cl=el('div','card');
    cl.innerHTML='<div class="card-hd">Setup checklist <span>Complete these to unlock all features</span></div>';
    const steps=[
      {done:hasProducts,label:'Add products in POS app',sub:'POS &rarr; Inventory &rarr; + Add product',link:'pos'},
      {done:hasSales,label:'Make your first sale',sub:'POS &rarr; tap a product &rarr; Checkout',link:'sales'},
      {done:hasEmployees,label:'Add employees',sub:'Dashboard &rarr; Employees &rarr; + Add employee',link:'employees'},
      {done:hasIngredients,label:'Add ingredients',sub:'Dashboard &rarr; Ingredients &rarr; + Add ingredient',link:'ingredients'},
      {done:hasRecipes,label:'Set up recipes',sub:'Dashboard &rarr; Recipes &rarr; link ingredients to products',link:'recipes'},
    ];
    steps.forEach(function(s){
      const r=el('div','row');
      const rl=el('div','row-l');
      rl.innerHTML='<div class="row-name" style="color:'+(s.done?'var(--t3)':'var(--t1)')+';text-decoration:'+(s.done?'line-through':'none')+'">'+s.label+'</div>'+
        '<div class="row-sub">'+s.sub+'</div>';
      const rr=el('div','row-r');
      rr.innerHTML=s.done?'<span class="badge b-green">✓ Done</span>':'<span class="badge b-blue">Pending</span>';
      r.appendChild(rl);r.appendChild(rr);cl.appendChild(r);
    });
    const pct=steps.filter(function(s){return s.done;}).length;
    const prog=el('div','');prog.style.cssText='margin-top:12px';
    prog.innerHTML='<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t3);margin-bottom:6px"><span>Setup progress</span><span>'+pct+'/'+steps.length+' complete</span></div>'+
      '<div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.round(pct/steps.length*100)+'%;background:var(--ac);border-radius:3px"></div></div>';
    cl.appendChild(prog);
    main.appendChild(cl);
  }
  setTimeout(function(){
    const ctx=document.getElementById('sChart');if(!ctx)return;
    const{labels,data}=salesByDay();
    if(CHARTS.s)CHARTS.s.destroy();
    CHARTS.s=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:'rgba(55,138,221,0.45)',borderColor:'#378add',borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#666660',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#666660',font:{size:11},callback:function(v){return'₱'+v.toLocaleString();}}}}}});
  },50);
}

function renderEmployees(main,fs){
  main.appendChild(el('div','page-title','Employees'));

  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const todayAtt=D.attendance.filter(function(a){return a.date===todayStr||new Date(a.date).toDateString()===now.toDateString();});
  const clockedInNow=todayAtt.filter(function(a){return a.time_in&&!a.time_out;}).length;
  const completedToday=todayAtt.filter(function(a){return a.time_in&&a.time_out;}).length;
  const totalHrsToday=todayAtt.reduce(function(a,r){return a+(r.hours_worked||0);},0);

  // Period attendance for stats
  const fAtt=D.attendance.filter(function(a){
    const d=new Date(a.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();
    if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(UI.filter==='month'){const m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
  const totalHrs=fAtt.reduce(function(a,r){return a+(r.hours_worked||0);},0);

  // --- Stats row ---
  const sg=el('div','stats-grid');
  sg.appendChild(statCard('Team size',D.employees.length,'employees',''));
  sg.appendChild(statCard('On shift now',clockedInNow,'clocked in','green'));
  sg.appendChild(statCard('Hours today',totalHrsToday.toFixed(1)+'h','completed shifts','blue'));
  sg.appendChild(statCard('Active loans',D.loans.filter(function(l){return l.status==='active';}).length,'','amber'));
  main.appendChild(sg);

  // ============================================================
  // TODAY'S SHIFT BOARD
  // ============================================================
  const shiftCard=el('div','card');
  const shiftHd=el('div','shift-header');
  shiftHd.innerHTML='<div class="card-hd" style="margin:0">Today\'s Shift Board</div>'
    +'<div class="shift-date">'+now.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+'</div>';
  shiftCard.appendChild(shiftHd);

  // Summary pills
  const sumRow=el('div','shift-summary');
  sumRow.innerHTML='<div class="shift-pill in"><span class="shift-dot"></span>'+clockedInNow+' On shift</div>'
    +'<div class="shift-pill out"><span class="shift-dot"></span>'+completedToday+' Completed</div>'
    +(D.employees.length-clockedInNow-completedToday>0?'<div class="shift-pill out"><span class="shift-dot"></span>'+(D.employees.length-clockedInNow-completedToday)+' Not in yet</div>':'')
    +'<div class="shift-pill total"><i class="ti ti-clock" style="font-size:12px"></i>'+totalHrsToday.toFixed(1)+'h total today</div>';
  shiftCard.appendChild(sumRow);

  if(!D.employees.length){
    shiftCard.appendChild(el('div','empty','No employees yet'));
  } else {
    // Sort: clocked-in first, then completed, then absent
    const sorted=D.employees.slice().sort(function(a,b){
      const aAtt=todayAtt.filter(function(x){return x.employee_id===a.id;});
      const bAtt=todayAtt.filter(function(x){return x.employee_id===b.id;});
      const aIn=aAtt.some(function(x){return x.time_in&&!x.time_out;});
      const bIn=bAtt.some(function(x){return x.time_in&&!x.time_out;});
      const aDone=aAtt.some(function(x){return x.time_in&&x.time_out;});
      const bDone=bAtt.some(function(x){return x.time_in&&x.time_out;});
      if(aIn&&!bIn)return -1;if(!aIn&&bIn)return 1;
      if(aDone&&!bDone)return -1;if(!aDone&&bDone)return 1;
      return a.name.localeCompare(b.name);
    });

    sorted.forEach(function(e){
      const empAtt=todayAtt.filter(function(a){return a.employee_id===e.id;});
      const activeShift=empAtt.find(function(a){return a.time_in&&!a.time_out;});
      const lastShift=empAtt.filter(function(a){return a.time_in&&a.time_out;}).sort(function(a,b){return new Date(b.time_in)-new Date(a.time_in);})[0];
      const isClockedIn=!!activeShift;
      const hasDone=!!lastShift;

      const row=el('div','shift-row '+(isClockedIn?'clocked-in':'clocked-out'));
      const av=el('div','shift-av '+(isClockedIn?'in':'out'),(e.name||'?')[0].toUpperCase());
      const info=el('div','shift-info');
      const timesEl=el('div','shift-times');

      if(isClockedIn){
        const inTime=new Date(activeShift.time_in);
        const elapsed=Math.floor((now-inTime)/60000);
        const elapsedStr=elapsed>=60?(Math.floor(elapsed/60)+'h '+(elapsed%60)+'m'):elapsed+'m';
        timesEl.innerHTML='<div class="shift-time-in"><i class="ti ti-login"></i>'+ft(activeShift.time_in)+'</div>'
          +'<span class="shift-sep">&rarr;</span>'
          +'<span class="att-active-badge">&#9679; Active '+elapsedStr+'</span>';
      } else if(hasDone){
        timesEl.innerHTML='<div class="shift-time-in"><i class="ti ti-login"></i>'+ft(lastShift.time_in)+'</div>'
          +'<span class="shift-sep">&rarr;</span>'
          +'<div class="shift-time-out"><i class="ti ti-logout"></i>'+ft(lastShift.time_out)+'</div>';
      } else {
        timesEl.innerHTML='<span class="shift-noshow">No shift recorded today</span>';
      }

      // All shifts today (multiple clock-ins)
      const allShiftsToday=empAtt.filter(function(a){return a.time_in&&a.time_out;});
      const totalEmpHrs=empAtt.reduce(function(a,r){return a+(r.hours_worked||0);},0);

      info.innerHTML='<div class="shift-name">'+e.name+'</div><div class="shift-role">'+e.role+'</div>';
      info.appendChild(timesEl);
      if(allShiftsToday.length>1){
        const multi=el('div','shift-duration');multi.textContent=allShiftsToday.length+' shifts today';
        info.appendChild(multi);
      }

      const hrs=el('div','shift-hrs '+(isClockedIn?'active':hasDone?'done':'none'));
      if(isClockedIn){
        const elapsed=Math.floor((now-new Date(activeShift.time_in))/3600000*10)/10;
        hrs.textContent=elapsed.toFixed(1)+'h+';
      } else if(totalEmpHrs>0){
        hrs.textContent=totalEmpHrs.toFixed(1)+'h';
      } else {
        hrs.textContent='—';
      }

      // Click to view employee's full att history
      row.style.cursor='pointer';
      row.onclick=function(){UI.modal={type:'empAtt',item:e};render();};
      row.appendChild(av);row.appendChild(info);row.appendChild(hrs);
      shiftCard.appendChild(row);
    });

    const hint=el('div','');
    hint.style.cssText='font-size:11px;color:var(--t3);text-align:center;padding:8px 0 0;';
    hint.textContent='Tap any employee to view their full attendance history';
    shiftCard.appendChild(hint);
  }
  main.appendChild(shiftCard);

  // ============================================================
  // EMPLOYEE LIST (manage)
  // ============================================================
  const empSec=el('div','card');
  const empHd=el('div','card-hd','Team');
  empHd.appendChild(addBtn('+ Add employee',function(){UI.modal={type:'emp',item:null};render();}));
  empSec.appendChild(empHd);

  if(!D.employees.length){
    empSec.appendChild(el('div','empty','No employees yet — add your first one'));
  } else {
    const grid=el('div','emp-grid');
    D.employees.forEach(function(e){
      const empAtt=todayAtt.filter(function(a){return a.employee_id===e.id;});
      const isClockedIn=empAtt.some(function(a){return a.time_in&&!a.time_out;});
      const activeShift=empAtt.find(function(a){return a.time_in&&!a.time_out;});
      const payLabel=e.pay_type==='hourly'?'PHP '+e.rate+'/hr'
        :e.pay_type==='daily'?'PHP '+e.rate+'/day'
        :e.pay_type==='monthly'?'PHP '+Number(e.rate).toLocaleString()+'/mo'
        :e.commission_pct+'% commission';

      const card=el('div','emp-card2');
      const head=el('div','emp-head');
      const av=el('div','emp-av2',(e.name||'?')[0].toUpperCase());
      const meta=el('div','emp-meta');
      meta.innerHTML='<div class="emp-name2">'+e.name+'</div>'
        +'<div class="emp-role2">'
        +'<span class="emp-status-dot '+(isClockedIn?'in':'out')+'"></span>'
        +'<span style="font-size:11px;color:var(--t3)">'+e.role+'</span>'
        +(isClockedIn&&activeShift?'<span style="font-size:10px;font-weight:700;color:var(--st);background:rgba(63,185,80,0.1);padding:1px 7px;border-radius:20px;border:1px solid rgba(63,185,80,0.2)">IN '+ft(activeShift.time_in)+'</span>':'')
        +'</div>';
      head.appendChild(av);head.appendChild(meta);
      const pay=el('div','emp-pay2',payLabel);
      const actions=el('div','emp-actions');
      function smBtn(lbl,fn){const b=el('button','sm-btn',lbl);b.onclick=fn;return b;}
      actions.appendChild(smBtn('History',function(){UI.modal={type:'empAtt',item:e};render();}));
      actions.appendChild(smBtn('Payslip',function(){UI.modal={type:'payslip',item:e};render();}));
      actions.appendChild(smBtn('Loan',function(){UI.modal={type:'loan',item:null,emp:e};render();}));
      actions.appendChild(smBtn('Edit',function(){UI.modal={type:'emp',item:e};render();}));
      card.appendChild(head);card.appendChild(pay);card.appendChild(actions);
      grid.appendChild(card);
    });
    empSec.appendChild(grid);
  }
  main.appendChild(empSec);

  // ============================================================
  // ATTENDANCE HISTORY (period)
  // ============================================================
  main.appendChild(filterBar());
  const attSec=el('div','card');
  const attHd=el('div','card-hd');
  attHd.innerHTML='Attendance history <span>'+fAtt.length+' records · '+totalHrs.toFixed(1)+'h total</span>';
  attSec.appendChild(attHd);

  if(!fAtt.length){
    attSec.appendChild(el('div','empty','No attendance records for this period'));
  } else {
    // Group by date descending
    const byDate={};
    fAtt.forEach(function(a){
      const k=new Date(a.date).toDateString();
      if(!byDate[k])byDate[k]=[];
      byDate[k].push(a);
    });
    const dateKeys=Object.keys(byDate).sort(function(a,b){return new Date(b)-new Date(a);});
    dateKeys.slice(0,14).forEach(function(dateStr){
      const records=byDate[dateStr];
      const y=new Date(now);y.setDate(y.getDate()-1);
      const lbl=dateStr===now.toDateString()?'Today'
        :dateStr===y.toDateString()?'Yesterday'
        :new Date(dateStr).toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'});
      const dayHrs=records.reduce(function(a,r){return a+(r.hours_worked||0);},0);
      const dayGroup=el('div','att-day-group');
      const dayLbl=el('div','att-day-label');
      dayLbl.innerHTML=lbl
        +'<span style="font-size:11px;color:var(--ac);font-weight:600;letter-spacing:0">'+(dayHrs>0?dayHrs.toFixed(1)+'h':'')+'</span>';
      dayGroup.appendChild(dayLbl);
      records.sort(function(a,b){return new Date(a.time_in)-new Date(b.time_in);}).forEach(function(a){

function renderRecipes(main){
  main.appendChild(el('div','page-title','Recipes'));
  const prodWithRecipe=new Set(D.recipes.map(function(r){return r.product_name;})).size;

  // Calculate servings remaining per product (limited by the most constraining ingredient)
  function servingsRemaining(p){
    const recipes=D.recipes.filter(function(r){return r.product_name===p.name;});
    if(!recipes.length)return null;
    let min=Infinity;
    recipes.forEach(function(r){
      const ing=D.ingredients.find(function(i){return i.id===r.ingredient_id;});
      if(ing&&r.qty_used>0){const s=Math.floor(ing.stock/r.qty_used);if(s<min)min=s;}
    });
    return min===Infinity?null:min;
  }

  const sg=el('div','stats-grid');
  sg.appendChild(statCard('Products',D.products.length,'total',''));
  sg.appendChild(statCard('With recipes',prodWithRecipe,'linked','blue'));
  // Total servings possible across all products
  let totalServings=0;
  D.products.forEach(function(p){const s=servingsRemaining(p);if(s!==null)totalServings+=s;});
  sg.appendChild(statCard('Total servings',totalServings,'can still make','green'));
  sg.appendChild(statCard('No recipe',D.products.length-prodWithRecipe,'need setup','amber'));
  main.appendChild(sg);

  const note=el('div','');note.style.cssText='font-size:13px;color:var(--t2);margin-bottom:16px;padding:12px 14px;background:var(--bg2);border-radius:10px;line-height:1.6';
  note.textContent='Set up ingredients per product here. When a product is sold on the POS, its ingredients are automatically deducted from stock.';
  main.appendChild(note);

  D.products.forEach(function(p){
    const prodRecipes=D.recipes.filter(function(r){return r.product_name===p.name;});
    const servings=servingsRemaining(p);
    const card=el('div','card');
    const hd=el('div','card-hd');

    // Servings badge
    const servBadge=servings!==null?'<span class="badge '+(servings<=5?'b-red':servings<=20?'b-amber':'b-green')+'">'+servings+' servings left</span>':'<span class="badge b-gray">No recipe</span>';
    hd.innerHTML='<div><div style="font-size:15px;font-weight:700">'+p.name+' '+servBadge+'</div><div style="font-size:12px;color:var(--t3);margin-top:3px">'+p.cat+' · '+fmt(p.price)+'</div></div>';

    const addIngBtn=addBtn('+ Add ingredient',function(){UI.modal={type:'recipe',product:p,item:null};render();});
    hd.appendChild(addIngBtn);card.appendChild(hd);

    if(!prodRecipes.length){
      const empty=el('div','','No ingredients set — add ingredients to enable auto stock deduction');
      empty.style.cssText='font-size:12px;color:var(--t3);padding:8px 0';
      card.appendChild(empty);
    } else {
      // Cost per serving
      let costPerServing=0;
      prodRecipes.forEach(function(r){
        const ing=D.ingredients.find(function(i){return i.id===r.ingredient_id;});
        if(ing)costPerServing+=r.qty_used*ing.cost_per_unit;
      });
      const margin=p.price-costPerServing;
      const marginPct=p.price>0?Math.round(margin/p.price*100):0;
      const summary=el('div','');
      summary.style.cssText='display:flex;gap:12px;flex-wrap:wrap;padding:8px 0 12px;border-bottom:1px solid var(--b1);margin-bottom:4px';
      summary.innerHTML='<div style="font-size:12px"><span style="color:var(--t3)">Cost/serving: </span><span style="font-weight:700;color:var(--dt)">'+fmt(costPerServing)+'</span></div>'+
        '<div style="font-size:12px"><span style="color:var(--t3)">Gross profit: </span><span style="font-weight:700;color:var(--st)">'+fmt(margin)+'</span></div>'+
        '<div style="font-size:12px"><span style="color:var(--t3)">Margin: </span><span style="font-weight:700;color:'+(marginPct>=50?'var(--st)':marginPct>=25?'var(--wt)':'var(--dt)')+'">'+marginPct+'%</span></div>';
      card.appendChild(summary);

      prodRecipes.forEach(function(r){
        const ing=D.ingredients.find(function(i){return i.id===r.ingredient_id;});
        const sLeft=ing&&r.qty_used>0?Math.floor(ing.stock/r.qty_used):0;
        const row=el('div','row');
        const rl=el('div','row-l');
        rl.innerHTML='<div class="row-name">'+r.ingredient_name+'</div><div class="row-sub">'+(ing?ing.stock+' '+ing.unit+' in stock · <span style="color:'+(sLeft<=5?'var(--dt)':sLeft<=20?'var(--wt)':'var(--t3)')+'">'+sLeft+' servings from this ingredient</span>':'Ingredient not found')+'</div>';
        const rr=el('div','row-r');
        const qty=el('span','');qty.style.cssText='font-size:13px;font-weight:700;color:var(--ac);white-space:nowrap';qty.textContent=r.qty_used+' '+(ing?ing.unit:'units')+'/sale';
        const edBtn=el('button','sm-btn','Edit');
        edBtn.onclick=function(){UI.modal={type:'recipe',product:p,item:r};render();};
        const rmBtn=el('button','sm-btn','Remove');rmBtn.style.color='var(--dt)';
        rmBtn.onclick=function(){if(confirm('Remove this ingredient?'))api('/rest/v1/recipes?id=eq.'+r.id,{method:'DELETE'}).then(loadData);};
        rr.appendChild(qty);rr.appendChild(edBtn);rr.appendChild(rmBtn);
        row.appendChild(rl);row.appendChild(rr);card.appendChild(row);
      });
    }
    main.appendChild(card);
  });
  if(!D.products.length)main.appendChild(el('div','empty','No products found — sync products from the POS app first (Admin &rarr; Sync now)'));
}

function renderIngredients(main){
  main.appendChild(el('div','page-title','Ingredients'));

  // Calculations
  const totalCostValue=D.ingredients.reduce(function(a,i){return a+i.stock*i.cost_per_unit;},0);
  const low=D.ingredients.filter(function(i){return i.stock<=i.low_threshold;}).length;
  const out=D.ingredients.filter(function(i){return i.stock<=0;}).length;

  // Daily consumption — based on last 7 days sales
  const now=new Date();const week=new Date(now);week.setDate(week.getDate()-7);
  const recentSales=D.sales.filter(function(s){return!s.voided&&new Date(s.date)>=week;});
  const dailyConsumption={};
  recentSales.forEach(function(s){
    (s.items||[]).forEach(function(item){
      const recipes=D.recipes.filter(function(r){return r.product_name===item.name;});
      recipes.forEach(function(r){
        dailyConsumption[r.ingredient_id]=(dailyConsumption[r.ingredient_id]||0)+(r.qty_used*(item.qty||1));
      });
    });
  });
  // Convert to daily avg (divide by 7)
  Object.keys(dailyConsumption).forEach(function(k){dailyConsumption[k]=dailyConsumption[k]/7;});

  // Days of stock remaining per ingredient
  const daysRemaining={};
  D.ingredients.forEach(function(i){
    const daily=dailyConsumption[i.id]||0;
    daysRemaining[i.id]=daily>0?Math.floor(i.stock/daily):null;
  });

  const sg=el('div','stats-grid');
  sg.appendChild(statCard('Ingredients',D.ingredients.length,'',''));
  sg.appendChild(statCard('Total cost value',fmt(totalCostValue),'in stock','blue'));
  sg.appendChild(statCard('Low stock',low,'need restocking',low>0?'red':'green'));
  sg.appendChild(statCard('Out of stock',out,'',out>0?'red':''));
  main.appendChild(sg);

  // Cost summary card
  const costCard=el('div','card');
  costCard.innerHTML='<div class="card-hd">Cost breakdown</div>';
  const costRows=[
    ['Total ingredient value',fmt(totalCostValue),''],
    ['Average cost per ingredient',D.ingredients.length?fmt(totalCostValue/D.ingredients.length):'PHP 0.00',''],
    ['Most expensive ingredient',(function(){const s=D.ingredients.slice().sort(function(a,b){return b.stock*b.cost_per_unit-a.stock*a.cost_per_unit;});return s[0]?s[0].name+' ('+fmt(s[0].stock*s[0].cost_per_unit)+')':'None';})(),''],
  ];
  costRows.forEach(function(row){
    const r=el('div','payslip-row');
    r.innerHTML='<span>'+row[0]+'</span><span style="font-weight:600;color:var(--ac)">'+row[1]+'</span>';
    costCard.appendChild(r);
  });
  main.appendChild(costCard);

  // Stock list with days remaining
  const c=el('div','card');
  const hd=el('div','card-hd','Ingredient stock');hd.appendChild(addBtn('+ Add ingredient',function(){UI.modal={type:'ingredient',item:null};render();}));c.appendChild(hd);
  D.ingredients.sort(function(a,b){return a.stock-b.stock;}).forEach(function(ing){
    const isLow=ing.stock<=ing.low_threshold;
    const days=daysRemaining[ing.id];
    const dailyUse=dailyConsumption[ing.id]||0;
    const r=el('div','row');
    const rl=el('div','row-l');
    let sub=ing.unit+' · PHP '+ing.cost_per_unit+'/unit · Value: '+fmt(ing.stock*ing.cost_per_unit);
    if(dailyUse>0)sub+='<br><span style="color:'+(days&&days<=3?'var(--dt)':days&&days<=7?'var(--wt)':'var(--st)')+'">~'+dailyUse.toFixed(1)+ing.unit+'/day · '+(days!==null?days+' days left':'unlimited')+'</span>';
    else sub+='<br><span style="color:var(--t3)">No sales data yet</span>';
    rl.innerHTML='<div class="row-name">'+ing.name+'</div><div class="row-sub" style="line-height:1.6">'+sub+'</div>';
    const rr=el('div','row-r');
    const badge=el('span','badge '+(isLow?'b-amber':'b-green'),ing.stock+' '+(isLow?'⚠ low':'OK'));
    const editBtn=el('button','sm-btn','Edit');
    const ingId=ing.id;
    editBtn.onclick=function(){
      const found=D.ingredients.find(function(x){return x.id===ingId;});
      if(found){UI.modal={type:'ingredient',item:found};render();}
    };
    rr.appendChild(badge);rr.appendChild(editBtn);
    r.appendChild(rl);r.appendChild(rr);c.appendChild(r);
  });
  if(!D.ingredients.length)c.appendChild(el('div','empty','No ingredients yet'));
  main.appendChild(c);

  // Weekly consumption forecast
  if(Object.keys(dailyConsumption).length>0){
    const fc=el('div','card');
    fc.innerHTML='<div class="card-hd">Weekly consumption forecast <span>based on last 7 days</span></div>';
    D.ingredients.forEach(function(ing){
      const daily=dailyConsumption[ing.id]||0;
      if(!daily)return;
      const weekly=daily*7;const days=daysRemaining[ing.id];
      const pct=Math.min(ing.stock/Math.max(weekly,1)*100,100);
      const r=el('div','');r.style.cssText='padding:10px 0;border-bottom:1px solid var(--b1)';
      r.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:600">'+ing.name+'</span><span style="font-size:12px;color:var(--t3)">'+weekly.toFixed(0)+ing.unit+'/week used</span></div>'+
        '<div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct<20?'var(--dt)':pct<50?'var(--wt)':'var(--ac)')+';border-radius:3px;transition:width .4s"></div></div>'+
        '<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--t3)">'+ing.stock+ing.unit+' remaining</span><span style="font-size:11px;color:'+(days&&days<=7?'var(--dt)':'var(--t3)')+'">'+(days!==null?days+' days left':'No usage data')+'</span></div>';
      fc.appendChild(r);
    });
    main.appendChild(fc);
  }
}

function renderWastage(main,rev){
  main.appendChild(el('div','page-title','Wastage log'));
  main.appendChild(filterBar());
  const now=new Date();
  const fw=D.wastage.filter(function(w){
    const d=new Date(w.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();

  plSection('Cost of Goods Sold');

  const r1=el('div','');r1.style.cssText='font-size:11px;color:var(--t3);padding:4px 0 8px;text-align:right';r1.textContent='Gross margin: '+grossMargin+'%';pl.appendChild(r1);

  if(salaryExp>0)plRow('Salaries (monthly staff)',fmt(salaryExp),'var(--t2)',false,true);
  plRow('Total operating expenses',fmt(exp+salaryExp),'var(--t2)',true);
  plTotal('Net Profit',fmt(netProfit),netProfit>=0?'var(--st)':'var(--dt)');
  const r2=el('div','');r2.style.cssText='font-size:11px;color:var(--t3);padding:4px 0 8px;text-align:right';r2.textContent='Net margin: '+netMargin+'%';pl.appendChild(r2);

    const recipes=D.recipes.filter(function(r){return r.product_name===p.name;});

    recipes.forEach(function(r){

    const sold=fs.filter(function(s){return!s.voided;}).reduce(function(a,s){
      return a+(s.items||[]).filter(function(i){return i.name===p.name;}).reduce(function(b,i){return b+(i.qty||1);},0);
    },0);
    if(sold>0)prodProfit.push({name:p.name,price:p.price,cogs:cogs2,margin:p.price>0?Math.round((p.price-cogs2)/p.price*100):0,sold,totalProfit:(p.price-cogs2)*sold});
  });
  prodProfit.sort(function(a,b){return b.totalProfit-a.totalProfit;});
  if(!prodProfit.length){
    prodCard.appendChild(el('div','empty','No sales data yet — set up recipes to see per-product profit'));
  } else {
    prodProfit.forEach(function(p,i){
      const r=el('div','row');
      const rl=el('div','row-l');
      rl.innerHTML='<div class="row-name">'+(i+1)+'. '+p.name+'</div><div class="row-sub">Sold: '+p.sold+' · Cost/unit: '+fmt(p.cogs)+'</div>';
      const rr=el('div','row-r');
      rr.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:3px';
      rr.innerHTML='<span style="font-weight:700;color:var(--st)">'+fmt(p.totalProfit)+'</span>'+
        '<span class="badge '+(p.margin>=50?'b-green':p.margin>=25?'b-amber':'b-red')+'">'+p.margin+'% margin</span>';
      r.appendChild(rl);r.appendChild(rr);prodCard.appendChild(r);
    });
  }
  main.appendChild(prodCard);
}

    modalBtns(box,close,function(){
      const p={biz_id:SESSION.bizId,name:gv('cName'),phone:gv('cPhone'),email:gv('cEmail'),notes:gv('cNotes')};
      if(!p.name){alert('Enter name');return;}save('customers',p,it.id);
    },isNew?'Add':'Save');

  } else if(m.type==='credit'){
    const cust=m.item;
    box.appendChild(el('div','modal-title','Utang — '+cust.name));
    box.appendChild(el('div','','<div style="font-size:15px;font-weight:700;color:'+(cust.credit_balance>0?'var(--dt)':'var(--st)')+'">Balance: '+fmt(cust.credit_balance)+'</div>'));
    mfField(box,'crType','Type','select','charge','',[ {v:'charge',l:'Charge (new utang)'},{v:'payment',l:'Payment (collecting)'}]);
    mfField(box,'crAmt','Amount (PHP)','number','','0');
    mfField(box,'crNote','Note','text','','e.g. For groceries');
    modalBtns(box,close,async function(){
      const type=gv('crType');const amt=parseFloat(gv('crAmt'))||0;
      if(amt<=0){alert('Enter amount');return;}
      await api('/rest/v1/credit_ledger',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({biz_id:SESSION.bizId,customer_id:cust.id,customer_name:cust.name,type,amount:amt,note:gv('crNote'),date:new Date().toISOString()})});
      const nb=type==='charge'?cust.credit_balance+amt:Math.max(0,cust.credit_balance-amt);
      await api('/rest/v1/customers?id=eq.'+cust.id,{method:'PATCH',body:JSON.stringify({credit_balance:nb})});
      UI.modal=null;await loadData();
    },'Record');

  } else if(m.type==='supplier'){
    const it=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',isNew?'Add supplier':'Edit supplier'));
    mfField(box,'sName','Supplier name','text',it.name,'e.g. Metro Supplies');
    mfField(box,'sContact','Contact person','text',it.contact,'');
    mfField(box,'sPhone','Phone','text',it.phone,'');
    mfField(box,'sNotes','Notes','textarea',it.notes,'');
    modalBtns(box,close,function(){
      const p={biz_id:SESSION.bizId,name:gv('sName'),contact:gv('sContact'),phone:gv('sPhone'),notes:gv('sNotes')};
      if(!p.name){alert('Enter supplier name');return;}save('suppliers',p,it.id);
    },isNew?'Add':'Save');

  } else if(m.type==='po'){
    box.appendChild(el('div','modal-title','New purchase order'));
    mfField(box,'poSup','Supplier','select','','',D.suppliers.map(function(s){return{v:s.id+'|'+s.name,l:s.name};}));
    mfField(box,'poTotal','Total amount (PHP)','number','','0');
    mfField(box,'poStatus','Status','select','pending','',[ {v:'pending',l:'Pending'},{v:'received',l:'Received'},{v:'cancelled',l:'Cancelled'}]);
    mfField(box,'poNotes','Items / notes','textarea','','List items here');
    modalBtns(box,close,async function(){
      const sv=gv('poSup');if(!sv){alert('Select supplier');return;}
      const[sid,sname]=sv.split('|');
      await api('/rest/v1/purchase_orders',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({biz_id:SESSION.bizId,supplier_id:sid,supplier_name:sname,total:parseFloat(gv('poTotal'))||0,status:gv('poStatus'),notes:gv('poNotes'),date:new Date().toISOString()})});
      UI.modal=null;await loadData();
    },'Create PO');

  } else if(m.type==='recipe'){
    const p=m.product;const r=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',(isNew?'Add ingredient to ':'Edit ingredient for ')+p.name));
    // Show current stock summary
    if(D.ingredients.length===0){
      box.appendChild(el('div','',`<div style="color:var(--wt);font-size:13px;padding:8px 0">No ingredients found. Add ingredients in the Ingredients tab first.</div>`));
    }
    // Ingredient selector
    const ifld=el('div','mf','<label>Ingredient</label>');
    const isel=document.createElement('select');isel.id='rIng';
    D.ingredients.forEach(function(ing){
      const op=document.createElement('option');op.value=ing.id+'|'+ing.name+'|'+ing.unit;op.textContent=ing.name+' ('+ing.stock+' '+ing.unit+' in stock)';
      if(r.ingredient_id===ing.id)op.selected=true;isel.appendChild(op);
    });
    ifld.appendChild(isel);box.appendChild(ifld);
    // Quantity
    mfField(box,'rQty','Quantity used per sale','number',r.qty_used||1,'e.g. 1');
    // Unit hint
    const hint=el('div','');hint.id='rHint';hint.style.cssText='font-size:12px;color:var(--t3);margin-top:-8px';
    box.appendChild(hint);
    isel.onchange=function(){
      const parts=this.value.split('|');
      hint.textContent='Unit: '+(parts[2]||'');
    };
    if(D.ingredients.length>0){
      const parts=isel.value.split('|');
      hint.textContent='Unit: '+(parts[2]||'');
    }
    modalBtns(box,function(){UI.modal=null;render();},async function(){
      const ingVal=gv('rIng');const qty=parseFloat(gv('rQty'))||1;
      if(!ingVal){alert('Select an ingredient');return;}
      const[ingId,ingName,ingUnit]=ingVal.split('|');
      if(isNew){
        await api('/rest/v1/recipes',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({biz_id:SESSION.bizId,product_name:p.name,ingredient_id:ingId,ingredient_name:ingName,qty_used:qty})});
      } else {
        await api('/rest/v1/recipes?id=eq.'+r.id,{method:'PATCH',body:JSON.stringify({ingredient_id:ingId,ingredient_name:ingName,qty_used:qty})});
      }
      UI.modal=null;await loadData();
    },isNew?'Add':'Save');

  } else if(m.type==='ingredient'){
    const it=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',isNew?'Add ingredient':'Edit: '+it.name));
    mfField(box,'iName','Name','text',it.name,'e.g. Coffee beans');
    mfField(box,'iUnit','Unit','text',it.unit||'g','g / kg / ml / L / pcs');

    // Smart cost calculator
    const calcCard=el('div','');
    calcCard.style.cssText='background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--b2);display:flex;flex-direction:column;gap:10px';
    calcCard.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px">Cost calculator</div>';

    const calcRow=el('div','');calcRow.style.cssText='display:grid;grid-template-columns:1fr 80px 1fr;gap:8px;align-items:end';
    const qtyFld=el('div','mf','<label>You bought</label>');
    const qtyInp=document.createElement('input');qtyInp.type='number';qtyInp.id='cQty';qtyInp.placeholder='e.g. 1';qtyInp.min='0';qtyFld.appendChild(qtyInp);
    const unitFld2=el('div','mf','<label>Bulk unit</label>');
    const unitSel2=document.createElement('select');unitSel2.id='cBulkUnit';
    [{v:'kg',l:'kg'},{v:'g',l:'g'},{v:'L',l:'L'},{v:'ml',l:'ml'},{v:'pcs',l:'pcs'}].forEach(function(o){
      const op=document.createElement('option');op.value=o.v;op.textContent=o.l;unitSel2.appendChild(op);
    });
    unitFld2.appendChild(unitSel2);
    const priceFld=el('div','mf','<label>Total cost (PHP)</label>');
    const priceInp=document.createElement('input');priceInp.type='number';priceInp.id='cPrice';priceInp.placeholder='e.g. 2000';priceInp.min='0';priceFld.appendChild(priceInp);
    calcRow.appendChild(qtyFld);calcRow.appendChild(unitFld2);calcRow.appendChild(priceFld);
    calcCard.appendChild(calcRow);

    const calcResult=el('div','');calcResult.id='calcResult';
    calcResult.style.cssText='font-size:13px;color:var(--t2);background:var(--bg3);border-radius:8px;padding:10px 12px;line-height:1.8;display:none';
    calcCard.appendChild(calcResult);

    const calcBtn=el('button','add-btn','Calculate &rarr;');
    calcBtn.style.cssText='width:100%;padding:10px;margin-top:4px';
    calcBtn.onclick=function(){
      const qty=parseFloat(document.getElementById('cQty').value)||0;
      const bulkUnit=document.getElementById('cBulkUnit').value;
      const price=parseFloat(document.getElementById('cPrice').value)||0;
      const baseUnit=(document.getElementById('iUnit')||{}).value||'g';
      if(!qty||!price){calcResult.style.display='none';return;}
      const conversions={kg:{g:1000,kg:1,ml:null,L:null},g:{g:1,kg:0.001,ml:null,L:null},L:{ml:1000,L:1,g:null,kg:null},ml:{ml:1,L:0.001,g:null,kg:null},pcs:{pcs:1}};
      let stockInBase=qty;
      if(conversions[bulkUnit]&&conversions[bulkUnit][baseUnit]!=null){
        stockInBase=qty*conversions[bulkUnit][baseUnit];
      }
      const costPerBase=price/stockInBase;
      calcResult.style.display='block';
      calcResult.innerHTML=
        '📦 <strong style="color:var(--t1)">'+stockInBase.toLocaleString()+' '+baseUnit+'</strong> total stock<br>'+
        '💰 <strong style="color:var(--st)">PHP '+costPerBase.toFixed(4)+'</strong> per '+baseUnit+'<br>'+
        '<span style="color:var(--ac);cursor:pointer;font-weight:600" id="applyCalc">&rarr; Apply these values</span>';
      document.getElementById('applyCalc').onclick=function(){
        const stockEl=document.getElementById('iStock');if(stockEl)stockEl.value=stockInBase;
        const costEl=document.getElementById('iCost');if(costEl)costEl.value=costPerBase.toFixed(4);
        calcResult.innerHTML='<span style="color:var(--st)">✓ Applied! Stock: '+stockInBase.toLocaleString()+' '+baseUnit+' · Cost: PHP '+costPerBase.toFixed(4)+'/'+baseUnit+'</span>';
      };
    };
    calcCard.appendChild(calcBtn);
    box.appendChild(calcCard);

    mfField(box,'iStock','Current stock (in your unit)','number',it.stock,'0');
    mfField(box,'iThresh','Low stock alert at','number',it.low_threshold||5,'5');
    mfField(box,'iCost','Cost per unit (PHP)','number',it.cost_per_unit,'0');

    modalBtns(box,close,async function(){
      const name=gv('iName');
      if(!name){alert('Enter ingredient name');return;}
      let bizId=SESSION.bizId;
      if(!bizId){
        const biz=await api('/rest/v1/businesses?order=created_at.asc&limit=1');
        if(biz&&biz[0]){SESSION.bizId=biz[0].id;bizId=biz[0].id;saveSession();}
        else{alert('Cannot find business. Please sign out and sign in again.');return;}
      }
      const p={biz_id:bizId,name,unit:gv('iUnit')||'g',stock:parseFloat(gv('iStock'))||0,low_threshold:parseFloat(gv('iThresh'))||5,cost_per_unit:parseFloat(gv('iCost'))||0};
      const endpoint=it.id?'/rest/v1/ingredients?id=eq.'+it.id:'/rest/v1/ingredients';
      const method=it.id?'PATCH':'POST';
      const result=await api(endpoint,{method,headers:{'Prefer':'return=representation'},body:JSON.stringify(p)});
      if(result===null){alert('Save failed. Check your connection and try again.');}
      UI.modal=null;await loadData();
    },isNew?'Add':'Save',it.id?function(){if(confirm('Delete '+it.name+'?'))api('/rest/v1/ingredients?id=eq.'+it.id,{method:'DELETE'}).then(loadData);close();}:null);

  } else if(m.type==='wastage'){
    box.appendChild(el('div','modal-title','Log wastage'));
    mfField(box,'wItem','Item name','text','','e.g. Bread, Coffee');
    mfField(box,'wQty','Quantity','number','1','1');
    mfField(box,'wCost','Estimated cost (PHP)','number','0','0');
    mfField(box,'wReason','Reason','text','','e.g. Expired, Dropped');
    modalBtns(box,close,function(){
      const p={biz_id:SESSION.bizId,item_name:gv('wItem'),qty:parseFloat(gv('wQty'))||1,cost:parseFloat(gv('wCost'))||0,reason:gv('wReason'),date:new Date().toISOString()};
      if(!p.item_name){alert('Enter item name');return;}save('wastage',p,null);
    },'Log');

  } else if(m.type==='order'){
    const it=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',isNew?'New order':'Edit order'));
    mfField(box,'oNo','Order no','text',it.order_no||'ORD-'+String(D.orders.length+1).padStart(4,'0'),'ORD-0001');
    mfField(box,'oCust','Customer name','text',it.customer_name,'');
    mfField(box,'oPhone','Customer phone','text',it.customer_phone,'');
    mfField(box,'oTotal','Total (PHP)','number',it.total,'0');
    mfField(box,'oDeposit','Deposit paid (PHP)','number',it.deposit,'0');
    mfField(box,'oStatus','Status','select',it.status||'pending','',[ {v:'pending',l:'Pending'},{v:'confirmed',l:'Confirmed'},{v:'ready',l:'Ready'},{v:'delivered',l:'Delivered'},{v:'cancelled',l:'Cancelled'}]);
    const ddate=it.delivery_date?it.delivery_date.slice(0,10):'';
    mfField(box,'oDate','Delivery date','date',ddate,'');
    mfField(box,'oNotes','Notes','textarea',it.notes,'Special instructions');
    modalBtns(box,close,function(){
      const dd=gv('oDate');
      const p={biz_id:SESSION.bizId,order_no:gv('oNo'),customer_name:gv('oCust'),customer_phone:gv('oPhone'),total:parseFloat(gv('oTotal'))||0,deposit:parseFloat(gv('oDeposit'))||0,status:gv('oStatus'),delivery_date:dd?new Date(dd).toISOString():null,notes:gv('oNotes')};
      if(!p.customer_name){alert('Enter customer name');return;}save('orders',p,it.id);
    },isNew?'Create':'Save');
  }

  ov.appendChild(box);root.appendChild(ov);
}

function exportCSV(sales){
  const rows=[['ID','Date','Time','Cashier','Items','Total','Method','Ref','Voided']];
  sales.forEach(function(s){rows.push([s.txn_id,new Date(s.date).toLocaleDateString('en-PH'),ft(s.date),s.cashier||'',(s.items||[]).map(function(i){return i.name+' x'+(i.qty||1);}).join('; '),s.total.toFixed(2),s.method,s.ref||'',s.voided?'YES':'NO']);});
  const csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sales-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

if(loadSession()){
  (async function(){
    try{
      const headers={'apikey':SB_KEY,'Authorization':'Bearer '+SESSION.token,'Content-Type':'application/json'};
      // STEP 1: Try to read the POS session from localStorage - this is the authoritative bizId
      let posBizId=null;
      try{
        const posCloud=JSON.parse(localStorage.getItem('arroyo_cloud')||'{}');
        if(posCloud&&posCloud.bizId)posBizId=posCloud.bizId;
        console.log('[ArroyoDash] POS bizId from localStorage:',posBizId);
      }catch(e){}
      // STEP 2: Get all businesses for this user
      const r=await fetch(SB_URL+'/rest/v1/businesses?user_id=eq.'+SESSION.user+'&order=created_at.asc',{headers});
      if(r.ok){
        const bizList=await r.json();
        console.log('[ArroyoDash] Businesses found:',bizList&&bizList.length);
        if(bizList&&bizList.length>0){
          let correctBiz=bizList[0];
          // Priority 1: Use the bizId that matches the POS session
          if(posBizId){
            const match=bizList.find(function(b){return b.id===posBizId;});
            if(match){correctBiz=match;console.log('[ArroyoDash] Matched POS bizId:',correctBiz.id);}
          }
          // Priority 2: Pick the biz with the most data (sales OR employees)
          if(!posBizId&&bizList.length>1){
            let bestScore=0;
            for(const b of bizList){
              let score=0;
              const sr=await fetch(SB_URL+'/rest/v1/sales?biz_id=eq.'+b.id+'&limit=1',{headers});
              if(sr.ok){const sd=await sr.json();if(sd&&sd.length>0)score+=10;}
              const er=await fetch(SB_URL+'/rest/v1/employees?biz_id=eq.'+b.id+'&limit=1',{headers});
              if(er.ok){const ed=await er.json();if(ed&&ed.length>0)score+=5;}
              if(score>bestScore){bestScore=score;correctBiz=b;}
            }
            console.log('[ArroyoDash] Best biz by data score:',correctBiz.id,correctBiz.name);
          }
          if(SESSION.bizId!==correctBiz.id){
            console.log('[ArroyoDash] BizId corrected:',SESSION.bizId,'&rarr;',correctBiz.id);
            // STEP 3: Migrate employees/data from old bizId to correct bizId
            if(SESSION.bizId&&SESSION.bizId!==correctBiz.id){
              try{
                // Move employees from old biz to correct biz
                await fetch(SB_URL+'/rest/v1/employees?biz_id=eq.'+SESSION.bizId,{
                  method:'PATCH',headers:{...headers,'Prefer':'return=representation'},
                  body:JSON.stringify({biz_id:correctBiz.id})
                });
                console.log('[ArroyoDash] Migrated employees to correct bizId');
              }catch(e){console.warn('Migration failed:',e);}
            }
            SESSION.bizId=correctBiz.id;SESSION.bizName=correctBiz.name;saveSession();
          }
        }
      }
    }catch(e){console.warn('[ArroyoDash] BizId check failed:',e);}
    loadData();
  })();
}else{render();}
</script>
