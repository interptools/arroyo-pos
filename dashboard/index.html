<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arroyo POS — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --bg1:#161b22;
  --bg2:#1c2333;
  --bg3:#21262d;
  --t1:#e6edf3;
  --t2:#8b949e;
  --t3:#484f58;
  --b1:rgba(48,54,61,0.8);
  --b2:rgba(48,54,61,1);
  --ac:#2f81f7;
  --ac2:#1a3d6e;
  --sg:#1a3a2a;
  --st:#3fb950;
  --wg:#3d2b00;
  --wt:#d29922;
  --dg:#3d1a1a;
  --dt:#f85149;
  --pg:#2d1b69;
  --pt:#a371f7;
  --gold:#e3b341;
  --navy:#0d1117;
}
/* Mobile top bar */
.mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg1);border-bottom:1px solid var(--b1);z-index:150;align-items:center;padding:0 14px;gap:12px}
.hamburger{display:none;background:none;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:6px;flex-shrink:0}
.mobile-title{font-size:14px;font-weight:700;flex:1}
.mobile-biz{font-size:11px;color:var(--t3)}
/* Overlay */
.sidebar-overlay{display:none}
/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg1);border-top:1px solid var(--b1);z-index:150;justify-content:space-around;align-items:center;padding:0 4px}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;cursor:pointer;border-radius:8px;min-width:44px;border:none;background:none;color:var(--t3);transition:color .15s}
.bnav-item.active{color:var(--ac)}
.bnav-item i{font-size:20px}
.bnav-label{font-size:9px;font-weight:600}
/* Adjust main for mobile topbar */
@media(max-width:768px){.main{padding-top:64px}}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:14px}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--bg1);border:1px solid var(--b2);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.auth-ico{width:44px;height:44px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.auth-field input{padding:12px 14px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none;width:100%;transition:border-color .2s}
.auth-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(47,129,247,0.1)}
.auth-btn{padding:13px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5}
.auth-err{font-size:13px;color:var(--dt);min-height:18px;text-align:center}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;overflow-y:auto}
.sb-brand{padding:16px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px}
.sb-ico{width:32px;height:32px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700;color:var(--t1)}
.sb-biz{font-size:11px;color:var(--t3)}
.nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--bg2);color:var(--t1)}
.nav-item.active{background:rgba(47,129,247,0.15);color:var(--ac);font-weight:600}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:12px 10px 4px}
.sb-foot{padding:12px;border-top:1px solid var(--b1)}
.user-email{font-size:11px;color:var(--t3);padding:4px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.so-btn{padding:8px 10px;border-radius:6px;border:1px solid var(--b1);background:none;color:var(--t3);font-size:12px;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.so-btn:hover{color:var(--dt);border-color:rgba(248,81,73,0.3);background:rgba(248,81,73,0.05)}
.main{margin-left:220px;flex:1;padding:28px;min-height:100vh;background:var(--bg)}
.page-title{font-size:20px;font-weight:700;margin-bottom:18px;color:var(--t1);letter-spacing:-.3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:16px;transition:border-color .2s}
.stat:hover{border-color:var(--b2)}
.stat-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-v{font-size:22px;font-weight:800;letter-spacing:-.5px}
.stat-s{font-size:11px;color:var(--t2);margin-top:4px}
.stat.blue .stat-v{color:var(--ac)}
.stat.green .stat-v{color:var(--st)}
.stat.red .stat-v{color:var(--dt)}
.stat.amber .stat-v{color:var(--wt)}
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:18px;margin-bottom:16px}
.card-hd{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;color:var(--t1)}
.card-hd span{font-size:11px;font-weight:500;color:var(--t3)}
.chart-wrap{position:relative;height:220px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:0 0 10px;text-align:left;border-bottom:1px solid var(--b1)}
.tbl td{padding:10px 0;border-bottom:1px solid var(--b1);color:var(--t2)}
.tbl td:first-child{color:var(--t1);font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--b1);gap:12px}
.row:last-child{border-bottom:none}
.row-l{flex:1}
.row-name{font-size:14px;font-weight:600;color:var(--t1)}
.row-sub{font-size:12px;color:var(--t3);margin-top:2px}
.row-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
.b-green{background:rgba(63,185,80,0.12);color:var(--st);border:1px solid rgba(63,185,80,0.2)}
.b-blue{background:rgba(47,129,247,0.12);color:var(--ac);border:1px solid rgba(47,129,247,0.2)}
.b-red{background:rgba(248,81,73,0.12);color:var(--dt);border:1px solid rgba(248,81,73,0.2)}
.b-amber{background:rgba(210,153,34,0.12);color:var(--wt);border:1px solid rgba(210,153,34,0.2)}
.b-gray{background:var(--bg3);color:var(--t3);border:1px solid var(--b1)}
.b-purple{background:rgba(163,113,247,0.12);color:var(--pt);border:1px solid rgba(163,113,247,0.2)}
.filter-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.fp{padding:6px 14px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.fp:hover{color:var(--t1);border-color:var(--t3)}
.fp.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-size:14px;gap:12px}
.spin{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.add-btn{padding:7px 14px;border-radius:7px;border:1px solid var(--ac);background:var(--ac);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.add-btn:hover{opacity:.85}
.top-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1)}
.top-item:last-child{border-bottom:none}
.top-rank{width:22px;height:22px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0}
.top-info{flex:1}
.top-name{font-size:14px;font-weight:600;color:var(--t1)}
.top-sub{font-size:12px;color:var(--t3);margin-top:2px}
.top-val{font-size:14px;font-weight:700;color:var(--ac)}
.emp-card{background:var(--bg2);border-radius:8px;padding:14px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;border:1px solid var(--b1)}
.emp-av{width:38px;height:38px;border-radius:50%;background:rgba(47,129,247,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ac);flex-shrink:0;border:1px solid rgba(47,129,247,0.3)}
.emp-info{flex:1;min-width:0}
.emp-name{font-size:14px;font-weight:600;color:var(--t1)}
.emp-role{font-size:12px;color:var(--t3);margin-top:2px}
.emp-pay{font-size:12px;color:var(--t2);margin-top:4px}
.emp-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.sm-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.sm-btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--t3)}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b1);font-size:13px;color:var(--t2)}
.payslip-row:last-child{border-bottom:none;font-weight:700;font-size:15px;color:var(--st);padding-top:12px;margin-top:4px;border-top:1px solid var(--b2)}
.ov{position:fixed;inset:0;background:rgba(1,4,9,0.8);z-index:9999;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg1);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px;display:flex;flex-direction:column;gap:12px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--b2)}
.modal-title{font-size:17px;font-weight:700;color:var(--t1)}
.mf{display:flex;flex-direction:column;gap:5px}
.mf label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.mf input,.mf select,.mf textarea{padding:11px 12px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:14px;outline:none;width:100%;transition:border-color .15s}
.mf input:focus,.mf select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(47,129,247,0.1)}
.mf textarea{min-height:70px;resize:vertical;font-family:inherit}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;padding-top:4px;border-top:1px solid var(--b1)}
.modal-btns button{padding:10px 16px;border-radius:8px;border:1px solid var(--b2);background:var(--bg2);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btns button:hover{background:var(--bg3)}
.modal-btns .pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.modal-btns .pri:hover{opacity:.9}
.modal-btns .del{color:var(--dt);margin-right:auto;border-color:transparent;background:none}
.modal-btns .del:hover{background:rgba(248,81,73,0.08);border-color:rgba(248,81,73,0.2)}
@media(max-width:768px){
  .sidebar{transform:translateX(-220px);transition:transform .3s;position:fixed;height:100vh;z-index:200}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block!important;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
  .sidebar-overlay.open{opacity:1;pointer-events:all}
  .main{margin-left:0;padding:12px;padding-bottom:72px}
  .two-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .page-title{font-size:18px;margin-bottom:14px}
  .card{padding:14px;margin-bottom:14px}
  .card-hd{font-size:13px;margin-bottom:12px;flex-wrap:wrap;gap:6px}
  .tbl{font-size:12px}
  .tbl th{font-size:9px;padding:0 0 8px}
  .tbl td{padding:8px 0}
  .stat{padding:12px}
  .stat-v{font-size:20px}
  .stat-l{font-size:9px}
  .emp-card{flex-wrap:wrap}
  .emp-btns{flex-wrap:wrap}
  .filter-bar{gap:5px}
  .fp{padding:6px 12px;font-size:11px}
  .row-name{font-size:13px}
  .row-sub{font-size:11px}
  .add-btn{font-size:11px;padding:6px 10px}
  /* Bottom nav */
  .bottom-nav{display:flex!important}
  /* Hamburger */
  .hamburger{display:flex!important}
  /* Hide sidebar brand on mobile - shown in topbar instead */
  .mobile-topbar{display:flex!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SB_URL='https://btfazallxcbmiitbcmkv.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0ZmF6YWxseGNibWlpdGJjbWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjkwODIsImV4cCI6MjA5OTU0NTA4Mn0.Iu0qjlPttxxqY_LcvTND9Uir3uy71FCv469NjlfiIBE';
let SESSION={token:null,user:null,bizId:null,bizName:'',email:''};
let D={sales:[],expenses:[],products:[],employees:[],attendance:[],customers:[],credit:[],suppliers:[],pos:[],ingredients:[],recipes:[],wastage:[],orders:[],loans:[],leaves:[]};
let UI={page:'overview',filter:'week',modal:null,loading:false};
let CHARTS={};

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function fmt(n){return'PHP '+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}
function ft(d){return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

async function api(path,opts){
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',...(opts&&opts.headers||{})};
  try{
    const r=await fetch(SB_URL+path,{...opts,headers:h});
    if(!r.ok){
      const errText=await r.text();
      console.error('API error',r.status,errText);
      return null;
    }
    const t=await r.text();return t?JSON.parse(t):null;
  }catch(e){console.error('API fetch error',e);return null;}
}
async function signIn(email,pw){
  try{const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});return await r.json();}
  catch(e){return{error:{message:'Network error'}};}
}
async function signOut(){
  try{await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SESSION.token}});}catch(e){}
  SESSION={token:null,user:null,bizId:null,bizName:'',email:''};
  localStorage.removeItem('apos_dash');render();
}
function saveSession(){localStorage.setItem('apos_dash',JSON.stringify(SESSION));}
function loadSession(){try{const s=JSON.parse(localStorage.getItem('apos_dash')||'{}');if(s.token){SESSION=s;return true;}}catch(e){}return false;}

async function loadData(){
  if(!SESSION.token||!SESSION.bizId)return;
  UI.loading=true;render();
  const bid=SESSION.bizId;
  const results=await Promise.all([
    api('/rest/v1/sales?biz_id=eq.'+bid+'&order=date.desc&limit=1000'),
    api('/rest/v1/expenses?biz_id=eq.'+bid+'&order=date.desc&limit=500'),
    api('/rest/v1/products?biz_id=eq.'+bid),
    api('/rest/v1/employees?biz_id=eq.'+bid+'&active=eq.true&order=name'),
    api('/rest/v1/attendance?biz_id=eq.'+bid+'&order=time_in.desc&limit=500'),
    api('/rest/v1/customers?biz_id=eq.'+bid+'&order=name'),
    api('/rest/v1/credit_ledger?biz_id=eq.'+bid+'&order=date.desc&limit=300'),
    api('/rest/v1/suppliers?biz_id=eq.'+bid+'&order=name'),
    api('/rest/v1/purchase_orders?biz_id=eq.'+bid+'&order=date.desc&limit=200'),
    api('/rest/v1/ingredients?biz_id=eq.'+bid+'&order=name'),
    api('/rest/v1/recipes?biz_id=eq.'+bid),
    api('/rest/v1/wastage?biz_id=eq.'+bid+'&order=date.desc&limit=200'),
    api('/rest/v1/orders?biz_id=eq.'+bid+'&order=created_at.desc&limit=200'),
    api('/rest/v1/employee_loans?biz_id=eq.'+bid+'&order=date.desc'),
    api('/rest/v1/leaves?biz_id=eq.'+bid+'&order=created_at.desc'),
  ]);
  const keys=['sales','expenses','products','employees','attendance','customers','credit','suppliers','pos','ingredients','recipes','wastage','orders','loans','leaves'];
  keys.forEach(function(k,i){D[k]=Array.isArray(results[i])?results[i]:[];});
  UI.loading=false;render();
}

function filteredSales(){
  const now=new Date();
  return D.sales.filter(function(s){
    if(s.voided)return false;
    const d=new Date(s.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();
    if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(UI.filter==='month'){const m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
}
function filteredExp(){
  const now=new Date();
  return D.expenses.filter(function(e){
    const d=new Date(e.date);
    if(UI.filter==='today')return d.toDateString()===now.toDateString();
    if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(UI.filter==='month'){const m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
}
function topProds(){
  const map={};
  D.sales.filter(function(s){return!s.voided;}).forEach(function(s){
    (s.items||[]).forEach(function(it){
      if(!map[it.name])map[it.name]={name:it.name,qty:0,rev:0};
      map[it.name].qty+=(it.qty||1);map[it.name].rev+=(it.price||0)*(it.qty||1);
    });
  });
  return Object.values(map).sort(function(a,b){return b.rev-a.rev;}).slice(0,8);
}
function salesByDay(){
  const map={};
  filteredSales().forEach(function(s){
    const k=new Date(s.date).toLocaleDateString('en-PH',{month:'short',day:'numeric'});
    map[k]=(map[k]||0)+s.total;
  });
  const days=Object.keys(map);
  return{labels:days,data:days.map(function(k){return map[k];})};
}
function destroyCharts(){Object.values(CHARTS).forEach(function(c){try{c.destroy();}catch(e){}});CHARTS={};}

function filterBar(){
  const fb=el('div','filter-bar');
  [{id:'today',l:'Today'},{id:'week',l:'This week'},{id:'month',l:'This month'},{id:'all',l:'All time'}].forEach(function(f){
    const p=el('div','fp'+(UI.filter===f.id?' on':''),f.l);
    p.onclick=function(){UI.filter=f.id;destroyCharts();render();};fb.appendChild(p);
  });
  return fb;
}
function addBtn(lbl,fn){
  const b=el('button','add-btn',lbl);b.onclick=fn;return b;
}
function statCard(lbl,val,sub,cls){
  const c=el('div','stat'+(cls?' '+cls:''));
  c.innerHTML='<div class="stat-l">'+lbl+'</div><div class="stat-v">'+val+'</div>'+(sub?'<div class="stat-s">'+sub+'</div>':'');

function renderAuth(root){
  const page=el('div','auth-page');
  const card=el('div','auth-card');
  const brand=el('div','',);brand.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:4px';
  brand.appendChild(el('div','auth-ico','AP'));
  const bn=el('div');bn.innerHTML='<div style="font-size:18px;font-weight:700">Arroyo POS</div><div style="font-size:12px;color:var(--t3)">Business Dashboard</div>';
  brand.appendChild(bn);card.appendChild(brand);
  card.appendChild(el('div','',`<div style="font-size:13px;color:var(--t2)">Sign in with your Arroyo POS account.</div>`));
  const ef=el('div','auth-field','<label>Email</label>');const ei=document.createElement('input');ei.type='email';ei.placeholder='you@email.com';ei.id='dEm';ef.appendChild(ei);card.appendChild(ef);
  const pf=el('div','auth-field','<label>Password</label>');const pi=document.createElement('input');pi.type='password';pi.placeholder='Password';pi.id='dPw';pf.appendChild(pi);card.appendChild(pf);
  const err=el('div','auth-err','');err.id='dErr';card.appendChild(err);
  const btn=el('button','auth-btn','Sign in to dashboard');
  btn.onclick=async function(){
    const email=document.getElementById('dEm').value.trim();
    const pw=document.getElementById('dPw').value;
    if(!email||!pw){document.getElementById('dErr').textContent='Enter email and password.';return;}
    btn.disabled=true;btn.textContent='Signing in...';
    const res=await signIn(email,pw);
    if(!res.access_token){document.getElementById('dErr').textContent=res.error&&res.error.message||'Sign in failed.';btn.disabled=false;btn.textContent='Sign in to dashboard';return;}
    SESSION.token=res.access_token;SESSION.user=res.user&&res.user.id;SESSION.email=email;
    // Try to find business by user_id first, then fall back to any business
    let biz=await api('/rest/v1/businesses?user_id=eq.'+res.user.id);
    if(!biz||!biz[0]){
      // Fallback — get any business (for accounts that aren't the owner)
      biz=await api('/rest/v1/businesses?order=created_at.asc&limit=1');
    }
    if(biz&&biz[0]){SESSION.bizId=biz[0].id;SESSION.bizName=biz[0].name;}
    saveSession();await loadData();
  };
  pi.onkeydown=function(e){if(e.key==='Enter')btn.click();};
  card.appendChild(btn);page.appendChild(card);root.appendChild(page);
  setTimeout(function(){const e=document.getElementById('dEm');if(e)e.focus();},100);
}

function renderModal(root){
  const m=UI.modal;if(!m)return;
  const ov=el('div','ov');ov.onclick=function(e){if(e.target===ov){UI.modal=null;render();}};
  const box=el('div','modal');
  function close(){UI.modal=null;render();}
  function save(table,payload,id){
    const doSave=async function(){
      if(id){await api('/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',body:JSON.stringify(payload)});}
      else{await api('/rest/v1/'+table,{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(payload)});}
      UI.modal=null;
      await loadData();
    };
    doSave();
  }
  function gv(id){return(document.getElementById(id)||{}).value||'';}

  if(m.type==='emp'){
    const it=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',isNew?'Add employee':'Edit employee'));
    mfField(box,'eName','Full name','text',it.name,'Employee name');
    mfField(box,'eRole','Role','text',it.role||'Staff','e.g. Cashier');
    mfField(box,'ePhone','Phone','text',it.phone,'');
    mfField(box,'ePayType','Pay type','select',it.pay_type||'daily','',[ {v:'hourly',l:'Hourly rate'},{v:'daily',l:'Daily rate'},{v:'monthly',l:'Monthly salary'},{v:'commission',l:'Commission (% of sales)'}]);
    mfField(box,'eRate','Rate (PHP or % for commission)','number',it.pay_type==='commission'?it.commission_pct:it.rate,'0');
    modalBtns(box,close,function(){
      const pt=gv('ePayType'),rate=parseFloat(gv('eRate'))||0;
      const p={biz_id:SESSION.bizId,name:gv('eName'),role:gv('eRole')||'Staff',phone:gv('ePhone'),pay_type:pt,rate:pt==='commission'?0:rate,commission_pct:pt==='commission'?rate:0,active:true};
      if(!p.name){alert('Enter name');return;}
      save('employees',p,it.id);
    },isNew?'Add':'Save',it.id?function(){if(confirm('Remove '+it.name+'?'))api('/rest/v1/employees?id=eq.'+it.id,{method:'PATCH',body:JSON.stringify({active:false})}).then(loadData);close();}:null);

  } else if(m.type==='empAtt'){
    const e=m.item;box.appendChild(el('div','modal-title','Attendance — '+e.name));
    const att=D.attendance.filter(function(a){return a.employee_id===e.id;}).slice(0,20);
    if(!att.length){box.appendChild(el('div','empty','No records yet'));}
    else{
      const tbl=el('table','tbl','<thead><tr><th>Date</th><th>In</th><th>Out</th><th>Hours</th></tr></thead>');
      const tb=document.createElement('tbody');
      att.forEach(function(a){const tr=document.createElement('tr');tr.innerHTML='<td>'+fd(a.date)+'</td><td>'+ft(a.time_in)+'</td><td>'+(a.time_out?ft(a.time_out):'<span style="color:var(--st)">Active</span>')+'</td><td>'+(a.hours_worked?a.hours_worked.toFixed(1)+'h':'—')+'</td>';tb.appendChild(tr);});
      tbl.appendChild(tb);box.appendChild(tbl);
    }
    const btns=el('div','modal-btns');const cb=el('button','','Close');cb.onclick=close;btns.appendChild(cb);box.appendChild(btns);

  } else if(m.type==='payslip'){
    const e=m.item;
    box.appendChild(el('div','modal-title','Payslip — '+e.name));
    const now=new Date();
    const eAtt=D.attendance.filter(function(a){
      if(a.employee_id!==e.id||!a.hours_worked)return false;
      const d=new Date(a.date);
      if(UI.filter==='today')return d.toDateString()===now.toDateString();
      if(UI.filter==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
      if(UI.filter==='month'){const m2=new Date(now);m2.setDate(m2.getDate()-30);return d>=m2;}
      return true;
    });
    const hrs=eAtt.reduce(function(a,r){return a+r.hours_worked;},0);
    const days=eAtt.length;
    let pay=0;
    if(e.pay_type==='hourly')pay=hrs*e.rate;
    else if(e.pay_type==='daily')pay=days*e.rate;
    else if(e.pay_type==='monthly')pay=e.rate;
    else{const er=D.sales.filter(function(s){return!s.voided&&s.cashier===e.name;}).reduce(function(a,s){return a+s.total;},0);pay=er*(e.commission_pct/100);}
    const activeLoan=D.loans.filter(function(l){return l.status==='active'&&l.employee_id===e.id;}).reduce(function(a,l){return a+l.balance;},0);
    const deduction=Math.min(activeLoan,pay*0.2);

  } else if(m.type==='credit'){

    mfField(box,'poStatus','Status','select','pending','',[ {v:'pending',l:'Pending'},{v:'received',l:'Received'},{v:'cancelled',l:'Cancelled'}]);

    box.appendChild(hint);
    isel.onchange=function(){
      const parts=this.value.split('|');
      hint.textContent='Unit: '+(parts[2]||'');
    };
    if(D.ingredients.length>0){
      const parts=isel.value.split('|');
      hint.textContent='Unit: '+(parts[2]||'');

    modalBtns(box,function(){UI.modal=null;render();},async function(){

      } else {
        await api('/rest/v1/recipes?id=eq.'+r.id,{method:'PATCH',body:JSON.stringify({ingredient_id:ingId,ingredient_name:ingName,qty_used:qty})});
      }
      UI.modal=null;await loadData();
    },isNew?'Add':'Save');

  } else if(m.type==='ingredient'){
    const it=m.item||{};const isNew=!m.item;
    box.appendChild(el('div','modal-title',isNew?'Add ingredient':'Edit ingredient'));
    mfField(box,'iName','Name','text',it.name,'e.g. Coffee beans');

    // Unit selector with converter toggle
    const unitFld=el('div','mf','<label>Unit type</label>');
    const unitSel=document.createElement('select');unitSel.id='iUnitType';
    [{v:'g',l:'Grams (g) — for powder/beans/spices'},{v:'kg',l:'Kilograms (kg)'},{v:'ml',l:'Milliliters (ml) — for liquids'},{v:'L',l:'Liters (L)'},{v:'pcs',l:'Pieces (pcs) — for items'},{v:'custom',l:'Custom unit...'}].forEach(function(o){
      const op=document.createElement('option');op.value=o.v;op.textContent=o.l;
      if((it.unit||'g')===o.v)op.selected=true;
      unitSel.appendChild(op);
    });
    unitFld.appendChild(unitSel);box.appendChild(unitFld);

    // Custom unit field (hidden unless custom selected)
    const customFld=el('div','mf','<label>Custom unit name</label>');
    const customInp=document.createElement('input');customInp.type='text';customInp.id='iCustomUnit';customInp.placeholder='e.g. sachet, pack, slice';customInp.value='';
    customFld.appendChild(customInp);customFld.style.display='none';box.appendChild(customFld);
    unitSel.onchange=function(){customFld.style.display=this.value==='custom'?'flex':'none';updateCalc();};

    // Smart calculator box
    const calcBox=el('div','');
    calcBox.style.cssText='background:var(--bg2);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;border:1px solid var(--b2)';
    calcBox.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px">Smart calculator</div>';

    // Input: bulk quantity + bulk unit
    const row1=el('div','');row1.style.cssText='display:flex;gap:8px;align-items:flex-end';
    const bulkFld=el('div','mf','<label>You have</label>');bulkFld.style.flex='1';
    const bulkInp=document.createElement('input');bulkInp.type='number';bulkInp.id='iBulkQty';bulkInp.placeholder='e.g. 20';bulkInp.min='0';bulkInp.value='';
    bulkFld.appendChild(bulkInp);
    const bulkUnitFld=el('div','mf','<label>Bulk unit</label>');bulkUnitFld.style.flex='1';
    const bulkUnitSel=document.createElement('select');bulkUnitSel.id='iBulkUnit';
    [{v:'kg',l:'kg'},{v:'g',l:'g'},{v:'L',l:'L'},{v:'ml',l:'ml'},{v:'pcs',l:'pcs'}].forEach(function(o){const op=document.createElement('option');op.value=o.v;op.textContent=o.l;bulkUnitSel.appendChild(op);});
    bulkUnitFld.appendChild(bulkUnitSel);
    row1.appendChild(bulkFld);row1.appendChild(bulkUnitFld);calcBox.appendChild(row1);

    // Input: cost for the bulk
    const costFld=el('div','mf','<label>Total cost paid (PHP)</label>');
    const costInp=document.createElement('input');costInp.type='number';costInp.id='iBulkCost';costInp.placeholder='e.g. 2000 for 20kg';costInp.min='0';costInp.value='';
    costFld.appendChild(costInp);calcBox.appendChild(costFld);

    // Low alert
    const alertFld=el('div','mf','<label id="iAlertLabel">Low stock alert (in selected unit)</label>');
    const alertInp=document.createElement('input');alertInp.type='number';alertInp.id='iBulkAlert';alertInp.placeholder='e.g. 500';alertInp.min='0';alertInp.value='500';
    alertFld.appendChild(alertInp);calcBox.appendChild(alertFld);

    // Result preview
    const preview=el('div','');preview.id='iCalcPreview';
    preview.style.cssText='background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.8;display:none';
    calcBox.appendChild(preview);box.appendChild(calcBox);

    // Manual override section
    const manualToggle=el('div','');
    manualToggle.style.cssText='font-size:12px;color:var(--ac);cursor:pointer;text-align:center;padding:4px';
    manualToggle.textContent='Or enter values manually ▼';
    let showManual=false;
    const manualBox=el('div','');manualBox.style.display='none';
    mfField(manualBox,'iStock','Stock (in base unit)','number',it.stock,'0');
    mfField(manualBox,'iThresh','Low stock alert at (in base unit)','number',it.low_threshold||5,'5');
    mfField(manualBox,'iCost','Cost per base unit (PHP)','number',it.cost_per_unit,'0');
    manualToggle.onclick=function(){showManual=!showManual;manualBox.style.display=showManual?'flex':'none';manualBox.style.flexDirection='column';manualBox.style.gap='10px';manualToggle.textContent=showManual?'Hide manual entry ▲':'Or enter values manually ▼';};
    box.appendChild(manualToggle);box.appendChild(manualBox);

    // Conversion table
    const conversions={kg:{g:1000,kg:1,L:null,ml:null,pcs:null},g:{g:1,kg:0.001,L:null,ml:null,pcs:null},L:{ml:1000,L:1,g:null,kg:null,pcs:null},ml:{ml:1,L:0.001,g:null,kg:null,pcs:null},pcs:{pcs:1,g:null,kg:null,L:null,ml:null}};

    function updateCalc(){
      const baseUnit=unitSel.value==='custom'?customInp.value||'units':unitSel.value;
      const bulkQty=parseFloat(bulkInp.value)||0;
      const bulkUnit=bulkUnitSel.value;
      const totalCost=parseFloat(costInp.value)||0;
      const alertQty=parseFloat(alertInp.value)||0;
      document.getElementById('iAlertLabel').textContent='Low stock alert (in '+baseUnit+')';

      if(!bulkQty){preview.style.display='none';return;}

      let stockInBase=bulkQty;
      let costPerBase=0;
      let alertInBase=alertQty;

      // Convert bulk to base unit
      if(conversions[bulkUnit]&&conversions[bulkUnit][baseUnit]!==null&&conversions[bulkUnit][baseUnit]!==undefined){
        stockInBase=bulkQty*(conversions[bulkUnit][baseUnit]);
        alertInBase=alertQty;
        if(totalCost>0)costPerBase=totalCost/stockInBase;
      } else if(bulkUnit===baseUnit){
        stockInBase=bulkQty;
        if(totalCost>0)costPerBase=totalCost/bulkQty;
      } else {
        // Same unit or unknown conversion
        stockInBase=bulkQty;
        if(totalCost>0)costPerBase=totalCost/bulkQty;
      }

      preview.style.display='block';
      preview.innerHTML='<strong style="color:var(--t1)">Will save as:</strong><br>'+
        '📦 Stock: <strong style="color:var(--ac)">'+stockInBase.toLocaleString()+' '+baseUnit+'</strong><br>'+
        '⚠️ Alert when below: <strong style="color:var(--wt)">'+alertInBase+' '+baseUnit+'</strong><br>'+
        (totalCost>0?'💰 Cost per '+baseUnit+': <strong style="color:var(--st)">PHP '+costPerBase.toFixed(4)+'</strong>':'');

      // Update manual fields too
      const stockEl=document.getElementById('iStock');if(stockEl)stockEl.value=stockInBase;
      const threshEl=document.getElementById('iThresh');if(threshEl)threshEl.value=alertInBase;
      const costEl=document.getElementById('iCost');if(costEl)costEl.value=costPerBase.toFixed(4);
    }

    bulkInp.oninput=updateCalc;costInp.oninput=updateCalc;alertInp.oninput=updateCalc;
    bulkUnitSel.onchange=updateCalc;
    if(it.stock)updateCalc();

    modalBtns(box,close,async function(){
      const baseUnit=unitSel.value==='custom'?customInp.value||'units':unitSel.value;
      const bulkQty=parseFloat(bulkInp.value)||0;
      const bulkUnit=bulkUnitSel.value;
      const totalCost=parseFloat(costInp.value)||0;
      const alertQty=parseFloat(alertInp.value)||0;

      let stockInBase=bulkQty,costPerBase=0,alertInBase=alertQty;
      if(conversions[bulkUnit]&&conversions[bulkUnit][baseUnit]!==null&&conversions[bulkUnit][baseUnit]!==undefined){
        stockInBase=bulkQty*(conversions[bulkUnit][baseUnit]);
        if(totalCost>0)costPerBase=totalCost/stockInBase;
      } else {
        stockInBase=bulkQty;
        if(totalCost>0)costPerBase=totalCost/bulkQty;
      }
      // If manual override used
      const manualStock=parseFloat((document.getElementById('iStock')||{}).value)||0;
      const manualThresh=parseFloat((document.getElementById('iThresh')||{}).value)||0;
      const manualCost=parseFloat((document.getElementById('iCost')||{}).value)||0;
      const finalStock=showManual&&manualStock?manualStock:stockInBase;
      const finalThresh=showManual&&manualThresh?manualThresh:alertInBase;
      const finalCost=showManual&&manualCost?manualCost:costPerBase;

      const name=gv('iName');
      if(!name){alert('Enter ingredient name');return;}
      if(!finalStock){alert('Enter stock quantity');return;}

      let bizId=SESSION.bizId;
      if(!bizId){
        const biz=await api('/rest/v1/businesses?order=created_at.asc&limit=1');
        if(biz&&biz[0]){SESSION.bizId=biz[0].id;bizId=biz[0].id;saveSession();}
        else{alert('Cannot find business. Please sign out and sign in again.');return;}
      }

      const p={biz_id:bizId,name,unit:baseUnit,stock:finalStock,low_threshold:finalThresh||500,cost_per_unit:finalCost};
      const endpoint=it.id?'/rest/v1/ingredients?id=eq.'+it.id:'/rest/v1/ingredients';
      const method=it.id?'PATCH':'POST';
      const result=await api(endpoint,{method,headers:{'Prefer':'return=representation'},body:JSON.stringify(p)});
      if(result===null){alert('Save failed. Check your connection and try again.');}
      UI.modal=null;await loadData();
    },isNew?'Add':'Save');

  } else if(m.type==='wastage'){

    mfField(box,'wQty','Quantity','number','1','1');

      const p={biz_id:SESSION.bizId,item_name:gv('wItem'),qty:parseFloat(gv('wQty'))||1,cost:parseFloat(gv('wCost'))||0,reason:gv('wReason'),date:new Date().toISOString()};

    mfField(box,'oDeposit','Deposit paid (PHP)','number',it.deposit,'0');
    mfField(box,'oStatus','Status','select',it.status||'pending','',[ {v:'pending',l:'Pending'},{v:'confirmed',l:'Confirmed'},{v:'ready',l:'Ready'},{v:'delivered',l:'Delivered'},{v:'cancelled',l:'Cancelled'}]);
    const ddate=it.delivery_date?it.delivery_date.slice(0,10):'';
    mfField(box,'oDate','Delivery date','date',ddate,'');
    mfField(box,'oNotes','Notes','textarea',it.notes,'Special instructions');
    modalBtns(box,close,function(){
      const dd=gv('oDate');
      const p={biz_id:SESSION.bizId,order_no:gv('oNo'),customer_name:gv('oCust'),customer_phone:gv('oPhone'),total:parseFloat(gv('oTotal'))||0,deposit:parseFloat(gv('oDeposit'))||0,status:gv('oStatus'),delivery_date:dd?new Date(dd).toISOString():null,notes:gv('oNotes')};
      if(!p.customer_name){alert('Enter customer name');return;}save('orders',p,it.id);
    },isNew?'Create':'Save');
  }

  ov.appendChild(box);root.appendChild(ov);
}

function exportCSV(sales){
  const rows=[['ID','Date','Time','Cashier','Items','Total','Method','Ref','Voided']];
  sales.forEach(function(s){rows.push([s.txn_id,new Date(s.date).toLocaleDateString('en-PH'),ft(s.date),s.cashier||'',(s.items||[]).map(function(i){return i.name+' x'+(i.qty||1);}).join('; '),s.total.toFixed(2),s.method,s.ref||'',s.voided?'YES':'NO']);});
  const csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sales-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

if(loadSession()){loadData();}else{render();}
